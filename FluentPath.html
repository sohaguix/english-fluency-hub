<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FluentPath — English Learning Platform</title>
<style>
:root{
  --i1:#6366F1; --i2:#8B5CF6; --i3:#D946EF; --cy:#22D3EE; --em:#10B981; --am:#F59E0B; --rd:#F43F5E;
  --r:20px; --r-sm:13px; --r-lg:28px; --tap:46px; --sp:clamp(15px,3.5vw,28px);
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --ease:cubic-bezier(.22,.7,.24,1);
  --grad:linear-gradient(135deg,var(--i1),var(--i3));
}
:root[data-theme="dark"]{
  --bg:#0A0A16; --text:#F1F2FA; --muted:#A7A9C4; --faint:#6C6E8F;
  --glass:rgba(30,31,54,.55); --glass-2:rgba(40,42,70,.5); --glass-hi:rgba(255,255,255,.07);
  --line:rgba(255,255,255,.1); --line-2:rgba(255,255,255,.16);
  --shadow:0 8px 32px -12px rgba(0,0,0,.6); --shadow-lg:0 30px 80px -30px rgba(0,0,0,.85);
  --blob-o:.5;
}
:root[data-theme="light"]{
  --bg:#EEF0FB; --text:#181A2E; --muted:#565A78; --faint:#9598B5;
  --glass:rgba(255,255,255,.62); --glass-2:rgba(255,255,255,.5); --glass-hi:rgba(255,255,255,.7);
  --line:rgba(20,22,50,.09); --line-2:rgba(20,22,50,.15);
  --shadow:0 8px 30px -14px rgba(30,34,90,.28); --shadow-lg:0 30px 70px -28px rgba(30,34,90,.4);
  --blob-o:.4;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:16px;line-height:1.55;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:1rem}
:focus-visible{outline:2px solid var(--i2);outline-offset:2px;border-radius:8px}
h1,h2,h3,h4{margin:0;line-height:1.18;letter-spacing:-.02em;font-weight:800}
p{margin:0}.muted{color:var(--muted)}.mono{font-family:var(--mono)}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:9px}

/* animated gradient blobs */
.bg-fx{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}
.blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:var(--blob-o);animation:float 22s var(--ease) infinite}
.blob.b1{width:520px;height:520px;background:var(--i1);top:-140px;left:-120px}
.blob.b2{width:480px;height:480px;background:var(--i3);bottom:-160px;right:-100px;animation-delay:-7s}
.blob.b3{width:400px;height:400px;background:var(--cy);top:40%;left:55%;animation-delay:-14s}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-30px) scale(1.1)}66%{transform:translate(-30px,40px) scale(.95)}}

.glass{background:var(--glass);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);
  border:1px solid var(--line);box-shadow:var(--shadow)}

/* shell */
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
@media(max-width:940px){.app{grid-template-columns:1fr}}
.sidebar{position:sticky;top:0;height:100vh;overflow-y:auto;padding:20px 14px;display:flex;flex-direction:column;gap:2px;
  z-index:60;border-right:1px solid var(--line);background:var(--glass);backdrop-filter:blur(22px) saturate(1.4);-webkit-backdrop-filter:blur(22px)}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 16px}
.brand .logo{width:44px;height:44px;border-radius:13px;background:var(--grad);display:grid;place-items:center;font-size:22px;
  box-shadow:0 8px 20px -6px var(--i2)}
.brand b{font-size:1.16rem;font-weight:900;display:block;line-height:1;letter-spacing:-.03em;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.brand span{font-size:.68rem;color:var(--faint);font-weight:700;letter-spacing:.08em}
.nav-group{font-size:.65rem;font-weight:800;letter-spacing:.11em;text-transform:uppercase;color:var(--faint);padding:14px 12px 5px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;font-weight:600;font-size:.9rem;
  color:var(--muted);min-height:44px;width:100%;text-align:left;transition:.15s}
.nav-item:hover{background:var(--glass-hi);color:var(--text)}
.nav-item.active{background:var(--grad);color:#fff;font-weight:700;box-shadow:0 8px 18px -8px var(--i2)}
.nav-item .ic{font-size:1.08rem;width:22px;text-align:center;flex:none}
.nav-item .cnt{margin-left:auto;font-size:.64rem;font-weight:800;background:var(--glass-hi);border-radius:999px;padding:2px 8px}
.nav-item.active .cnt{background:rgba(255,255,255,.25)}

.main{min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:10px;padding:11px var(--sp);
  border-bottom:1px solid var(--line);background:var(--glass);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px)}
.hamb{display:none;width:44px;height:44px;border-radius:12px;font-size:1.2rem;place-items:center;background:var(--glass-2);border:1px solid var(--line)}
@media(max-width:940px){.hamb{display:grid}}
.search{flex:1;max-width:440px;display:flex;align-items:center;gap:9px;background:var(--glass-2);border:1px solid var(--line);
  border-radius:13px;padding:0 14px;height:44px}
.search input{background:none;border:none;outline:none;color:var(--text);width:100%;font-weight:600}
.search .si{color:var(--faint)}
.pills{display:flex;gap:8px;margin-left:auto;align-items:center;flex-wrap:wrap}
.pill{display:flex;align-items:center;gap:6px;background:var(--glass-2);border:1px solid var(--line);padding:7px 12px;border-radius:999px;font-weight:800;font-size:.82rem}
.pill.streak{color:#FB923C}.pill.xp{color:var(--i2)}
:root[data-theme="dark"] .pill.xp{color:#C4B5FD}
.icon-btn{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:1.1rem;background:var(--glass-2);border:1px solid var(--line)}
.view{padding:var(--sp);max-width:1180px;width:100%;margin:0 auto;animation:vin .4s var(--ease)}
@keyframes vin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.scrim{position:fixed;inset:0;background:rgba(5,5,15,.6);z-index:59;display:none;opacity:0;transition:.25s;backdrop-filter:blur(3px)}
.scrim.show{display:block;opacity:1}
@media(max-width:940px){.sidebar{position:fixed;left:0;top:0;width:280px;transform:translateX(-104%);transition:transform .28s var(--ease)}.sidebar.open{transform:none}}

.page-head{margin-bottom:20px}
.page-head .eyebrow{font-size:.72rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.page-head h1{font-size:clamp(1.7rem,4.6vw,2.5rem);margin-top:7px}
.page-head p{color:var(--muted);margin-top:8px;max-width:64ch}
.grid{display:grid;gap:15px}
.g4{grid-template-columns:repeat(auto-fit,minmax(146px,1fr))}
.g3{grid-template-columns:repeat(auto-fit,minmax(210px,1fr))}
.g2{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.skills{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
.lessons{grid-template-columns:repeat(auto-fill,minmax(270px,1fr))}
.card{border-radius:var(--r);padding:20px;background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid var(--line);box-shadow:var(--shadow)}

.btn{background:var(--grad);color:#fff;font-weight:800;border-radius:14px;padding:13px 22px;min-height:var(--tap);
  box-shadow:0 10px 24px -10px var(--i2);transition:transform .12s,filter .15s;font-size:.94rem;display:inline-flex;align-items:center;gap:8px;justify-content:center}
.btn:hover{filter:brightness(1.08)}.btn:active{transform:scale(.97)}
.btn.ghost{background:var(--glass-2);color:var(--text);border:1px solid var(--line-2);box-shadow:none}
.btn.green{background:linear-gradient(135deg,var(--em),#34d399);box-shadow:0 10px 24px -10px var(--em)}
.btn.block{width:100%}.btn.sm{padding:9px 15px;font-size:.85rem;min-height:40px;border-radius:11px}
.btn[disabled]{opacity:.5;pointer-events:none}

/* hero */
.hero{border-radius:var(--r-lg);padding:28px;position:relative;overflow:hidden;color:#fff;
  background:linear-gradient(135deg,var(--i1),var(--i2) 45%,var(--i3));box-shadow:var(--shadow-lg)}
.hero::after{content:"";position:absolute;right:-50px;top:-60px;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,.12)}
.hero h2{font-size:clamp(1.5rem,4vw,2.1rem);position:relative;z-index:1;max-width:22ch}
.hero p{opacity:.92;margin-top:8px;position:relative;z-index:1}
.hero .row{display:flex;gap:22px;flex-wrap:wrap;margin-top:18px;position:relative;z-index:1}
.hero .m b{font-size:1.6rem;display:block;font-weight:900}.hero .m span{font-size:.74rem;opacity:.85;font-weight:700}
.hero .cta-row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;position:relative;z-index:1}
.hero .btn.wht{background:#fff;color:var(--i1)}
.hero .btn.gh{background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.3)}

.stat{border-radius:var(--r);padding:16px;background:var(--glass);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.stat .em{font-size:1.3rem}.stat b{font-size:1.55rem;font-weight:900;display:block;margin-top:5px;letter-spacing:-.03em}
.stat span{color:var(--muted);font-size:.78rem;font-weight:600}
.section-title{display:flex;align-items:center;justify-content:space-between;margin:26px 0 14px;gap:12px;flex-wrap:wrap}
.section-title h2{font-size:1.28rem}
.ring-wrap{position:relative;width:120px;height:120px;flex:none}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-bg{stroke:rgba(255,255,255,.22)}.ring-fg{stroke:#fff;stroke-linecap:round;transition:stroke-dashoffset 1s var(--ease)}
.ring-center{position:absolute;inset:0;display:grid;place-content:center;text-align:center;color:#fff}
.ring-center .big{font-size:1.6rem;font-weight:900}.ring-center small{font-size:.62rem;opacity:.85;font-weight:700}

.diff{font-size:.64rem;font-weight:800;padding:3px 9px;border-radius:999px;white-space:nowrap}
.diff.d1{background:rgba(16,185,129,.18);color:#34d399}
.diff.d2{background:rgba(245,158,11,.18);color:#fbbf24}
.diff.d3{background:rgba(244,63,94,.18);color:#fb7185}
.filters{display:flex;gap:8px;flex-wrap:wrap}
.chip-f{background:var(--glass-2);border:1px solid var(--line-2);border-radius:999px;padding:8px 15px;font-weight:700;font-size:.83rem;min-height:40px}
.chip-f.on{background:var(--grad);color:#fff;border-color:transparent}

.skill-card{border-radius:var(--r);padding:18px;text-align:left;display:flex;flex-direction:column;gap:9px;
  background:var(--glass);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);transition:transform .15s var(--ease),box-shadow .15s}
.skill-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.skill-card .s-ic{width:48px;height:48px;border-radius:14px;display:grid;place-items:center;font-size:1.4rem}
.skill-card h3{font-size:1.05rem}.skill-card .s-meta{font-size:.76rem;color:var(--faint);font-weight:700}
.mini-bar{height:7px;background:var(--glass-hi);border-radius:999px;overflow:hidden;margin-top:auto}
.mini-bar i{display:block;height:100%;background:var(--grad);border-radius:999px;width:0;transition:width .6s var(--ease)}

.lesson-card{border-radius:var(--r);padding:18px;text-align:left;display:flex;flex-direction:column;gap:10px;position:relative;
  background:var(--glass);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);transition:transform .15s var(--ease),box-shadow .15s}
.lesson-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.lesson-card .lc-top{display:flex;align-items:center;gap:8px;font-size:.72rem;font-weight:800}
.lesson-card .lc-ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:1.1rem;flex:none}
.lesson-card h3{font-size:1.05rem;line-height:1.25}
.lesson-card .lc-foot{display:flex;align-items:center;gap:8px;margin-top:auto}
.star{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:1rem;background:var(--glass-2);border:1px solid var(--line);flex:none}
.star.on{background:rgba(245,158,11,.2);color:var(--am);border-color:var(--am)}
.done-badge{font-size:.68rem;font-weight:800;color:var(--em);background:rgba(16,185,129,.16);padding:3px 9px;border-radius:999px}

/* missions / goals */
.mission{display:flex;align-items:center;gap:13px;padding:14px 16px;border-radius:14px;background:var(--glass-2);border:1px solid var(--line);margin-bottom:10px}
.mission .m-ic{width:42px;height:42px;border-radius:12px;background:var(--grad);display:grid;place-items:center;font-size:1.2rem;flex:none;color:#fff}
.mission.done .m-ic{background:linear-gradient(135deg,var(--em),#34d399)}
.mission .m-body{flex:1;min-width:0}
.mission .m-body b{font-size:.92rem}.mission .m-prog{font-size:.76rem;color:var(--muted)}
.mission .mbar{height:6px;background:var(--glass-hi);border-radius:999px;overflow:hidden;margin-top:5px}
.mission .mbar i{display:block;height:100%;background:var(--grad);border-radius:999px;transition:width .5s}
.mission .rew{font-size:.72rem;font-weight:800;color:var(--am);white-space:nowrap}
.mission.done .rew{color:var(--em)}

/* badges */
.badge{display:flex;gap:12px;align-items:center;border-radius:16px;padding:15px;background:var(--glass-2);border:1px solid var(--line);opacity:.5;filter:grayscale(.7);transition:.3s}
.badge.on{opacity:1;filter:none}
.badge .b-ic{width:48px;height:48px;border-radius:14px;background:var(--glass-hi);display:grid;place-items:center;font-size:1.5rem;flex:none}
.badge.on .b-ic{background:linear-gradient(135deg,#FDE68A,#F59E0B)}
.badge b{display:block;font-size:.92rem}.badge span{font-size:.76rem;color:var(--muted)}

/* chart */
.chart{display:flex;align-items:flex-end;gap:min(3vw,14px);height:150px;padding-top:8px}
.chart .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end}
.chart .col .b{width:100%;max-width:34px;background:var(--grad);border-radius:7px 7px 3px 3px;min-height:4px;transition:height .7s var(--ease)}
.chart .col.today .b{background:linear-gradient(180deg,#FBBF24,#FB923C)}
.chart .col small{font-size:.66rem;color:var(--muted);font-weight:700}.chart .col .v{font-size:.64rem;color:var(--faint);font-weight:800}

/* LESSON PLAYER */
.player{position:fixed;inset:0;z-index:100;display:none;flex-direction:column;background:var(--bg)}
.player.show{display:flex}
.player .bg-fx{z-index:0}
.pl-top{display:flex;align-items:center;gap:13px;padding:13px var(--sp);border-bottom:1px solid var(--line);background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);z-index:2}
.pl-close{width:40px;height:40px;border-radius:12px;font-size:1.3rem;color:var(--muted);flex:none}
.pl-prog{flex:1;height:12px;background:var(--glass-hi);border-radius:999px;overflow:hidden}
.pl-prog i{display:block;height:100%;background:linear-gradient(90deg,var(--em),#34d399);border-radius:999px;width:0;transition:width .4s var(--ease)}
.pl-info{font-weight:800;font-size:.82rem;white-space:nowrap;display:flex;gap:10px;align-items:center}
.timer{color:#FB923C}.timer.low{color:var(--rd);animation:blink 1s infinite}
@keyframes blink{50%{opacity:.4}}
.pl-scroll{flex:1;overflow-y:auto;padding:var(--sp);z-index:1}
.pl-inner{max-width:660px;margin:0 auto;padding-bottom:120px}
.pl-foot{border-top:1px solid var(--line);padding:15px var(--sp);background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);z-index:2}
.pl-foot .in{max-width:660px;margin:0 auto;display:flex;gap:12px}
.stage-tag{display:inline-flex;align-items:center;gap:7px;font-size:.7rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  background:var(--grad);color:#fff;padding:5px 12px;border-radius:999px;margin-bottom:14px}
.q-title{font-size:1.32rem;font-weight:800;margin-bottom:18px;letter-spacing:-.02em}
.q-title.sm{font-size:1.08rem}
.learn-card{border-radius:var(--r);padding:22px;background:var(--glass);border:1px solid var(--line);box-shadow:var(--shadow);margin-bottom:16px;line-height:1.7;font-size:1.05rem;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.learn-card .hl{color:var(--i2);font-weight:800}
:root[data-theme="dark"] .learn-card .hl{color:#C4B5FD}
.eg{display:flex;gap:10px;align-items:flex-start;background:var(--glass-2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:9px}

/* video placeholder */
.video{border-radius:var(--r-lg);overflow:hidden;position:relative;aspect-ratio:16/9;background:linear-gradient(135deg,#1a1a3a,#2a1a4a);border:1px solid var(--line);box-shadow:var(--shadow-lg);margin-bottom:8px;display:grid;place-items:center}
.video .grid-o{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);background-size:34px 34px}
.video .vplay{width:82px;height:82px;border-radius:50%;background:rgba(255,255,255,.16);backdrop-filter:blur(8px);display:grid;place-items:center;font-size:2rem;color:#fff;border:1px solid rgba(255,255,255,.3);z-index:1;transition:transform .15s}
.video .vplay:active{transform:scale(.92)}
.video .vlabel{position:absolute;bottom:14px;left:16px;color:rgba(255,255,255,.85);font-size:.78rem;font-weight:700;z-index:1}
.video .vtime{position:absolute;bottom:14px;right:16px;color:rgba(255,255,255,.7);font-size:.74rem;font-weight:700;font-family:var(--mono);z-index:1}
.transcript{background:var(--glass-2);border:1px solid var(--line);border-radius:14px;padding:16px;font-size:.95rem;color:var(--muted);line-height:1.7}

.opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--glass);border:2px solid var(--line-2);border-radius:var(--r-sm);
  padding:15px 18px;margin-bottom:10px;font-weight:600;min-height:var(--tap);transition:.14s;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.opt:hover{border-color:var(--i2)}.opt:active{transform:scale(.99)}
.opt .key{width:27px;height:27px;border-radius:8px;background:var(--glass-hi);display:grid;place-items:center;font-size:.78rem;font-weight:800;flex:none;color:var(--muted)}
.opt.correct{border-color:var(--em);background:rgba(16,185,129,.14)}.opt.correct .key{background:var(--em);color:#fff}
.opt.wrong{border-color:var(--rd);background:rgba(244,63,94,.14)}.opt.wrong .key{background:var(--rd);color:#fff}
.opt[disabled]{pointer-events:none}
.text-in{width:100%;background:var(--glass);border:2px solid var(--line-2);border-radius:var(--r-sm);padding:15px 18px;color:var(--text);transition:.15s;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.text-in:focus{border-color:var(--i2);outline:none}
.text-in.big{font-size:1.25rem;text-align:center;font-weight:700}
textarea.text-in{min-height:120px;resize:vertical;line-height:1.6}

.build-line{min-height:56px;border-bottom:2px dashed var(--line-2);display:flex;flex-wrap:wrap;gap:8px;padding:10px 4px;margin-bottom:20px;align-content:flex-start}
.bank{display:flex;flex-wrap:wrap;gap:9px}
.chip{background:var(--glass);border:2px solid var(--line-2);border-radius:12px;padding:9px 15px;font-weight:700;box-shadow:var(--shadow);transition:.1s}
.chip:active{transform:scale(.94)}.chip.used{opacity:0;pointer-events:none;width:0;padding:0;margin:0;border:0}
.chip.placed{background:rgba(139,92,246,.2);border-color:var(--i2)}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.mcol{display:flex;flex-direction:column;gap:10px}
.mtile{background:var(--glass);border:2px solid var(--line-2);border-radius:12px;padding:12px 14px;font-weight:600;text-align:center;min-height:var(--tap);transition:.14s;font-size:.9rem}
.mtile.sel{border-color:var(--i2);background:rgba(139,92,246,.16)}
.mtile.matched{border-color:var(--em);background:rgba(16,185,129,.14);pointer-events:none;opacity:.7}
.mtile.miss{border-color:var(--rd);animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.flash{perspective:1500px;height:250px;margin-bottom:14px}
.flash-in{position:relative;width:100%;height:100%;transition:transform .6s var(--ease);transform-style:preserve-3d;cursor:pointer}
.flash.flip .flash-in{transform:rotateY(180deg)}
.flash-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r-lg);display:flex;flex-direction:column;justify-content:center;text-align:center;gap:8px;padding:24px;border:1px solid var(--line);box-shadow:var(--shadow-lg)}
.flash-front{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.flash-back{background:var(--grad);color:#fff;transform:rotateY(180deg)}
.flash-face .big{font-size:2rem;font-weight:900}.flash-face .sub{opacity:.85;font-size:.9rem}
.audio-card{border-radius:var(--r-lg);padding:24px;text-align:center;margin-bottom:18px;background:var(--glass);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.play-btn{width:80px;height:80px;border-radius:50%;background:var(--grad);color:#fff;font-size:1.9rem;display:grid;place-items:center;margin:0 auto 8px;box-shadow:0 14px 30px -12px var(--i2);transition:.12s}
.play-btn:active{transform:scale(.92)}.play-btn.playing{animation:pr 1.2s infinite}
@keyframes pr{0%{box-shadow:0 0 0 0 rgba(139,92,246,.5)}70%{box-shadow:0 0 0 20px rgba(139,92,246,0)}100%{box-shadow:0 0 0 0 rgba(139,92,246,0)}}
.speak-word{font-size:1.6rem;font-weight:900;margin-top:6px}
.correct-orig{background:rgba(244,63,94,.12);border:1px solid var(--rd);border-radius:12px;padding:13px 16px;margin-bottom:16px;font-size:1.05rem}
.correct-orig .lbl{font-size:.7rem;font-weight:800;color:var(--rd);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:4px}

.feedback{border-radius:var(--r);padding:15px 17px;margin-bottom:8px;font-weight:600;display:none;animation:fin .3s var(--ease);border:1px solid}
@keyframes fin{from{transform:translateY(12px);opacity:0}to{transform:none;opacity:1}}
.feedback.show{display:block}
.feedback.good{background:rgba(16,185,129,.14);color:#34d399;border-color:var(--em)}
.feedback.bad{background:rgba(244,63,94,.14);color:#fb7185;border-color:var(--rd)}
.feedback b{display:block;font-size:1.02rem;margin-bottom:3px}.feedback .ft{color:var(--text);font-weight:500;font-size:.88rem}
.reveal-btn{width:100%;border:2px dashed var(--line-2);border-radius:12px;padding:15px;font-weight:800;color:var(--i2);background:var(--glass-2)}
:root[data-theme="dark"] .reveal-btn{color:#C4B5FD}
.answer{background:var(--glass-2);border:1px solid var(--line);border-radius:12px;padding:16px;line-height:1.7}
.chk{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:11px;margin-bottom:9px;background:var(--glass-2);cursor:pointer}
.chk .box{width:24px;height:24px;border-radius:7px;border:2px solid var(--line-2);flex:none;display:grid;place-items:center;font-size:.85rem;margin-top:1px}
.chk.on{border-color:var(--em)}.chk.on .box{background:var(--em);border-color:var(--em);color:#fff}
.review-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:10px}
.review-list li{display:flex;gap:12px;background:var(--glass-2);border:1px solid var(--line);border-radius:11px;padding:13px 15px}
.review-list li::before{content:"✓";color:var(--em);font-weight:900;flex:none}
.notes-in{width:100%;background:var(--glass-2);border:1px solid var(--line);border-radius:12px;padding:13px;color:var(--text);min-height:80px;resize:vertical;margin-top:10px}

.complete{text-align:center;padding:16px 0}
.complete .trophy{font-size:4.2rem;animation:pop .6s var(--ease)}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.complete h2{font-size:1.7rem;margin:8px 0}
.xp-earned{display:inline-flex;align-items:center;gap:8px;background:var(--grad);color:#fff;font-weight:800;padding:10px 22px;border-radius:999px;font-size:1.1rem;margin:6px 0 18px}
.reward-row{display:flex;gap:11px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}

.reward-row .r b{display:block;font-size:1.3rem}.reward-row .r span{font-size:.7rem;color:var(--muted);font-weight:700}

.toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:9px;pointer-events:none}
.toast{border-radius:14px;padding:13px 16px;display:flex;gap:11px;align-items:center;min-width:230px;animation:tin .4s var(--ease);background:var(--glass);border:1px solid var(--line-2);box-shadow:var(--shadow-lg);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
.toast .ti{font-size:1.5rem}.toast b{display:block;font-size:.9rem}.toast span{font-size:.76rem;color:var(--muted)}
@keyframes tin{from{transform:translateX(120%)}to{transform:none}}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:150;overflow:hidden}
.confetti i{position:absolute;width:9px;height:14px;top:-20px;border-radius:2px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.9}}
.empty{text-align:center;padding:48px 20px;color:var(--muted)}.empty .e{font-size:3rem}
@media(prefers-reduced-motion:reduce){*{animation-duration:.001s!important;transition-duration:.05s!important}.blob{animation:none}}
@media(max-width:560px){.view{padding:15px}.hero{padding:22px}}

<script>

var DAY=86400000;
function dkey(d){d=d||new Date();return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}
function weekKey(d){d=d||new Date();var on=new Date(d.getFullYear(),0,1);var day=Math.floor((d-on)/DAY);return d.getFullYear()+"-W"+Math.floor((day+on.getDay())/7);}
function daysBetween(a,b){var pa=a.split("-").map(Number),pb=b.split("-").map(Number);return Math.round((new Date(pb[0],pb[1]-1,pb[2])-new Date(pa[0],pa[1]-1,pa[2]))/DAY);}

/* ============ SKILLS ============ */

 {k:"grammar",n:"Grammar",ic:"📐",c:"#6366F1"},{k:"vocabulary",n:"Vocabulary",ic:"📚",c:"#8B5CF6"},
 {k:"pronunciation",n:"Pronunciation",ic:"🔊",c:"#EC4899"},{k:"listening",n:"Listening",ic:"🎧",c:"#06B6D4"},

 grammar:["Building Blocks","Tenses & Time","Spot the Error","Putting It Together"],

 pronunciation:["Sounds & Pairs","Tricky Sounds","Stress & Rhythm","Say It Clearly"],
 listening:["Catch the Detail","Numbers & Times","Real Conversations","Gist & Focus"],
 reading:["Read & Understand","Skim & Scan","Between the Lines","Comprehension"],
 writing:["First Sentences","Clear Messages","Structure & Flow","Polish It"],

/* ============ CONTENT BANK ============ */
var BANK={
 grammar:{learn:[
  "The <b>present simple</b> is for habits and facts. With <span class='hl'>he/she/it</span>, add <b>-s</b> to the verb: <i>She works.</i> Negatives use <b>don't / doesn't</b> + base verb.",
  "The <b>past simple</b> tells finished actions. Regular verbs add <b>-ed</b>; many are irregular (<span class='hl'>go→went, buy→bought</span>). Present perfect (<b>have + past participle</b>) links past to now.",
  "<b>Conditionals</b> express possibility. Second conditional: <span class='hl'>If + past, would + base</span> — <i>If I knew, I would tell you.</i> Keep the two clauses in the right form."],
  pool:[

   co("He don't like coffee.",["He doesn't like coffee.","He not like coffee.","He don't likes coffee."],0,"doesn't + base verb.",1),
   or("She is reading a book.","Subject–verb–object order.",1),
   mc("I saw ___ owl in the tree.",["a","an","the"],1,"vowel sound → an.",1),

   mc("I've lived here ___ 2019.",["for","since"],1,"a start point → since.",2),

  review:["Add -s for he/she/it in present simple.","Past simple = finished time; use -ed or irregular forms.","Second conditional: if + past, would + base."]},

 vocabulary:{learn:[
  "Build words in <b>families</b> and <span class='hl'>chunks</span>, not one by one. Learn a word with a partner word (a collocation) so it sticks: <i>make a decision</i>, <i>heavy rain</i>.",
  "Strong speakers use precise <b>synonyms</b>. Instead of 'very tired', say <span class='hl'>exhausted</span>; instead of 'very happy', say <b>delighted</b>.",

 pronunciation:{learn:[
  "English has <b>short</b> and <b>long</b> vowels. <span class='hl'>ship</span> (short) vs <span class='hl'>sheep</span> (long). Length can change the whole word — listen closely.",
  "The <b>TH</b> sound puts your tongue lightly between your teeth: soft <i>think</i> and buzzing <i>this</i>. Don't swap it for d, z, t or f.",
  "<b>Word stress</b> carries meaning. <span class='hl'>PHO-to-graph</span> vs <span class='hl'>pho-TO-gra-pher</span>. Stress the right syllable and you sound instantly clearer."],
  pool:[

 listening:{learn:[

   rd("Read the opinion.","While remote work offers flexibility, some argue it weakens team bonds. On balance, a hybrid model may capture the benefits of both.",
     [mc("The writer's overall view is:",["strongly against remote","balanced / hybrid","strongly for remote"],1,"'a hybrid model'."),mc("One downside mentioned:",["cost","weaker team bonds","slow internet"],1,"weakens team bonds.")],3)],

 writing:{learn:[
  "Start with <b>clear, complete sentences</b>: capital letter, subject, verb, full stop. Simple and correct beats complex and messy.",
  "Structure a message: <span class='hl'>greeting → reason → request → thanks</span>. Keep each part short.",

 speaking:{learn:[

   or("We will cover three things today.","Signposting sentence order.",2),
   sp("Preview your structure.","We'll cover three ideas: first impressions, friction, and trust.","Number them clearly.",3),
   sp("Close with a call to action.","So here's my ask: give me twenty minutes to show you.","Confident, specific ask.",3)],

 ielts:{learn:[
  "In <b>Part 1</b>, give a fact plus a reason — don't answer in one word. Keep it natural and friendly.",
  "In <b>Part 2</b>, use the 1-minute prep, then cover every bullet and <span class='hl'>speak for the full 2 minutes</span>.",

var LESSONS=[];
(function(){var id=0;
 for(var lvl=1;lvl<=3;lvl++){
  SKILLS.forEach(function(sk){
   for(var i=0;i<4;i++){
    LESSONS.push({id:"L"+(id++),path:LEVELS[lvl],level:lvl,skill:sk.k,skillName:sk.n,idx:i,
      title:sk.n+": "+SUFFIX[sk.k][i]});
   }
  });
 }
})();
function quizable(e){return ["mcq","fill","order","match","correct","listen"].indexOf(e.type)>=0;}
function lessonContent(L){
  var b=BANK[L.skill],lvl=L.level;
  var pool=b.pool.filter(function(e){return e.lvl===lvl;});
  if(pool.length<4)pool=pool.concat(b.pool.filter(function(e){return e.lvl!==lvl;}));
  var rot=pool.slice();for(var k=0;k<L.idx;k++)rot.push(rot.shift());
  var practice=rot.slice(0,4);
  // quiz: prefer strictly-quizable items, but always fall back to any answerable exercise (e.g. reading) so no stage is ever empty
  var quiz=rot.filter(quizable).slice(0,3);
  if(quiz.length<3)quiz=b.pool.filter(quizable).slice(0,3);
  if(!quiz.length)quiz=rot.slice(0,3);
  var qable=rot.filter(quizable);
  var challenge=[qable.length?qable[qable.length-1]:rot[rot.length-1]||rot[0]];
  var learn=b.learn[lvl-1]||b.learn[0];
  return {learn:learn,watch:learn.replace(/<[^>]+>/g,""),practice:practice,quiz:quiz,challenge:challenge,review:b.review};
}

function renderRevision(){var v=$("#view");v.innerHTML="";
  var head=el("div","page-head");head.innerHTML="<div class='eyebrow'>Lock it in</div><h1>🔁 Revision Mode</h1><p>Mixed practice pulled from your bookmarked and completed lessons, plus your saved notes.</p>";v.appendChild(head);

  var start=el("button","btn","▶ Start revision drill");start.onclick=function(){if(!pool.length){toast("🔁","Nothing yet","Finish or bookmark a lesson first.");return;}startRevision(pool);};
  card.appendChild(start);v.appendChild(card);

  var notesIds=Object.keys(S.notes).filter(function(id){return S.notes[id]&&S.notes[id].trim();});
  v.appendChild(sectionTitle("Your notes",null));
  if(!notesIds.length){v.appendChild(el("div","card","<p class='muted'>No notes yet. Add notes inside any lesson's Review stage.</p>"));}
  else{var g=el("div","grid g2");notesIds.forEach(function(id){var L=LESSONS.find(function(x){return x.id===id;});if(!L)return;
    var c=el("div","card");c.innerHTML="<div style='font-weight:800;margin-bottom:6px'>"+L.title+"</div><p class='muted' style='font-size:.9rem;white-space:pre-wrap'>"+S.notes[id].replace(/</g,"&lt;")+"</p>";
    var b=el("button","btn ghost sm","Open lesson");b.style.marginTop="10px";b.onclick=function(){openLesson(L);};c.appendChild(b);g.appendChild(c);});v.appendChild(g);}}
function revisionPool(){var ids=Object.keys(S.bookmarks);if(!ids.length)ids=Object.keys(S.completed);
  var ex=[];ids.forEach(function(id){var L=LESSONS.find(function(x){return x.id===id;});if(!L)return;var c=lessonContent(L);
    c.practice.concat(c.quiz).forEach(function(e){if(quizable(e))ex.push(e);});});
  shuffle(ex);return ex.slice(0,10);}
function startRevision(pool){SESSION={rev:true,items:pool.map(function(e){return{k:"ex",ex:e,quiz:true};}),idx:0,correct:0,total:0,xp:0,L:null};

/* ============ LESSON PLAYER ============ */
var SESSION=null;
function openLesson(L){
  var c=lessonContent(L);
  var items=[{k:"learn"},{k:"watch"}];
  c.practice.forEach(function(e){items.push({k:"ex",ex:e,quiz:false});});
  items.push({k:"quizintro"});c.quiz.forEach(function(e){items.push({k:"ex",ex:e,quiz:true});});
  items.push({k:"challengeintro"});c.challenge.forEach(function(e){items.push({k:"ex",ex:e,quiz:true,challenge:true});});
  items.push({k:"review"},{k:"complete"});
  SESSION={rev:false,L:L,content:c,items:items,idx:0,correct:0,total:0,xp:0};
  openPlayerRaw();
}
function openPlayerRaw(){$("#player").classList.add("show");document.body.style.overflow="hidden";renderStep();}
function closePlayer(){$("#player").classList.remove("show");document.body.style.overflow="";stopSpeak();if(SESSION&&SESSION.timer)clearInterval(SESSION.timer);SESSION=null;
  ({dashboard:renderDashboard,skill:renderSkill,bookmarks:renderBookmarks,revision:renderRevision,search:renderSearch,paths:renderPaths}[route.view]||renderDashboard)(route.arg);renderNav();refreshTop();}
$("#plClose").onclick=function(){if(SESSION&&SESSION.total>0&&!SESSION.done){if(!confirm("Leave now? This lesson's progress won't be saved."))return;}closePlayer();};
function renderStep(){
  var it=SESSION.items[SESSION.idx];
  $("#plProg").style.width=Math.round(SESSION.idx/(SESSION.items.length-1)*100)+"%";
  var stageNames={learn:"Learn",watch:"Watch",quizintro:"Quiz",challengeintro:"Challenge",review:"Review",complete:"Done",revdone:"Done"};
  var st=it.k==="ex"?(it.challenge?"Challenge":it.quiz?"Quiz":"Practice"):stageNames[it.k]||"";
  $("#plStage").textContent=st;
  $("#plTimer").style.display="none";
  var inner=$("#plInner"),foot=$("#plFoot");inner.innerHTML="";foot.innerHTML="";
  if(it.k==="learn")return stLearn(inner,foot);
  if(it.k==="watch")return stWatch(inner,foot);
  if(it.k==="quizintro")return stIntro(inner,foot,"🧠","Quiz Time","Show what you've learned.","green");
  if(it.k==="challengeintro")return stIntro(inner,foot,"⚡","Challenge","One timed question. Beat the clock!","");
  if(it.k==="review")return stReview(inner,foot);
  if(it.k==="complete")return stComplete(inner,foot);
  if(it.k==="revdone")return stRevDone(inner,foot);
  if(it.k==="ex")return stEx(inner,foot,it);
}
function footBtn(foot,label,fn,cls){var b=el("button","btn "+(cls||"")+" block",label);b.onclick=fn;foot.appendChild(b);return b;}
function nextStep(){SESSION.idx++;renderStep();$(".pl-scroll").scrollTop=0;}

function stLearn(inner,foot){var L=SESSION.L,c=SESSION.content;
  inner.innerHTML="<div class='stage-tag'>📖 Learn</div><h2 class='q-title'>"+L.title+"</h2><div class='learn-card'>"+c.learn+"</div>";
  var play=el("button","btn ghost sm","🔊 Read aloud");play.onclick=function(){speak(c.watch);};inner.appendChild(play);
  footBtn(foot,"Watch  →",nextStep);}

    "<div class='video'><div class='grid-o'></div><button class='vplay' id='vplay'>▶</button><span class='vlabel'>"+SESSION.L.skillName+" · "+SESSION.L.path+"</span><span class='vtime'>0:00 / 1:30</span></div>"+
    "<p class='muted' style='font-size:.82rem;margin:8px 0 12px'>Video is a placeholder — tap play to hear the narration read aloud.</p>"+

function stReview(inner,foot){var L=SESSION.L,c=SESSION.content;
  inner.innerHTML="<div class='stage-tag'>🔁 Review</div><h2 class='q-title sm'>Key takeaways</h2><ul class='review-list'>"+c.review.map(function(r){return "<li>"+r+"</li>";}).join("")+"</ul>";
  var nt=el("div");nt.innerHTML="<div style='font-weight:800;margin:18px 0 4px'>📝 Your notes</div><p class='muted' style='font-size:.85rem'>Jot anything you want to remember (saved automatically).</p>";

  ta.oninput=function(){S.notes[L.id]=ta.value;save();};nt.appendChild(ta);inner.appendChild(nt);

  star.onclick=function(){toggleBookmark(L.id);star.textContent=isBookmarked(L.id)?"★ Bookmarked":"☆ Bookmark this lesson";renderNav();};inner.appendChild(star);

/* ---- EX ROUTER ---- */
function stEx(inner,foot,it){
  var ex=it.ex;
  inner.appendChild(el("div","stage-tag",(it.challenge?"⚡ Challenge":it.quiz?"🧠 Quiz":"✏️ Practice")));
  var host=el("div");inner.appendChild(host);
  var fb=el("div","feedback");inner.appendChild(fb);
  var answered=false,cont;
  if(it.challenge){$("#plTimer").style.display="inline";startChallengeTimer(function(){if(!answered)done(false,"Time's up! "+(ex.e||""));});}
  function done(correct){
    if(answered)return;answered=true;if(SESSION.timer){clearInterval(SESSION.timer);$("#plTimer").style.display="none";}
    SESSION.total++;S.stats.exercises++;
    if(correct){SESSION.correct++;var g=it.quiz?(it.challenge?15:8):10;SESSION.xp+=g;S.stats.correct++;S.today.correct++;}
    var explainHtml=arguments[1]||ex.e||"";
    fb.className="feedback show "+(correct?"good":"bad");
    fb.innerHTML="<b>"+(correct?"✓ "+pick(["Nice!","Correct!","Well done!","Exactly!"]):"✗ Not quite")+"</b><div class='ft'>"+explainHtml+"</div>";
    fb.scrollIntoView({behavior:"smooth",block:"nearest"});
    cont.disabled=false;cont.classList.remove("ghost");cont.classList.add(correct?"green":"");
    cont.textContent=SESSION.idx>=SESSION.items.length-2?"Finish  →":"Continue  →";
  }
  var t=ex.type;
  if(t==="mcq")exMCQ(host,ex,done);
  else if(t==="correct")exCorrect(host,ex,done);
  else if(t==="fill")exFill(host,ex,done);
  else if(t==="order")exOrder(host,ex,done);
  else if(t==="match")exMatch(host,ex,done);
  else if(t==="flash")exFlash(host,ex,done);
  else if(t==="listen")exListen(host,ex,done);
  else if(t==="speak")exSpeak(host,ex,done);
  else if(t==="reading")exReading(host,ex,done);
  else if(t==="writing")exWriting(host,ex,done);
  else exMCQ(host,ex,done);
  cont=footBtn(foot,"Continue  →",function(){nextStep();},"ghost");cont.disabled=true;
}
function startChallengeTimer(onEnd){var t=20;$("#plTimer").textContent="⏱ "+t+"s";
  SESSION.timer=setInterval(function(){t--;var e=$("#plTimer");e.textContent="⏱ "+t+"s";e.classList.toggle("low",t<=5);if(t<=0){clearInterval(SESSION.timer);onEnd();}},1000);}

function exMCQ(host,ex,done){host.appendChild(el("h3","q-title sm",ex.q));
  var opts=ex.o.map(function(o,i){return{o:o,i:i};});
  opts.forEach(function(item,vis){var b=el("button","opt","<span class='key'>"+String.fromCharCode(65+vis)+"</span><span>"+item.o+"</span>");
    b.onclick=function(){if(host.dataset.l)return;host.dataset.l="1";var ok=item.i===ex.a;b.classList.add(ok?"correct":"wrong");
      if(!ok)Array.prototype.forEach.call(host.querySelectorAll(".opt"),function(x,k){if(opts[k].i===ex.a)x.classList.add("correct");});
      Array.prototype.forEach.call(host.querySelectorAll(".opt"),function(x){x.disabled=true;});done(ok,ex.e);};host.appendChild(b);});}
function exCorrect(host,ex,done){
  host.appendChild(el("div","correct-orig","<span class='lbl'>Fix this sentence</span>"+ex.orig));
  host.appendChild(el("h3","q-title sm","Which version is correct?"));
  ex.o.forEach(function(o,i){var b=el("button","opt","<span class='key'>"+String.fromCharCode(65+i)+"</span><span>"+o+"</span>");
    b.onclick=function(){if(host.dataset.l)return;host.dataset.l="1";var ok=i===ex.a;b.classList.add(ok?"correct":"wrong");
      if(!ok)host.querySelectorAll(".opt")[ex.a].classList.add("correct");
      Array.prototype.forEach.call(host.querySelectorAll(".opt"),function(x){x.disabled=true;});done(ok,ex.e);};host.appendChild(b);});}
function exFill(host,ex,done){host.appendChild(el("h3","q-title sm",ex.q));
  var inp=el("input","text-in");inp.placeholder="Type your answer...";inp.autocapitalize="none";inp.autocomplete="off";host.appendChild(inp);
  var ck=el("button","btn","Check");ck.style.marginTop="14px";
  ck.onclick=function(){if(host.dataset.l)return;host.dataset.l="1";var ok=norm(inp.value)===norm(ex.a);inp.style.borderColor=ok?"var(--em)":"var(--rd)";inp.disabled=true;ck.disabled=true;done(ok,(ok?"":"Answer: <b>"+ex.a+"</b>. ")+ex.e);};
  inp.addEventListener("keydown",function(e){if(e.key==="Enter")ck.click();});host.appendChild(ck);setTimeout(function(){inp.focus();},50);}
function exOrder(host,ex,done){host.appendChild(el("h3","q-title sm","Put the words in order."));
  var clean=ex.s.replace(/[.?!]$/,""),words=clean.split(" ");
  var line=el("div","build-line"),bank=el("div","bank");host.appendChild(line);host.appendChild(bank);
  var placed=[],sh=words.map(function(w,i){return{w:w,i:i};});shuffle(sh);
  sh.forEach(function(item){var chip=el("button","chip",item.w);chip.onclick=function(){if(bank.dataset.l)return;chip.classList.add("used");
    var pc=el("button","chip placed",item.w);pc.onclick=function(){if(bank.dataset.l)return;pc.remove();chip.classList.remove("used");placed=placed.filter(function(p){return p.pc!==pc;});sync();};
    line.appendChild(pc);placed.push({w:item.w,pc:pc});sync();};bank.appendChild(chip);});
  var ck=el("button","btn","Check");ck.style.marginTop="16px";ck.disabled=true;
  function sync(){ck.disabled=placed.length!==words.length;}
  ck.onclick=function(){if(bank.dataset.l)return;bank.dataset.l="1";var ok=norm(placed.map(function(p){return p.w;}).join(" "))===norm(clean);done(ok,(ok?"":"Correct: <b>"+ex.s+"</b>. ")+(ex.e||""));};host.appendChild(ck);}
function exMatch(host,ex,done){host.appendChild(el("h3","q-title sm",ex.p));
  var left=ex.pairs.map(function(p,i){return{t:p[0],i:i};}),right=ex.pairs.map(function(p,i){return{t:p[1],i:i};});shuffle(left);shuffle(right);
  var grid=el("div","match-grid"),lc=el("div","mcol"),rc=el("div","mcol");grid.appendChild(lc);grid.appendChild(rc);host.appendChild(grid);
  var sel=null,matched=0;
  function tile(item){var t=el("button","mtile",item.t);t.dataset.i=item.i;t.onclick=function(){if(t.classList.contains("matched"))return;
    if(!sel){sel=t;t.classList.add("sel");return;}if(sel===t){t.classList.remove("sel");sel=null;return;}
    if(sel.parentNode===t.parentNode){sel.classList.remove("sel");sel=t;t.classList.add("sel");return;}
    if(sel.dataset.i===t.dataset.i){sel.classList.add("matched");t.classList.add("matched");sel=null;matched++;if(matched===ex.pairs.length)done(true,"All matched!");}
    else{var bad=sel;t.classList.add("miss");bad.classList.add("miss");setTimeout(function(){t.classList.remove("miss");bad.classList.remove("miss","sel");},400);sel=null;}};return t;}
  left.forEach(function(it){lc.appendChild(tile(it));});right.forEach(function(it){rc.appendChild(tile(it));});}
function exFlash(host,ex,done){host.appendChild(el("h3","q-title sm","Tap to flip, then continue."));
  var f=el("div","flash");f.innerHTML="<div class='flash-in'><div class='flash-face flash-front'><div style='font-size:2rem'>"+(ex.n||"🃏")+"</div><div class='big'>"+ex.f+"</div><div class='sub'>tap to reveal</div></div><div class='flash-face flash-back'><div class='big'>"+ex.b+"</div><div class='sub'>"+ex.f+"</div></div></div>";
  f.onclick=function(){f.classList.toggle("flip");if(f.classList.contains("flip"))speak(ex.f);};host.appendChild(f);
  var b=el("button","btn green block","Got it ✓");b.onclick=function(){if(host.dataset.l)return;host.dataset.l="1";b.disabled=true;done(true,"<b>"+ex.f+"</b> — "+ex.b+".");};host.appendChild(b);}
function exListen(host,ex,done){host.appendChild(el("h3","q-title sm",ex.p));
  var card=el("div","audio-card"),pb=el("button","play-btn","▶");card.appendChild(pb);
  card.appendChild(el("div","muted",speechOn?"Tap to play. Replay as needed.":"Audio unavailable — text shown below."));
  if(!speechOn)card.appendChild(el("div","speak-word","\u201C"+ex.t+"\u201D"));host.appendChild(card);
  function play(){pb.classList.add("playing");pb.textContent="❚❚";speak(ex.t);setTimeout(function(){pb.classList.remove("playing");pb.textContent="▶";},Math.min(3000,700+ex.t.length*70));}
  pb.onclick=play;setTimeout(play,300);
  var qh=el("div");host.appendChild(qh);exMCQ(qh,{q:"",o:ex.o,a:ex.a,e:ex.e},done);var tt=qh.querySelector(".q-title");if(tt)tt.remove();}
function exSpeak(host,ex,done){host.appendChild(el("h3","q-title sm",ex.p));
  var card=el("div","audio-card"),pb=el("button","play-btn","🔊");card.appendChild(pb);card.appendChild(el("div","speak-word","\u201C"+ex.t+"\u201D"));if(ex.tip)card.appendChild(el("div","muted","💡 "+ex.tip));host.appendChild(card);
  pb.onclick=function(){pb.classList.add("playing");speak(ex.t);setTimeout(function(){pb.classList.remove("playing");},Math.min(3500,900+ex.t.length*70));};setTimeout(function(){speak(ex.t);},300);
  host.appendChild(el("div","muted","Listen, then say it aloud 2–3 times. Tap when done."));
  var b=el("button","btn green block","I said it ✓");b.style.marginTop="14px";b.onclick=function(){if(host.dataset.l)return;host.dataset.l="1";b.disabled=true;done(true,"Speaking out loud builds real fluency.");};host.appendChild(b);}
function exReading(host,ex,done){host.appendChild(el("h3","q-title sm",ex.p));
  host.appendChild(el("div","learn-card",ex.pass));
  var total=ex.qs.length,ans=0,correct=0;
  ex.qs.forEach(function(q,i){var wrap=el("div");wrap.style.marginTop="14px";wrap.appendChild(el("div","stage-tag","Q"+(i+1)));host.appendChild(wrap);var locked=false;
    q.o.forEach(function(o,oi){var b=el("button","opt","<span class='key'>"+String.fromCharCode(65+oi)+"</span><span>"+o+"</span>");
      b.onclick=function(){if(locked)return;locked=true;var ok=oi===q.a;b.classList.add(ok?"correct":"wrong");
        if(!ok)wrap.querySelectorAll(".opt")[q.a].classList.add("correct");Array.prototype.forEach.call(wrap.querySelectorAll(".opt"),function(x){x.disabled=true;});
        ans++;if(ok)correct++;if(ans===total)done(correct===total,correct+" of "+total+" correct.");};wrap.appendChild(b);});});}
function exWriting(host,ex,done){host.appendChild(el("h3","q-title sm",ex.p));
  var ta=el("textarea","text-in");ta.placeholder="Write your answer...";host.appendChild(ta);
  var b=el("button","btn","Compare with model");b.style.marginTop="14px";
  b.onclick=function(){if(host.dataset.l)return;if(norm(ta.value).length<8){ta.style.borderColor="var(--rd)";return;}host.dataset.l="1";b.remove();ta.disabled=true;
    var model=el("div","answer");model.style.marginTop="14px";model.innerHTML="<b>✍️ Model answer</b><br>"+ex.m;host.appendChild(model);
    host.appendChild(el("div",null,"<div style='font-weight:800;margin:16px 0 8px'>Self-check:</div>"));
    var checks=[];ex.c.forEach(function(cc,i){var row=el("label","chk");row.innerHTML="<span class='box'></span><span>"+cc+"</span>";
      row.onclick=function(){var on=row.classList.toggle("on");$(".box",row).textContent=on?"✓":"";checks[i]=on;fin.disabled=checks.filter(Boolean).length===0;};host.appendChild(row);checks[i]=false;});
    var fin=el("button","btn green block","Done");fin.style.marginTop="10px";fin.disabled=true;fin.onclick=function(){fin.disabled=true;done(true,"You matched "+checks.filter(Boolean).length+" of "+ex.c.length+" points. Great writing practice!");};host.appendChild(fin);};
  host.appendChild(b);}

/* ---- COMPLETE ---- */
function stComplete(inner,foot){
  var L=SESSION.L,acc=SESSION.total?Math.round(SESSION.correct/SESSION.total*100):0;
  var first=!S.completed[L.id];var bonus=first?30:10;var totalXp=SESSION.xp+bonus;
  S.xp+=totalXp;addXpHist(totalXp);
  S.today.lessons++;S.today.xp+=totalXp;S.today.skills[L.skill]=1;
  S.week.lessons++;S.week.xp+=totalXp;S.week.skills[L.skill]=1;
  if(first){S.completed[L.id]=true;S.stats.lessons++;}
  S.scores[L.id]=Math.max(S.scores[L.id]||0,acc);
  if(acc>=60)S.stats.quizzes++;
  updateStreak();
  var before=levelInfo(S.xp-totalXp).level,after=levelInfo(S.xp).level;
  var badges=checkBadges();save();refreshTop();checkPeriodRewards();
  inner.innerHTML="<div class='complete'><div class='trophy'>"+(first?"🏆":"🎉")+"</div><h2>"+(first?"Lesson complete!":"Nice replay!")+"</h2>"+
    "<div class='xp-earned'>⚡ +"+totalXp+" XP</div>"+
    "<div class='reward-row'><div class='r'><b>"+acc+"%</b><span>Accuracy</span></div><div class='r'><b>🔥 "+S.streak+"</b><span>Streak</span></div><div class='r'><b>⭐ "+after+"</b><span>Level</span></div></div></div>";
  if(after>before)inner.appendChild(el("div","feedback good show","<b>⭐ Level up! You reached Level "+after+"</b>"));
  var next=nextLesson(L);
  var again=el("button","btn ghost","↻ Replay");again.onclick=function(){openLesson(L);};again.style.flex="1";
  var nx=el("button","btn","Continue  →");nx.style.flex="2";nx.onclick=function(){if(next)openLesson(next);else closePlayer();};
  var wrap=el("div");wrap.style.cssText="display:flex;gap:12px;width:100%";wrap.appendChild(again);wrap.appendChild(nx);foot.appendChild(wrap);
  SESSION.done=true;confetti();
  badges.forEach(function(b,i){setTimeout(function(){toast(b.icon,"Badge unlocked!",b.name);},500+i*700);});
}
function stRevDone(inner,foot){var acc=SESSION.total?Math.round(SESSION.correct/SESSION.total*100):0;
  S.xp+=SESSION.xp;addXpHist(SESSION.xp);S.today.xp+=SESSION.xp;S.week.xp+=SESSION.xp;save();refreshTop();checkPeriodRewards();
  inner.innerHTML="<div class='complete'><div class='trophy'>"+(acc>=80?"🏆":"💪")+"</div><h2>Revision done!</h2><div class='xp-earned'>⚡ +"+SESSION.xp+" XP</div><div class='reward-row'><div class='r'><b>"+SESSION.correct+"/"+SESSION.total+"</b><span>Correct</span></div><div class='r'><b>"+acc+"%</b><span>Accuracy</span></div></div></div>";
  SESSION.done=true;footBtn(foot,"Done  →",closePlayer,"green");if(SESSION.correct>0)confetti();}
function nextLesson(L){var i=LESSONS.indexOf(L);for(var j=i+1;j<LESSONS.length;j++)if(!S.completed[LESSONS[j].id])return LESSONS[j];return LESSONS[i+1]||null;}

/* ============ XP / STREAK ============ */
function addXp(n){/* xp already added to S.xp by caller for missions; keep hist */addXpHist(n);}
function addXpHist(n){var t=dkey();S.xpHist[t]=(S.xpHist[t]||0)+n;}
function updateStreak(){var t=dkey();if(S.lastGoalDate===t){}else if(S.lastGoalDate&&daysBetween(S.lastGoalDate,t)===1)S.streak++;else S.streak=1;
  S.lastGoalDate=t;S.lastActive=t;if(S.streak>S.best)S.best=S.streak;}

/* ============ FX ============ */
function refreshTop(){$("#p-xp").textContent=S.xp;$("#p-streak").textContent=S.streak;}
function toast(icon,title,sub){var t=el("div","toast","<div class='ti'>"+icon+"</div><div><b>"+title+"</b><span>"+sub+"</span></div>");$("#toasts").appendChild(t);
  setTimeout(function(){t.style.transition="opacity .4s,transform .4s";t.style.opacity="0";t.style.transform="translateX(120%)";setTimeout(function(){t.remove();},400);},3300);}
function confetti(){if(window.matchMedia&&window.matchMedia("(prefers-reduced-motion:reduce)").matches)return;
  var c=el("div","confetti");document.body.appendChild(c);var cols=["#6366F1","#8B5CF6","#D946EF","#22D3EE","#10B981","#F59E0B"];
  for(var i=0;i<70;i++){var p=el("i");p.style.left=Math.random()*100+"%";p.style.background=cols[i%cols.length];p.style.animationDuration=(1.6+Math.random()*1.6)+"s";p.style.animationDelay=(Math.random()*.4)+"s";p.style.transform="rotate("+Math.random()*360+"deg)";if(Math.random()>.5)p.style.borderRadius="50%";c.appendChild(p);}
  setTimeout(function(){c.remove();},3600);}

/* ============ THEME + DRAWER ============ */
function applyTheme(t){document.documentElement.setAttribute("data-theme",t);$("#themeBtn").textContent=t==="dark"?"☀️":"🌙";S.theme=t;save();}
$("#themeBtn").onclick=function(){applyTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark");};
function openDrawer(){$("#sidebar").classList.add("open");$("#scrim").classList.add("show");}
function closeDrawer(){$("#sidebar").classList.remove("open");$("#scrim").classList.remove("show");}
$("#hamb").onclick=openDrawer;$("#scrim").onclick=closeDrawer;

/* ============ INIT ============ */
(function init(){
  applyTheme(S.theme||"dark");
  rollPeriods();
  if(S.lastActive){var g=daysBetween(S.lastActive,dkey());if(g>1&&S.lastGoalDate&&daysBetween(S.lastGoalDate,dkey())>1)S.streak=0;save();}
  refreshTop();renderNav();renderDashboard();
  if(speechOn)try{window.speechSynthesis.getVoices();}catch(e){}
})();
</script>
</body>
</html>
