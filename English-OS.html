<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>English OS — Your operating system for English</title>
<!--
  ENGLISH OS — single-file learning platform
  Sections:  CSS tokens & components  |  JS modules 1–19 (see comments)
  No external frameworks, fonts, or network calls. All progress in localStorage.
-->
<style>
/* ============================================================
   DESIGN TOKENS  (aurora / terminal identity)
   ============================================================ */
:root{
  --mint:#2DD4BF; --sky:#38BDF8; --vio:#818CF8; --iris:#6366F1;
  --am:#F59E0B; --em:#22C55E; --rd:#F43F5E; --rose:#FB7185;
  --aurora:linear-gradient(120deg,var(--mint),var(--sky) 48%,var(--vio));
  --r:18px; --r-sm:12px; --r-lg:26px; --tap:46px; --sp:clamp(15px,3.4vw,26px);
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --mono:ui-monospace,"SF Mono","Cascadia Mono","Roboto Mono",Menlo,Consolas,monospace;
  --ease:cubic-bezier(.22,.7,.24,1);
}
:root[data-theme="dark"]{
  --bg:#0A0F1C; --text:#EAF0FA; --muted:#98A3BC; --faint:#5C6786;
  --glass:rgba(20,27,45,.6); --glass-2:rgba(28,37,60,.55); --glass-hi:rgba(255,255,255,.06);
  --line:rgba(255,255,255,.09); --line-2:rgba(255,255,255,.16);
  --shadow:0 8px 30px -14px rgba(0,0,0,.6); --shadow-lg:0 30px 80px -30px rgba(0,0,0,.85);
  --auroraA:.42;
}
:root[data-theme="light"]{
  --bg:#EEF2F9; --text:#0E1526; --muted:#4B5772; --faint:#8A96B4;
  --glass:rgba(255,255,255,.66); --glass-2:rgba(255,255,255,.52); --glass-hi:rgba(12,20,40,.04);
  --line:rgba(16,22,42,.09); --line-2:rgba(16,22,42,.16);
  --shadow:0 8px 28px -16px rgba(20,30,70,.28); --shadow-lg:0 30px 70px -30px rgba(20,30,70,.4);
  --auroraA:.34;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:1rem}
:focus-visible{outline:2px solid var(--sky);outline-offset:2px;border-radius:8px}
h1,h2,h3,h4{margin:0;line-height:1.16;letter-spacing:-.02em;font-weight:800}
p{margin:0}.muted{color:var(--muted)}.mono{font-family:var(--mono)}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:9px}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}

/* ambient aurora background */
.bg-fx{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}
.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:var(--auroraA);animation:drift 26s var(--ease) infinite}
.blob.b1{width:540px;height:540px;background:var(--mint);top:-160px;left:-120px}
.blob.b2{width:520px;height:520px;background:var(--vio);bottom:-180px;right:-120px;animation-delay:-9s}
.blob.b3{width:420px;height:420px;background:var(--sky);top:42%;left:52%;animation-delay:-17s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(46px,-32px) scale(1.1)}66%{transform:translate(-34px,44px) scale(.94)}}

.glass{background:var(--glass);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);border:1px solid var(--line);box-shadow:var(--shadow)}

/* shell */
.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}
@media(max-width:940px){.app{grid-template-columns:1fr}}
.dock{position:sticky;top:0;height:100vh;overflow-y:auto;padding:18px 12px;display:flex;flex-direction:column;gap:2px;z-index:60;
  border-right:1px solid var(--line);background:var(--glass);backdrop-filter:blur(22px) saturate(1.4);-webkit-backdrop-filter:blur(22px)}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 14px}
.brand .logo{width:42px;height:42px;border-radius:12px;background:var(--aurora);display:grid;place-items:center;font-size:20px;box-shadow:0 8px 20px -6px var(--sky)}
.brand b{font-size:1.1rem;font-weight:900;display:block;line-height:1;letter-spacing:-.02em}
.brand span{font-family:var(--mono);font-size:.62rem;color:var(--faint);font-weight:600;letter-spacing:.02em}
.nav-group{font-family:var(--mono);font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);padding:13px 12px 5px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:11px;font-weight:600;font-size:.88rem;color:var(--muted);min-height:42px;width:100%;text-align:left;transition:.15s}
.nav-item:hover{background:var(--glass-hi);color:var(--text)}
.nav-item.active{background:var(--aurora);color:#04121a;font-weight:800;box-shadow:0 8px 18px -8px var(--sky)}
.nav-item .ic{font-size:1.05rem;width:20px;text-align:center;flex:none}
.nav-item .cnt{margin-left:auto;font-family:var(--mono);font-size:.6rem;font-weight:700;background:var(--glass-hi);border-radius:999px;padding:2px 7px}
.nav-item.active .cnt{background:rgba(0,0,0,.18)}

.main{min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:9px;padding:11px var(--sp);border-bottom:1px solid var(--line);
  background:var(--glass);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px)}
.hamb{display:none;width:44px;height:44px;border-radius:12px;font-size:1.2rem;place-items:center;background:var(--glass-2);border:1px solid var(--line)}
@media(max-width:940px){.hamb{display:grid}}
.cmd-trigger{flex:1;max-width:420px;display:flex;align-items:center;gap:10px;background:var(--glass-2);border:1px solid var(--line);border-radius:12px;padding:0 12px;height:44px;color:var(--muted);font-weight:600}
.cmd-trigger kbd{margin-left:auto;font-family:var(--mono);font-size:.68rem;background:var(--glass-hi);border:1px solid var(--line);border-radius:6px;padding:2px 7px;color:var(--faint)}
.pills{display:flex;gap:8px;margin-left:auto;align-items:center;flex-wrap:wrap}
.pill{display:flex;align-items:center;gap:6px;background:var(--glass-2);border:1px solid var(--line);padding:7px 11px;border-radius:999px;font-family:var(--mono);font-weight:700;font-size:.8rem}
.pill.streak{color:#FB923C}.pill.xp{color:var(--sky)}.pill.lvl{color:var(--mint)}
.icon-btn{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:1.05rem;background:var(--glass-2);border:1px solid var(--line)}
.view{padding:var(--sp);max-width:1200px;width:100%;margin:0 auto;animation:vin .4s var(--ease)}
@keyframes vin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.scrim{position:fixed;inset:0;background:rgba(4,7,16,.6);z-index:59;display:none;opacity:0;transition:.25s;backdrop-filter:blur(3px)}
.scrim.show{display:block;opacity:1}
@media(max-width:940px){.dock{position:fixed;left:0;top:0;width:272px;transform:translateX(-104%);transition:transform .28s var(--ease)}.dock.open{transform:none}}

/* generic */
.page-head{margin-bottom:20px}
.page-head .eyebrow{font-family:var(--mono);font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sky)}
.page-head h1{font-size:clamp(1.7rem,4.5vw,2.5rem);margin-top:7px}
.page-head p{color:var(--muted);margin-top:8px;max-width:66ch}
.grid{display:grid;gap:15px}
.g4{grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}
.g3{grid-template-columns:repeat(auto-fit,minmax(210px,1fr))}
.g2{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
.mods{grid-template-columns:repeat(auto-fill,minmax(210px,1fr))}
.card{border-radius:var(--r);padding:20px;background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid var(--line);box-shadow:var(--shadow)}
.btn{background:var(--aurora);color:#04121a;font-weight:800;border-radius:13px;padding:13px 20px;min-height:var(--tap);box-shadow:0 10px 24px -12px var(--sky);transition:transform .12s,filter .15s;font-size:.93rem;display:inline-flex;align-items:center;gap:8px;justify-content:center}
.btn:hover{filter:brightness(1.06)}.btn:active{transform:scale(.97)}
.btn.ghost{background:var(--glass-2);color:var(--text);border:1px solid var(--line-2);box-shadow:none}
.btn.green{background:linear-gradient(120deg,var(--em),#4ade80);color:#04160a}
.btn.block{width:100%}.btn.sm{padding:9px 14px;font-size:.84rem;min-height:40px;border-radius:11px}
.btn[disabled]{opacity:.5;pointer-events:none}
.section-title{display:flex;align-items:center;justify-content:space-between;margin:24px 0 13px;gap:12px;flex-wrap:wrap}
.section-title h2{font-size:1.24rem}
.stat{border-radius:var(--r);padding:15px;background:var(--glass);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.stat .em{font-size:1.25rem}.stat b{font-size:1.5rem;font-weight:900;display:block;margin-top:4px;letter-spacing:-.03em;font-family:var(--mono)}
.stat span{color:var(--muted);font-size:.76rem;font-weight:600}
.diff{font-family:var(--mono);font-size:.62rem;font-weight:700;padding:3px 8px;border-radius:999px;white-space:nowrap}
.diff.d1{background:rgba(34,197,94,.16);color:#4ade80}.diff.d2{background:rgba(245,158,11,.16);color:#fbbf24}.diff.d3{background:rgba(244,63,94,.16);color:#fb7185}
.chip-f{background:var(--glass-2);border:1px solid var(--line-2);border-radius:999px;padding:8px 14px;font-weight:700;font-size:.82rem;min-height:40px}
.chip-f.on{background:var(--aurora);color:#04121a;border-color:transparent}
.filters{display:flex;gap:8px;flex-wrap:wrap}

/* dashboard hero / mission control */
.mc{display:grid;grid-template-columns:1.3fr 1fr;gap:15px}
@media(max-width:820px){.mc{grid-template-columns:1fr}}
.mc-hero{border-radius:var(--r-lg);padding:26px;position:relative;overflow:hidden;color:#04121a;background:var(--aurora);box-shadow:var(--shadow-lg)}
.mc-hero::after{content:"";position:absolute;right:-50px;top:-60px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.18)}
.mc-hero .k{font-family:var(--mono);font-size:.7rem;font-weight:700;letter-spacing:.06em;opacity:.8}
.mc-hero h2{font-size:clamp(1.4rem,3.6vw,1.9rem);margin:6px 0;position:relative;z-index:1}
.mc-hero .goal-wrap{display:flex;gap:20px;align-items:center;margin-top:12px;position:relative;z-index:1;flex-wrap:wrap}
.ring-wrap{position:relative;width:118px;height:118px;flex:none}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-bg{stroke:rgba(4,18,26,.18)}.ring-fg{stroke:#04121a;stroke-linecap:round;transition:stroke-dashoffset 1s var(--ease)}
.ring-center{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
.ring-center .big{font-size:1.5rem;font-weight:900;font-family:var(--mono)}.ring-center small{font-size:.6rem;font-weight:700;opacity:.8}
.goal-seg{display:flex;gap:6px;margin-top:14px;position:relative;z-index:1;flex-wrap:wrap}
.goal-seg button{font-family:var(--mono);font-size:.72rem;font-weight:700;padding:7px 12px;border-radius:9px;background:rgba(4,18,26,.12);color:#04121a}
.goal-seg button.on{background:#04121a;color:var(--mint)}
.mc-side{display:flex;flex-direction:column;gap:12px}
.rec-card{border-radius:var(--r);padding:18px;background:var(--glass);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.rec-card .k{font-family:var(--mono);font-size:.66rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--sky)}
.rec-card .rc-body{display:flex;align-items:center;gap:12px;margin:10px 0 14px}
.rec-card .rc-ic{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-size:1.4rem;flex:none}
.rec-card .rc-body b{font-size:1.02rem;display:block}.rec-card .rc-body span{font-size:.8rem;color:var(--muted)}

/* module cards */
.mod-card{border-radius:var(--r);padding:17px;text-align:left;display:flex;flex-direction:column;gap:9px;background:var(--glass);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);transition:transform .15s var(--ease),box-shadow .15s;position:relative}
.mod-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.mod-card .m-ic{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-size:1.35rem}
.mod-card h3{font-size:1.02rem;line-height:1.2}.mod-card p{font-size:.79rem;color:var(--muted);flex:1;line-height:1.4}
.mod-card .m-foot{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:.68rem;color:var(--faint);font-weight:700}
.mini-bar{height:6px;background:var(--glass-hi);border-radius:999px;overflow:hidden;flex:1}
.mini-bar i{display:block;height:100%;border-radius:999px;width:0;transition:width .6s var(--ease)}
.weak-tag{position:absolute;top:12px;right:12px;font-family:var(--mono);font-size:.58rem;font-weight:700;color:var(--rose);background:rgba(244,63,94,.14);padding:2px 7px;border-radius:999px}

/* chart + calendar */
.chart{display:flex;align-items:flex-end;gap:min(2.6vw,13px);height:140px;padding-top:8px}
.chart .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.chart .col .b{width:100%;max-width:30px;background:var(--aurora);border-radius:6px 6px 2px 2px;min-height:4px;transition:height .7s var(--ease)}
.chart .col.today .b{background:linear-gradient(180deg,#FBBF24,#FB923C)}
.chart .col small{font-family:var(--mono);font-size:.62rem;color:var(--muted);font-weight:700}.chart .col .v{font-family:var(--mono);font-size:.6rem;color:var(--faint);font-weight:700}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal .dow{font-family:var(--mono);font-size:.6rem;color:var(--faint);text-align:center;font-weight:700}
.cal .cell{aspect-ratio:1;border-radius:9px;background:var(--glass-hi);display:grid;place-items:center;font-family:var(--mono);font-size:.72rem;color:var(--muted);border:1px solid transparent}
.cal .cell.active{background:var(--aurora);color:#04121a;font-weight:800}
.cal .cell.today{border-color:var(--sky)}
.cal .cell.empty{background:none}

/* achievements */
.badge{display:flex;gap:12px;align-items:center;border-radius:15px;padding:14px;background:var(--glass-2);border:1px solid var(--line);opacity:.5;filter:grayscale(.7);transition:.3s}
.badge.on{opacity:1;filter:none}
.badge .b-ic{width:46px;height:46px;border-radius:13px;background:var(--glass-hi);display:grid;place-items:center;font-size:1.4rem;flex:none}
.badge.on .b-ic{background:linear-gradient(135deg,#FDE68A,#F59E0B)}
.badge b{display:block;font-size:.9rem}.badge span{font-size:.74rem;color:var(--muted)}

/* SESSION PLAYER */
.player{position:fixed;inset:0;z-index:100;display:none;flex-direction:column;background:var(--bg)}
.player.show{display:flex}.player .bg-fx{z-index:0}
.pl-top{display:flex;align-items:center;gap:12px;padding:12px var(--sp);border-bottom:1px solid var(--line);background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);z-index:2}
.pl-close{width:40px;height:40px;border-radius:12px;font-size:1.3rem;color:var(--muted);flex:none}
.pl-prog{flex:1;height:11px;background:var(--glass-hi);border-radius:999px;overflow:hidden}
.pl-prog i{display:block;height:100%;background:linear-gradient(90deg,var(--em),#4ade80);border-radius:999px;width:0;transition:width .4s var(--ease)}
.pl-info{font-family:var(--mono);font-weight:700;font-size:.78rem;white-space:nowrap;display:flex;gap:10px;align-items:center}
.timer{color:#FB923C}.timer.low{color:var(--rd);animation:blink 1s infinite}@keyframes blink{50%{opacity:.4}}
.pl-scroll{flex:1;overflow-y:auto;padding:var(--sp);z-index:1}
.pl-inner{max-width:640px;margin:0 auto;padding-bottom:120px}
.pl-foot{border-top:1px solid var(--line);padding:14px var(--sp);background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);z-index:2}
.pl-foot .in{max-width:640px;margin:0 auto;display:flex;gap:12px}
.stage-tag{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:.66rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:var(--aurora);color:#04121a;padding:5px 11px;border-radius:999px;margin-bottom:14px}
.q-title{font-size:1.28rem;font-weight:800;margin-bottom:18px}.q-title.sm{font-size:1.05rem}
.learn-card{border-radius:var(--r);padding:22px;background:var(--glass);border:1px solid var(--line);box-shadow:var(--shadow);margin-bottom:16px;line-height:1.7;font-size:1.04rem;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.learn-card .hl{color:var(--sky);font-weight:800}
.opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--glass);border:2px solid var(--line-2);border-radius:var(--r-sm);padding:14px 16px;margin-bottom:10px;font-weight:600;min-height:var(--tap);transition:.14s;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.opt:hover{border-color:var(--sky)}.opt:active{transform:scale(.99)}
.opt .key{width:26px;height:26px;border-radius:7px;background:var(--glass-hi);display:grid;place-items:center;font-family:var(--mono);font-size:.75rem;font-weight:700;flex:none;color:var(--muted)}
.opt.correct{border-color:var(--em);background:rgba(34,197,94,.14)}.opt.correct .key{background:var(--em);color:#04160a}
.opt.wrong{border-color:var(--rd);background:rgba(244,63,94,.14)}.opt.wrong .key{background:var(--rd);color:#fff}
.opt[disabled]{pointer-events:none}
.text-in{width:100%;background:var(--glass);border:2px solid var(--line-2);border-radius:var(--r-sm);padding:14px 16px;color:var(--text);transition:.15s;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.text-in:focus{border-color:var(--sky);outline:none}
.text-in.big{font-size:1.2rem;text-align:center;font-weight:700}
textarea.text-in{min-height:118px;resize:vertical;line-height:1.6}
.build-line{min-height:54px;border-bottom:2px dashed var(--line-2);display:flex;flex-wrap:wrap;gap:8px;padding:9px 4px;margin-bottom:18px;align-content:flex-start}
.bank{display:flex;flex-wrap:wrap;gap:9px}
.chip{background:var(--glass);border:2px solid var(--line-2);border-radius:11px;padding:9px 14px;font-weight:700;box-shadow:var(--shadow);transition:.1s}
.chip:active{transform:scale(.94)}.chip.used{opacity:0;pointer-events:none;width:0;padding:0;margin:0;border:0}
.chip.placed{background:rgba(56,189,248,.18);border-color:var(--sky)}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}.mcol{display:flex;flex-direction:column;gap:10px}
.mtile{background:var(--glass);border:2px solid var(--line-2);border-radius:11px;padding:12px;font-weight:600;text-align:center;min-height:var(--tap);transition:.14s;font-size:.9rem}
.mtile.sel{border-color:var(--sky);background:rgba(56,189,248,.14)}
.mtile.matched{border-color:var(--em);background:rgba(34,197,94,.14);pointer-events:none;opacity:.7}
.mtile.miss{border-color:var(--rd);animation:shake .35s}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.flash{perspective:1500px;height:240px;margin-bottom:14px}
.flash-in{position:relative;width:100%;height:100%;transition:transform .6s var(--ease);transform-style:preserve-3d;cursor:pointer}
.flash.flip .flash-in{transform:rotateY(180deg)}
.flash-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r-lg);display:flex;flex-direction:column;justify-content:center;text-align:center;gap:8px;padding:24px;border:1px solid var(--line);box-shadow:var(--shadow-lg)}
.flash-front{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.flash-back{background:var(--aurora);color:#04121a;transform:rotateY(180deg)}
.flash-face .big{font-size:1.9rem;font-weight:900}.flash-face .sub{opacity:.85;font-size:.9rem}
.audio-card{border-radius:var(--r-lg);padding:22px;text-align:center;margin-bottom:16px;background:var(--glass);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}

   ============================================================ */
var Store=(function(){var mem={},ok=false;try{var k="__eos__";localStorage.setItem(k,"1");localStorage.removeItem(k);ok=true;}catch(e){}
  return{get:function(k){try{if(ok)return localStorage.getItem(k);}catch(e){}return k in mem?mem[k]:null;},
         set:function(k,v){try{if(ok){localStorage.setItem(k,v);return;}}catch(e){}mem[k]=v;}};})();

/* ============================================================
   2. DATE UTILS
   ============================================================ */
var DAY=86400000;
function dkey(d){d=d||new Date();return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}
function addDays(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return x;}
function daysBetween(a,b){var pa=a.split("-").map(Number),pb=b.split("-").map(Number);return Math.round((new Date(pb[0],pb[1]-1,pb[2])-new Date(pa[0],pa[1]-1,pa[2]))/DAY);}
function weekKey(d){d=d||new Date();var on=new Date(d.getFullYear(),0,1);var day=Math.floor((d-on)/DAY);return d.getFullYear()+"-W"+Math.floor((day+on.getDay())/7);}
function seedFrom(str){var s=0;for(var i=0;i<str.length;i++)s=(s*31+str.charCodeAt(i))>>>0;return s;}

/* ============================================================

 {k:"foundations",n:"English Foundations",ic:"🌱",c:"#22C55E",g:"core",d:"Alphabet, sounds and the building blocks of English."},

 {k:"speaking",n:"Speaking Studio",ic:"🎙️",c:"#EF4444",g:"core",d:"Shadowing, fluency and extending your answers."},
 {k:"public",n:"Public Speaking Academy",ic:"🎯",c:"#F97316",g:"core",d:"Hooks, structure and commanding a room."},

 {k:"revision",n:"Revision Center",ic:"🔁",c:"#EAB308",g:"special",d:"Your spaced-repetition review queue and reflection journal."}
];

function srsCard(id){if(!S.srs[id])S.srs[id]={ef:2.5,interval:0,due:dkey(),reps:0,lapses:0,correct:0,seen:0};return S.srs[id];}
function srsReview(id,ok){var c=srsCard(id);c.seen++;
  if(ok){c.correct++;c.reps++;
    if(c.reps===1)c.interval=1;else if(c.reps===2)c.interval=3;else c.interval=Math.max(1,Math.round(c.interval*c.ef));
    c.ef=Math.min(2.8,c.ef+0.1);
  }else{c.lapses++;c.reps=0;c.interval=1;c.ef=Math.max(1.3,c.ef-0.2);}
  c.due=dkey(addDays(new Date(),c.interval));return c;}
function dueQueue(){var out=[];allItems().forEach(function(it){var c=S.srs[it.id];if(c&&c.seen>0&&daysBetween(c.due,dkey())>=0)out.push(it);});

   ============================================================ */
function itemMastery(id){var c=S.srs[id];if(!c||!c.seen)return 0;
  var acc=c.correct/c.seen;var maturity=Math.min(1,c.interval/21);return Math.max(0,Math.min(1,acc*0.55+maturity*0.45));}
function moduleMastery(mk){var items=BANK[mk]||[];if(!items.length)return 0;
  var sum=0;items.forEach(function(it){sum+=itemMastery(it.id);});return Math.round(sum/items.length*100);}
function overallMastery(){var s=0;CORE.forEach(function(m){s+=moduleMastery(m.k);});return Math.round(s/CORE.length);}
function weakModules(){/* started modules with lowest mastery */
  return CORE.map(function(m){return{m:m,mm:moduleMastery(m.k),seen:!!S.seenModules[m.k]};})
    .filter(function(x){return x.seen;}).sort(function(a,b){return a.mm-b.mm;});}
function recommend(){var weak=weakModules();
  if(weak.length&&weak[0].mm<70)return{module:weak[0].m,reason:"Your weakest area right now"};
  var next=CORE.find(function(m){return !S.seenModules[m.k];});
  if(next)return{module:next,reason:"A new module to explore"};
  return{module:CORE[Math.floor(Math.random()*CORE.length)],reason:"Keep your skills sharp"};}
function recordAnswer(ok){S.recent.push(ok?1:0);if(S.recent.length>10)S.recent.shift();
  var acc=S.recent.reduce(function(a,b){return a+b;},0)/S.recent.length;
  if(S.recent.length>=6){if(acc>=0.8&&S.adaptLevel<3)S.adaptLevel++;else if(acc<0.5&&S.adaptLevel>1)S.adaptLevel--;}}
/* pick a session queue for a module: due items first, then new/rusty at adaptive level */
function buildSession(mk,size){size=size||6;var items=BANK[mk].slice();
  var due=items.filter(function(it){var c=S.srs[it.id];return c&&c.seen>0&&daysBetween(c.due,dkey())>=0;});
  var lvl=S.adaptLevel;
  var fresh=items.filter(function(it){return due.indexOf(it)<0;})
    .sort(function(a,b){var ca=S.srs[a.id],cb=S.srs[b.id];
      var sa=(ca?ca.seen:0)+Math.abs(a.lvl-lvl)*0.5,sb=(cb?cb.seen:0)+Math.abs(b.lvl-lvl)*0.5;return sa-sb;});
  var q=due.concat(fresh).slice(0,Math.min(size,items.length));
  if(q.length<Math.min(size,items.length))q=items.slice(0,size);
  return q;}

function reviewQueue(){var due=allItems().filter(function(it){var c=S.srs[it.id];return c&&c.seen>0&&daysBetween(c.due,dkey())>=0;});
  /* order: most overdue & lowest mastery first, keep only quizable */
  due=due.filter(quizable);
  due.sort(function(a,b){return (daysBetween(dkey(),S.srs[b.id].due))-(daysBetween(dkey(),S.srs[a.id].due))||itemMastery(a.id)-itemMastery(b.id);});
  if(due.length<4){/* supplement with weakest seen items */
    var extra=allItems().filter(function(it){var c=S.srs[it.id];return c&&c.seen>0&&due.indexOf(it)<0&&quizable(it);}).sort(function(a,b){return itemMastery(a.id)-itemMastery(b.id);});
    due=due.concat(extra).slice(0,10);}
  return due;}
function quizable(it){return ["mcq","fill","order","match","correct","listen","reading","memory","drag"].indexOf(it.type)>=0;}

function dailyChallengeSet(){var pool=allItems().filter(quizable);var seed=seedFrom(dkey());var out=[],used={};
  for(var i=0;i<7&&out.length<pool.length;i++){var idx=seed%pool.length;var guard=0;while(used[idx]&&guard<pool.length){idx=(idx+1)%pool.length;guard++;}used[idx]=1;out.push(pool[idx]);seed=(seed*1103515245+12345)>>>0;}
  return out;}

  var ck=el("button","btn","Check");ck.style.marginTop="16px";ck.disabled=true;function sync(){ck.disabled=placed.length!==words.length;}
  ck.onclick=function(){if(bank.dataset.l)return;bank.dataset.l="1";var ok=norm(placed.map(function(p){return p.w;}).join(" "))===norm(clean);done(ok,(ok?"":"Correct: <b>"+ex.s+"</b>. ")+(ex.e||""));};host.appendChild(ck);};

    if(sel.parentNode===t.parentNode){sel.classList.remove("sel");sel=t;t.classList.add("sel");return;}
    if(sel.dataset.i===t.dataset.i){sel.classList.add("matched");t.classList.add("matched");sel=null;matched++;if(matched===ex.pairs.length)done(true,"All matched!");}
    else{var bad=sel;t.classList.add("miss");bad.classList.add("miss");setTimeout(function(){t.classList.remove("miss");bad.classList.remove("miss","sel");},400);sel=null;}};return t;}
  left.forEach(function(it){lc.appendChild(tile(it));});right.forEach(function(it){rc.appendChild(tile(it));});};
COMP.flash=function(host,ex,done){host.appendChild(el("h3","q-title sm","Tap to flip, then continue."));
  var f=el("div","flash");f.innerHTML="<div class='flash-in'><div class='flash-face flash-front'><div style='font-size:1.9rem'>"+(ex.n||"🃏")+"</div><div class='big'>"+ex.f+"</div><div class='sub'>tap to reveal</div></div><div class='flash-face flash-back'><div class='big'>"+ex.b+"</div><div class='sub'>"+ex.f+"</div></div></div>";
  f.onclick=function(){f.classList.toggle("flip");if(f.classList.contains("flip"))speak(ex.f);};host.appendChild(f);
  var b=el("button","btn green block","Got it ✓");b.onclick=function(){if(host.dataset.l)return;host.dataset.l="1";b.disabled=true;done(true,"<b>"+ex.f+"</b> — "+ex.b+".");};host.appendChild(b);};
COMP.listen=function(host,ex,done){host.appendChild(el("h3","q-title sm",ex.p));
  var card=el("div","audio-card"),pb=el("button","play-btn","▶");card.appendChild(pb);
  card.appendChild(el("div","muted",speechOn?"Tap to play. Replay as needed.":"Audio unavailable — text below."));
  if(!speechOn)card.appendChild(el("div","speak-word","\u201C"+ex.t+"\u201D"));host.appendChild(card);
  function play(){pb.classList.add("playing");pb.textContent="❚❚";speak(ex.t);setTimeout(function(){pb.classList.remove("playing");pb.textContent="▶";},Math.min(3000,700+ex.t.length*70));}
  pb.onclick=play;setTimeout(play,300);
  var qh=el("div");host.appendChild(qh);COMP.mcq(qh,{o:ex.o,a:ex.a,e:ex.e},done);};
COMP.speak=function(host,ex,done){host.appendChild(el("h3","q-title sm",ex.p));
  var card=el("div","audio-card"),pb=el("button","play-btn","🔊");card.appendChild(pb);card.appendChild(el("div","speak-word","\u201C"+ex.t+"\u201D"));if(ex.tip)card.appendChild(el("div","muted","💡 "+ex.tip));host.appendChild(card);
  pb.onclick=function(){pb.classList.add("playing");speak(ex.t);setTimeout(function(){pb.classList.remove("playing");},Math.min(3500,900+ex.t.length*70));};setTimeout(function(){speak(ex.t);},300);
  host.appendChild(el("div","muted","Listen, then say it aloud 2–3 times."));
  var b=el("button","btn green block","I said it ✓");b.style.marginTop="14px";b.onclick=function(){if(host.dataset.l)return;host.dataset.l="1";b.disabled=true;done(true,"Speaking aloud builds real fluency.");};host.appendChild(b);};
COMP.reading=function(host,ex,done){host.appendChild(el("h3","q-title sm",ex.p));host.appendChild(el("div","learn-card",ex.pass));
  var total=ex.qs.length,ans=0,correct=0;
  ex.qs.forEach(function(q,i){var wrap=el("div");wrap.style.marginTop="14px";wrap.appendChild(el("div","stage-tag","Q"+(i+1)));host.appendChild(wrap);var locked=false;
    q.o.forEach(function(o,oi){var b=el("button","opt","<span class='key'>"+(oi+1)+"</span><span>"+o+"</span>");
      b.onclick=function(){if(locked)return;locked=true;var ok=oi===q.a;b.classList.add(ok?"correct":"wrong");if(!ok)wrap.querySelectorAll(".opt")[q.a].classList.add("correct");Array.prototype.forEach.call(wrap.querySelectorAll(".opt"),function(x){x.disabled=true;});ans++;if(ok)correct++;if(ans===total)done(correct===total,correct+" of "+total+" correct.");};wrap.appendChild(b);});});};
COMP.writing=function(host,ex,done){host.appendChild(el("h3","q-title sm",ex.p));
  var ta=el("textarea","text-in");ta.placeholder="Write your answer...";host.appendChild(ta);
  var b=el("button","btn","Compare with model");b.style.marginTop="14px";
  b.onclick=function(){if(host.dataset.l)return;if(norm(ta.value).length<8){ta.style.borderColor="var(--rd)";return;}host.dataset.l="1";b.remove();ta.disabled=true;
    var model=el("div","answer");model.style.marginTop="14px";model.innerHTML="<b>✍️ Model answer</b><br>"+ex.m;host.appendChild(model);
    host.appendChild(el("div",null,"<div style='font-weight:800;margin:16px 0 8px'>Self-check:</div>"));
    var checks=[];ex.c.forEach(function(cc,i){var row=el("label","chk");row.innerHTML="<span class='box'></span><span>"+cc+"</span>";row.onclick=function(){var on=row.classList.toggle("on");$(".box",row).textContent=on?"✓":"";checks[i]=on;fin.disabled=checks.filter(Boolean).length===0;};host.appendChild(row);checks[i]=false;});
    var fin=el("button","btn green block","Done");fin.style.marginTop="10px";fin.disabled=true;fin.onclick=function(){fin.disabled=true;done(true,"You matched "+checks.filter(Boolean).length+" of "+ex.c.length+" points. Great writing practice!");};host.appendChild(fin);};
  host.appendChild(b);};
COMP.memory=function(host,ex,done){host.appendChild(el("h3","q-title sm","Memory game — match each pair."));
  var cards=[];ex.pairs.forEach(function(p,i){cards.push({t:p[0],pair:i});cards.push({t:p[1],pair:i});});shuffle(cards);
  var grid=el("div","mem-grid");host.appendChild(grid);var flipped=[],matched=0,lock=false;
  cards.forEach(function(cd){var c=el("button","mem");c.innerHTML="<div class='fc back'>❓</div><div class='fc front'>"+cd.t+"</div>";
    c.onclick=function(){if(lock||c.classList.contains("up")||c.classList.contains("done"))return;c.classList.add("up");flipped.push({c:c,cd:cd});
      if(flipped.length===2){lock=true;var a=flipped[0],b=flipped[1];
        if(a.cd.pair===b.cd.pair){setTimeout(function(){a.c.classList.add("done");b.c.classList.add("done");flipped=[];lock=false;matched++;if(matched===ex.pairs.length)done(true,"Great memory — all pairs matched!");},350);}
        else{setTimeout(function(){a.c.classList.remove("up");b.c.classList.remove("up");flipped=[];lock=false;},750);}}};grid.appendChild(c);});};
COMP.drag=function(host,ex,done){host.appendChild(el("h3","q-title sm",ex.p));
  var bwrap=el("div","dd-buckets");var buckets=ex.buckets.map(function(name){var bk=el("div","bucket");bk.innerHTML="<div class='bk-name'>"+name+"</div>";var drop=el("div");bk.appendChild(drop);bk.dropZone=drop;return bk;});
  buckets.forEach(function(bk){bwrap.appendChild(bk);});host.appendChild(bwrap);
  var pool=el("div","dd-pool");host.appendChild(pool);
  var placed={},total=ex.items.length,selWord=null;
  // click-to-place (works on touch + mouse + keyboard-free); also native drag
  ex.items.forEach(function(pair,i){var w=el("button","dd-word",pair[0]);w.dataset.i=i;w.setAttribute("draggable","true");
    w.onclick=function(){if(selWord===w){w.classList.remove("sel");selWord=null;}else{if(selWord)selWord.classList.remove("sel");selWord=w;w.classList.add("sel");}};
    w.addEventListener("dragstart",function(e){selWord=w;w.classList.add("drag");try{e.dataTransfer.setData("text",""+i);}catch(err){}});
    w.addEventListener("dragend",function(){w.classList.remove("drag");});
    pool.appendChild(w);});
  buckets.forEach(function(bk,bi){
    function place(w){var i=+w.dataset.i;placed[i]=bi;var tag=el("span","drop-item",ex.items[i][0]);bk.dropZone.appendChild(tag);w.remove();w.classList.remove("sel");selWord=null;
      if(Object.keys(placed).length===total){var ok=ex.items.every(function(pair,idx){return placed[idx]===pair[1];});done(ok,ok?"All sorted correctly!":"Some went in the wrong group.");}}
    bk.onclick=function(){if(selWord)place(selWord);};
    bk.addEventListener("dragover",function(e){e.preventDefault();bk.classList.add("over");});
    bk.addEventListener("dragleave",function(){bk.classList.remove("over");});
    bk.addEventListener("drop",function(e){e.preventDefault();bk.classList.remove("over");if(selWord)place(selWord);});
  });
  host.appendChild(el("div","muted","Tap a word, then tap a group — or drag it across."));};

/* ============================================================

var BADGES=[
 {id:"first",icon:"🌱",name:"Booting up",desc:"Finish your first session",cond:function(){return S.stats.sessions>=1;}},

 {id:"streak3",icon:"🔥",name:"On fire",desc:"3-day streak",cond:function(){return S.best>=3;}},
 {id:"streak7",icon:"⚡",name:"Unstoppable",desc:"7-day streak",cond:function(){return S.best>=7;}},
 {id:"xp500",icon:"💎",name:"XP collector",desc:"Earn 500 XP",cond:function(){return S.xp>=500;}},
 {id:"xp2k",icon:"👑",name:"XP royalty",desc:"Earn 2,000 XP",cond:function(){return S.xp>=2000;}},

 {id:"acc",icon:"🎯",name:"Sharpshooter",desc:"Answer 100 exercises",cond:function(){return S.stats.exercises>=100;}},
 {id:"master",icon:"🧠",name:"Topic master",desc:"Reach 80% in any module",cond:function(){return CORE.some(function(m){return moduleMastery(m.k)>=80;});}},

 {id:"challenge",icon:"🏆",name:"Challenger",desc:"Complete a daily challenge",cond:function(){return !!S.doneToday.challenge;}}
];
function checkBadges(){var un=[];BADGES.forEach(function(b){if(!S.achievements[b.id]&&b.cond()){S.achievements[b.id]=true;un.push(b);}});if(un.length)save();return un;}
function renderAchievements(){var v=$("#view");v.innerHTML="";var got=BADGES.filter(function(b){return S.achievements[b.id];}).length;
  var head=el("div","page-head");head.innerHTML="<div class='eyebrow'>🏅 Milestones</div><h1>Achievements</h1><p>Unlocked "+got+" of "+BADGES.length+" badges.</p>";v.appendChild(head);
  var g=el("div","grid g2");BADGES.forEach(function(b){var un=!!S.achievements[b.id];var e=el("div","badge"+(un?" on":""));e.innerHTML="<div class='b-ic'>"+(un?b.icon:"🔒")+"</div><div><b>"+b.name+"</b><span>"+b.desc+"</span></div>";g.appendChild(e);});v.appendChild(g);}

/* ============================================================
   17. STREAK / TOASTS / FX
   ============================================================ */
function updateStreak(){var t=dkey();today().ses++;if(S.lastGoalDate===t){}else if(S.lastGoalDate&&daysBetween(S.lastGoalDate,t)===1)S.streak++;else S.streak=1;S.lastGoalDate=t;S.lastActive=t;if(S.streak>S.best)S.best=S.streak;}
function refreshTop(){$("#p-xp").textContent=S.xp;$("#p-streak").textContent=S.streak;$("#p-lvl").textContent=levelInfo(S.xp).level;}
function toast(icon,title,sub){var t=el("div","toast","<div class='ti'>"+icon+"</div><div><b>"+title+"</b><span>"+sub+"</span></div>");$("#toasts").appendChild(t);
  setTimeout(function(){t.style.transition="opacity .4s,transform .4s";t.style.opacity="0";t.style.transform="translateX(120%)";setTimeout(function(){t.remove();},400);},3300);}
function confetti(){if(window.matchMedia&&window.matchMedia("(prefers-reduced-motion:reduce)").matches)return;
  var c=el("div","confetti");document.body.appendChild(c);var cols=["#2DD4BF","#38BDF8","#818CF8","#22C55E","#F59E0B","#FB7185"];
  for(var i=0;i<66;i++){var p=el("i");p.style.left=Math.random()*100+"%";p.style.background=cols[i%cols.length];p.style.animationDuration=(1.6+Math.random()*1.6)+"s";p.style.animationDelay=(Math.random()*.4)+"s";p.style.transform="rotate("+Math.random()*360+"deg)";if(Math.random()>.5)p.style.borderRadius="50%";c.appendChild(p);}
  setTimeout(function(){c.remove();},3600);}

/* ============================================================
   18. THEME / DRAWER / COMMAND BAR / SHORTCUTS
   ============================================================ */
function applyTheme(t){document.documentElement.setAttribute("data-theme",t);$("#themeBtn").textContent=t==="dark"?"☀️":"🌙";S.theme=t;save();}
$("#themeBtn").onclick=function(){applyTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark");};
function openDrawer(){$("#dock").classList.add("open");$("#scrim").classList.add("show");}
function closeDrawer(){$("#dock").classList.remove("open");$("#scrim").classList.remove("show");}
$("#hamb").onclick=openDrawer;$("#scrim").onclick=closeDrawer;
/* command bar */
var CMD_ACTIONS=[
 {cat:"Actions",icon:"🛰️",label:"Go to Dashboard",run:function(){go("dashboard");}},
 {cat:"Actions",icon:"🔁",label:"Open Revision Center",run:function(){go("module","revision");}},
 {cat:"Actions",icon:"🔥",label:"Start Daily Challenge",run:function(){go("module","challenges");}},
 {cat:"Actions",icon:"🏅",label:"View Achievements",run:function(){go("achievements");}},
 {cat:"Actions",icon:"🌓",label:"Toggle dark / light theme",run:function(){$("#themeBtn").onclick();}}
];
function cmdItems(){var mods=MODULES.map(function(m){return{cat:"Modules",icon:m.ic,label:m.n,run:function(){go("module",m.k);}};});return CMD_ACTIONS.concat(mods);}
var cmdSel=0,cmdFiltered=[];
function openCmd(){$("#cmd").classList.add("show");$("#cmdInput").value="";cmdRender("");setTimeout(function(){$("#cmdInput").focus();},40);}
function closeCmd(){$("#cmd").classList.remove("show");}
function cmdRender(q){var list=$("#cmdList");list.innerHTML="";var ql=norm(q);
  cmdFiltered=cmdItems().filter(function(it){return norm(it.label).indexOf(ql)>=0;});cmdSel=0;
  var cat=null;cmdFiltered.forEach(function(it,i){if(it.cat!==cat){cat=it.cat;list.appendChild(el("div","cmd-cat",cat));}
    var r=el("div","cmd-row"+(i===cmdSel?" sel":""),"<span class='ci'>"+it.icon+"</span><span>"+it.label+"</span><span class='ck'>↵</span>");r.dataset.i=i;
    r.onclick=function(){closeCmd();it.run();};list.appendChild(r);});
  if(!cmdFiltered.length)list.appendChild(el("div","empty","<p>No matches.</p>"));}
function cmdMove(d){cmdSel=Math.max(0,Math.min(cmdFiltered.length-1,cmdSel+d));
  Array.prototype.forEach.call($("#cmdList").querySelectorAll(".cmd-row"),function(r){r.classList.toggle("sel",+r.dataset.i===cmdSel);var s=$("#cmdList").querySelector(".cmd-row.sel");if(s)s.scrollIntoView({block:"nearest"});});}
$("#cmdTrigger").onclick=openCmd;$("#cmdScrim").onclick=closeCmd;
$("#cmdInput").addEventListener("input",function(e){cmdRender(e.target.value);});
$("#cmdInput").addEventListener("keydown",function(e){
  if(e.key==="ArrowDown"){e.preventDefault();cmdMove(1);}
  else if(e.key==="ArrowUp"){e.preventDefault();cmdMove(-1);}
  else if(e.key==="Enter"){e.preventDefault();var it=cmdFiltered[cmdSel];if(it){closeCmd();it.run();}}
  else if(e.key==="Escape"){closeCmd();}});
/* shortcuts modal */
$("#helpBtn").onclick=function(){$("#kbdModal").classList.add("show");};
$("#kbdClose").onclick=function(){$("#kbdModal").classList.remove("show");};
$("#kbdScrim").onclick=function(){$("#kbdModal").classList.remove("show");};
/* global keyboard shortcuts */
document.addEventListener("keydown",function(e){
  var tag=(e.target.tagName||"").toLowerCase(),typing=tag==="input"||tag==="textarea";
  // session answer keys 1-4 + Enter continue
  if($("#player").classList.contains("show")&&!typing){
    if(/^[1-4]$/.test(e.key)){var opts=$("#plInner").querySelectorAll(".opt:not([disabled])");var idx=+e.key-1;if(opts[idx]){opts[idx].click();return;}}
    if(e.key==="Enter"){var fbtn=$("#plFoot").querySelector(".btn:not([disabled])");if(fbtn){fbtn.click();return;}var ck=$("#plInner").querySelector(".btn");if(ck&&!ck.disabled)ck.click();return;}
  }
  if(e.key==="Escape"){if($("#cmd").classList.contains("show"))return closeCmd();if($("#kbdModal").classList.contains("show"))return $("#kbdModal").classList.remove("show");if($("#player").classList.contains("show"))return $("#plClose").click();closeDrawer();return;}
  if(typing)return;
  if(e.key==="/"||e.key==="k"){e.preventDefault();openCmd();}
  else if(e.key==="?"){$("#kbdModal").classList.add("show");}
  else if(e.key==="d")go("dashboard");
  else if(e.key==="r")go("module","revision");
  else if(e.key==="c")go("module","challenges");
  else if(e.key==="t")$("#themeBtn").onclick();
});

   19. INIT
   ============================================================ */
(function init(){
  applyTheme(S.theme||"dark");
  today(); // ensure today's record
  // streak reset if a day was skipped
  if(S.lastActive){var g=daysBetween(S.lastActive,dkey());if(g>1&&S.lastGoalDate&&daysBetween(S.lastGoalDate,dkey())>1)S.streak=0;}
  // reset per-day "done" trackers
  if(S.doneToday.challenge&&S.doneToday.challenge!==dkey())S.doneToday.challenge=null;
  save();refreshTop();renderNav();renderDashboard();
  if(speechOn)try{window.speechSynthesis.getVoices();}catch(e){}
})();
