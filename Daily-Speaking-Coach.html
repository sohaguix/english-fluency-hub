<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Daily Speaking Coach</title>
<style>
:root{
  --brand:#3452C4; --brand-2:#4C6EF5; --brand-ink:#27408B;
  --gold:#D9A21B; --gold-2:#F0B429; --gold-soft:#FBF1D6;
  --green:#2F9E44; --green-soft:#E6F5EB;
  --red:#E03131; --red-soft:#FDECEC;
  --r:18px; --r-sm:12px; --r-lg:26px; --tap:46px;
  --sp:clamp(15px,4vw,28px);
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --serif:ui-serif,Georgia,"Iowan Old Style","Palatino Linotype","Times New Roman",serif;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --ease:cubic-bezier(.22,.7,.24,1);
}
:root[data-theme="light"]{
  --bg:#F6F5F1; --bg-2:#EEEDE6; --surface:#FFFFFF; --surface-2:#FBFAF6;
  --text:#1B1B29; --muted:#63636F; --faint:#9A9AA6; --line:#EAE8E0; --line-2:#DEDCD2;
  --shadow:0 1px 2px rgba(27,27,41,.04),0 12px 28px -16px rgba(27,27,41,.2);
  --shadow-lg:0 2px 8px rgba(27,27,41,.06),0 30px 64px -26px rgba(27,27,41,.32);
  --tint:#E7ECFB;
}
:root[data-theme="dark"]{
  --bg:#0F1017; --bg-2:#15161F; --surface:#1A1B26; --surface-2:#20222F;
  --text:#ECECF2; --muted:#A0A0B0; --faint:#63636F; --line:#282A38; --line-2:#333546;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 14px 32px -18px rgba(0,0,0,.65);
  --shadow-lg:0 2px 10px rgba(0,0,0,.4),0 34px 74px -30px rgba(0,0,0,.8);
  --tint:#1D2240; --gold-soft:#332A12; --green-soft:#12321E; --red-soft:#3A1717;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:16px;line-height:1.6;
  -webkit-font-smoothing:antialiased;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:1rem}
:focus-visible{outline:3px solid var(--brand);outline-offset:2px;border-radius:8px}
h1,h2,h3,h4{margin:0;line-height:1.2}
.serif{font-family:var(--serif)}
p{margin:0}.muted{color:var(--muted)}.mono{font-family:var(--mono)}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:9px}

.app{display:grid;grid-template-columns:262px 1fr;min-height:100vh}
@media(max-width:920px){.app{grid-template-columns:1fr}}
.sidebar{background:var(--surface);border-right:1px solid var(--line);padding:20px 14px;position:sticky;top:0;
  height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:2px;z-index:60}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 16px}
.brand .logo{width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,var(--brand),var(--brand-2));
  display:grid;place-items:center;font-size:22px;box-shadow:0 6px 16px -6px var(--brand);position:relative}
.brand .logo::after{content:"";position:absolute;right:-2px;bottom:-2px;width:14px;height:14px;border-radius:50%;background:var(--gold-2);border:2px solid var(--surface)}
.brand b{font-family:var(--serif);font-size:1.15rem;font-weight:700;display:block;line-height:1.1;letter-spacing:-.01em}
.brand span{font-size:.7rem;color:var(--faint);font-weight:700;letter-spacing:.05em}
.nav-group{font-size:.66rem;font-weight:800;letter-spacing:.11em;text-transform:uppercase;color:var(--faint);padding:14px 12px 5px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:11px;font-weight:600;font-size:.91rem;
  color:var(--muted);min-height:44px;width:100%;text-align:left;transition:background .15s,color .15s,transform .1s}
.nav-item:hover{background:var(--surface-2);color:var(--text)}.nav-item:active{transform:scale(.98)}
.nav-item.active{background:var(--tint);color:var(--brand-ink);font-weight:700}
:root[data-theme="dark"] .nav-item.active{color:#AEC0FF}
.nav-item .ic{font-size:1.08rem;width:22px;text-align:center;flex:none}
.nav-item .cnt{margin-left:auto;font-size:.66rem;font-weight:800;color:var(--gold);background:var(--gold-soft);border-radius:999px;padding:2px 8px}

.main{min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:50;background:color-mix(in srgb,var(--bg) 85%,transparent);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px;padding:11px var(--sp)}
.hamb{display:none;width:44px;height:44px;border-radius:12px;background:var(--surface);border:1px solid var(--line);font-size:1.2rem;place-items:center}
@media(max-width:920px){.hamb{display:grid}}
.pills{display:flex;gap:8px;margin-left:auto;align-items:center;flex-wrap:wrap}
.pill{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);padding:7px 12px;
  border-radius:999px;font-weight:800;font-size:.84rem;box-shadow:var(--shadow)}
.pill.streak{color:#E8590C}.pill.conf{color:var(--brand-ink)}
:root[data-theme="dark"] .pill.conf{color:#AEC0FF}
.icon-btn{width:44px;height:44px;border-radius:12px;background:var(--surface);border:1px solid var(--line);display:grid;place-items:center;font-size:1.1rem;box-shadow:var(--shadow)}
.icon-btn.gold{background:linear-gradient(135deg,var(--gold-2),var(--gold));color:#fff;border:none}
.view{padding:var(--sp);max-width:1080px;width:100%;margin:0 auto;animation:vin .4s var(--ease)}
@keyframes vin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.scrim{position:fixed;inset:0;background:rgba(10,10,18,.55);z-index:59;display:none;opacity:0;transition:opacity .25s}
.scrim.show{display:block;opacity:1}
@media(max-width:920px){.sidebar{position:fixed;left:0;top:0;width:282px;transform:translateX(-104%);transition:transform .28s var(--ease);box-shadow:var(--shadow-lg)}.sidebar.open{transform:none}}

.page-head{margin-bottom:20px}
.page-head .eyebrow{font-size:.72rem;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--brand)}
.page-head h1{font-family:var(--serif);font-size:clamp(1.9rem,5vw,2.6rem);margin-top:8px;font-weight:700;letter-spacing:-.01em}
.page-head p{color:var(--muted);margin-top:8px;max-width:62ch}
.grid{display:grid;gap:15px}
.g4{grid-template-columns:repeat(auto-fit,minmax(146px,1fr))}
.cats{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
.topics{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:20px}

.btn{background:var(--brand);color:#fff;font-weight:800;border-radius:14px;padding:13px 22px;min-height:var(--tap);
  box-shadow:0 8px 20px -8px var(--brand);transition:transform .12s,filter .15s;font-size:.95rem;display:inline-flex;align-items:center;gap:8px;justify-content:center}
.btn:hover{filter:brightness(1.07)}.btn:active{transform:scale(.97)}
.btn.ghost{background:var(--surface);color:var(--text);border:1px solid var(--line-2);box-shadow:none}
.btn.gold{background:linear-gradient(135deg,var(--gold-2),var(--gold));color:#241a00;box-shadow:0 8px 20px -8px var(--gold)}
.btn.green{background:var(--green);box-shadow:0 8px 20px -8px var(--green)}
.btn.block{width:100%}.btn.sm{padding:9px 15px;font-size:.85rem;min-height:40px;border-radius:11px}
.btn[disabled]{opacity:.5;pointer-events:none}

/* hero */
.hero{background:linear-gradient(140deg,var(--brand-ink),var(--brand) 60%,var(--brand-2));color:#fff;border-radius:var(--r-lg);
  padding:28px;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;right:-60px;top:-60px;width:230px;height:230px;border-radius:50%;background:rgba(255,255,255,.08)}
.hero::before{content:"";position:absolute;right:40px;bottom:-40px;width:120px;height:120px;border-radius:50%;background:rgba(240,180,41,.18)}
.hero .tag{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.16);padding:6px 13px;border-radius:999px;font-size:.74rem;font-weight:800;letter-spacing:.04em}
.hero h2{font-family:var(--serif);font-size:clamp(1.5rem,4vw,2rem);margin:14px 0 6px;font-weight:700;position:relative;z-index:1;max-width:24ch}
.hero .sub{opacity:.9;position:relative;z-index:1}
.hero .cta-row{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;position:relative;z-index:1}
.hero .btn.wht{background:#fff;color:var(--brand-ink)}
.hero .btn.ghost{background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.3)}

.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
.stat .em{font-size:1.3rem}.stat b{font-size:1.6rem;font-weight:900;display:block;margin-top:5px;letter-spacing:-.03em}
.stat span{color:var(--muted);font-size:.79rem;font-weight:600}

.section-title{display:flex;align-items:center;justify-content:space-between;margin:26px 0 14px;gap:12px;flex-wrap:wrap}
.section-title h2{font-family:var(--serif);font-size:1.35rem;font-weight:700}

.diff{font-size:.66rem;font-weight:800;padding:3px 10px;border-radius:999px;letter-spacing:.02em;white-space:nowrap}
.diff.d1{background:var(--green-soft);color:var(--green)}
.diff.d2{background:var(--gold-soft);color:#a9770a}
.diff.d3{background:var(--red-soft);color:var(--red)}
:root[data-theme="dark"] .diff.d2{color:var(--gold-2)}

.filters{display:flex;gap:8px;flex-wrap:wrap}
.chip-f{background:var(--surface);border:1px solid var(--line-2);border-radius:999px;padding:8px 15px;font-weight:700;font-size:.84rem;min-height:40px;transition:.15s}
.chip-f.on{background:var(--brand);color:#fff;border-color:var(--brand)}

/* cat + topic cards */
.cat-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:20px;
  text-align:left;display:flex;flex-direction:column;gap:9px;transition:transform .15s var(--ease),box-shadow .15s}
.cat-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.cat-card .c-ic{width:50px;height:50px;border-radius:14px;display:grid;place-items:center;font-size:1.45rem}
.cat-card b{font-family:var(--serif);font-size:1.1rem;font-weight:700}
.cat-card p{color:var(--muted);font-size:.85rem;flex:1}
.cat-card .c-meta{font-size:.75rem;color:var(--faint);font-weight:700}

.topic-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:20px;
  text-align:left;display:flex;flex-direction:column;gap:10px;position:relative;transition:transform .15s var(--ease),box-shadow .15s}
.topic-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.topic-card .tc-top{display:flex;align-items:center;gap:8px}
.topic-card .cat-name{font-size:.72rem;font-weight:800;letter-spacing:.03em;color:var(--brand)}
.topic-card h3{font-family:var(--serif);font-size:1.15rem;font-weight:700;line-height:1.25}
.topic-card .prev{color:var(--muted);font-size:.87rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.topic-card .tc-foot{display:flex;align-items:center;gap:8px;margin-top:auto}
.star{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:1.1rem;background:var(--surface-2);border:1px solid var(--line);flex:none;transition:.15s}
.star.on{background:var(--gold-soft);color:var(--gold);border-color:var(--gold)}
.done-badge{font-size:.7rem;font-weight:800;color:var(--green);background:var(--green-soft);padding:3px 9px;border-radius:999px}

/* TOPIC DETAIL */
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-weight:700;font-size:.88rem;margin-bottom:14px}
.topic-hero{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:24px;margin-bottom:18px;position:relative;overflow:hidden}
.topic-hero::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:linear-gradient(180deg,var(--brand),var(--gold-2))}
.topic-hero .eyebrow{font-size:.72rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--brand)}
.topic-hero h1{font-family:var(--serif);font-size:clamp(1.5rem,4.2vw,2.1rem);font-weight:700;margin:8px 0 12px;letter-spacing:-.01em}
.topic-hero .h-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.prompt-box{background:var(--tint);border-radius:var(--r);padding:18px 20px;font-size:1.05rem;line-height:1.7}
:root[data-theme="dark"] .prompt-box{border:1px solid var(--line)}
.prompt-box .cue-lead{font-weight:800;margin:10px 0 4px}
.prompt-box ul{margin:4px 0;padding-left:22px}.prompt-box li{margin:3px 0}

/* timer */
.timer-card{background:linear-gradient(140deg,var(--brand-ink),var(--brand));color:#fff;border-radius:var(--r-lg);
  padding:24px;margin-bottom:18px;box-shadow:var(--shadow-lg);text-align:center;position:relative;overflow:hidden}
.timer-phase{font-size:.78rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;opacity:.85}
.timer-time{font-family:var(--serif);font-size:3.6rem;font-weight:700;line-height:1;margin:8px 0;font-variant-numeric:tabular-nums}
.timer-bar{height:8px;background:rgba(255,255,255,.22);border-radius:999px;overflow:hidden;margin:14px auto;max-width:420px}
.timer-bar i{display:block;height:100%;background:var(--gold-2);border-radius:999px;width:0;transition:width .3s linear}
.timer-controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.timer-controls .tbtn{background:rgba(255,255,255,.18);color:#fff;font-weight:800;padding:11px 20px;border-radius:12px;min-height:44px;border:1px solid rgba(255,255,255,.25)}
.timer-controls .tbtn.primary{background:#fff;color:var(--brand-ink);border:none}
.timer-note{font-size:.78rem;opacity:.8;margin-top:12px}

/* practice sections */
.p-section{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
.p-head{display:flex;align-items:center;gap:12px;padding:16px 20px;width:100%;text-align:left}
.p-head .p-ic{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;font-size:1.15rem;flex:none;background:var(--tint);color:var(--brand-ink)}
:root[data-theme="dark"] .p-head .p-ic{color:#AEC0FF}
.p-head .p-t{flex:1}
.p-head h3{font-family:var(--serif);font-size:1.12rem;font-weight:700}
.p-head .p-sub{font-size:.78rem;color:var(--muted)}
.p-head .chev{color:var(--faint);font-size:1rem;transition:transform .2s}
.p-section.open .chev{transform:rotate(180deg)}
.p-body{padding:0 20px 20px;display:none}
.p-section.open .p-body{display:block;animation:vin .25s var(--ease)}

.dl{display:flex;flex-direction:column;gap:9px}
.dl .row{display:flex;gap:12px;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:11px 14px}
.dl .row .k{font-weight:800;flex:none;min-width:34%}
.dl .row .k.wide{min-width:44%}
.dl .row .v{color:var(--muted)}
.pill-list{display:flex;flex-wrap:wrap;gap:8px}
.pill-list span{background:var(--tint);color:var(--brand-ink);font-size:.86rem;font-weight:600;padding:7px 13px;border-radius:9px}
:root[data-theme="dark"] .pill-list span{color:#AEC0FF}
.mis .row .k{color:var(--red);text-decoration:line-through;min-width:40%}
.mis .row .v{color:var(--green);font-weight:600}
.mis .row .v::before{content:"→ "}
.answer{background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:16px 18px;line-height:1.75;font-size:1.02rem}
.answer.adv{border-left:3px solid var(--gold)}
.reveal-btn{width:100%;border:2px dashed var(--line-2);border-radius:12px;padding:16px;font-weight:800;color:var(--brand);background:var(--surface-2)}
.play-inline{display:inline-flex;align-items:center;gap:6px;font-size:.8rem;font-weight:800;color:var(--brand);background:var(--tint);padding:5px 11px;border-radius:8px;margin-top:12px}
.chk{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:11px;margin-bottom:9px;background:var(--surface-2);cursor:pointer;transition:.15s}
.chk .box{width:24px;height:24px;border-radius:7px;border:2px solid var(--line-2);flex:none;display:grid;place-items:center;font-size:.85rem;transition:.15s;margin-top:1px}
.chk.on{border-color:var(--green);background:var(--green-soft)}.chk.on .box{background:var(--green);border-color:var(--green);color:#fff}
.reflect{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:10px}
.reflect li{display:flex;gap:12px;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:13px 15px}
.reflect li::before{content:"?";width:26px;height:26px;border-radius:50%;background:var(--brand);color:#fff;font-weight:800;display:grid;place-items:center;flex:none;font-size:.85rem}

/* confidence */
.conf-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:22px;text-align:center;margin-top:18px}
.conf-faces{display:flex;gap:10px;justify-content:center;margin:14px 0;flex-wrap:wrap}
.face{width:60px;height:60px;border-radius:16px;border:2px solid var(--line-2);background:var(--surface-2);font-size:1.7rem;display:grid;place-items:center;transition:.15s}
.face:hover{transform:translateY(-3px)}.face.on{border-color:var(--brand);background:var(--tint);transform:translateY(-3px) scale(1.05)}
.face small{position:absolute}
.conf-label{font-weight:700;color:var(--muted);min-height:1.4em}

/* chart */
.chart{display:flex;align-items:flex-end;gap:min(3vw,14px);height:150px;padding-top:8px}
.chart .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end}
.chart .col .b{width:100%;max-width:34px;background:linear-gradient(180deg,var(--brand-2),var(--brand));border-radius:7px 7px 3px 3px;min-height:4px;transition:height .7s var(--ease)}
.chart .col small{font-size:.66rem;color:var(--muted);font-weight:700}.chart .col .v{font-size:.66rem;color:var(--faint);font-weight:800}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;font-size:.8rem;color:var(--muted)}

.toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:9px;pointer-events:none}
.toast{background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-lg);padding:13px 16px;display:flex;gap:11px;align-items:center;min-width:230px;animation:tin .4s var(--ease)}
.toast .ti{font-size:1.5rem}.toast b{display:block;font-size:.9rem}.toast span{font-size:.76rem;color:var(--muted)}
@keyframes tin{from{transform:translateX(120%)}to{transform:none}}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:150;overflow:hidden}
.confetti i{position:absolute;width:9px;height:14px;top:-20px;border-radius:2px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.9}}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}.empty .e{font-size:3rem}
@media(prefers-reduced-motion:reduce){*{animation-duration:.001s!important;transition-duration:.05s!important}}
@media(max-width:560px){.dl .row{flex-direction:column;gap:3px}.dl .row .k{min-width:0!important}.view{padding:15px}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar" aria-label="Navigation">
    <div class="brand"><div class="logo">🎙️</div><div><b>Speaking Coach</b><span>SPEAK EVERY DAY</span></div></div>
    <nav id="nav"></nav>
  </aside>
  <div class="scrim" id="scrim"></div>
  <div class="main">
    <header class="topbar">
      <button class="hamb" id="hamb" aria-label="Menu">☰</button>
      <div class="pills">
        <span class="pill conf"><span>💪</span><span id="p-conf">—</span></span>
        <span class="pill streak"><span>🔥</span><span id="p-streak">0</span></span>
        <button class="icon-btn gold" id="randomBtn" aria-label="Random topic" title="Random topic">🎲</button>
        <button class="icon-btn" id="themeBtn" aria-label="Theme">🌙</button>
      </div>
    </header>
    <main id="view" class="view"></main>
  </div>
</div>
<div class="toasts" id="toasts"></div>
<script>
"use strict";
/* ===== STORAGE ===== */
var Store=(function(){var mem={},ok=false;try{var k="__dsc__";localStorage.setItem(k,"1");localStorage.removeItem(k);ok=true;}catch(e){}
  return{get:function(k){try{if(ok)return localStorage.getItem(k);}catch(e){}return k in mem?mem[k]:null;},
         set:function(k,v){try{if(ok){localStorage.setItem(k,v);return;}}catch(e){}mem[k]=v;}};})();
var DAY=86400000;
function dkey(d){d=d||new Date();return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}
function daysBetween(a,b){var pa=a.split("-").map(Number),pb=b.split("-").map(Number);return Math.round((new Date(pb[0],pb[1]-1,pb[2])-new Date(pa[0],pa[1]-1,pa[2]))/DAY);}

var defaultState={streak:0,best:0,lastActive:null,lastGoalDate:null,sessions:0,
  practiced:{},bookmarks:{},confHistory:[],theme:"light",diff:"All"};
var S=loadState();
function loadState(){try{var s=JSON.parse(Store.get("dsc_state"));if(s&&typeof s==="object"){for(var k in defaultState)if(!(k in s))s[k]=JSON.parse(JSON.stringify(defaultState[k]));return s;}}catch(e){}return JSON.parse(JSON.stringify(defaultState));}
function saveState(){try{Store.set("dsc_state",JSON.stringify(S));}catch(e){}}

/* ===== SPEECH + AUDIO ===== */
var speechOn=("speechSynthesis"in window);
function speak(t,rate){if(!speechOn)return;try{window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang="en-US";u.rate=rate||.94;
  var vs=window.speechSynthesis.getVoices(),en=vs.filter(function(v){return /en[-_]/i.test(v.lang);});if(en.length){var p=en.find(function(v){return /female|samantha|zira|google us/i.test(v.name);});u.voice=p||en[0];}
  window.speechSynthesis.speak(u);}catch(e){}}
function stopSpeak(){if(speechOn)try{window.speechSynthesis.cancel();}catch(e){}}
var AC=null;
function beep(freq,dur){try{AC=AC||new (window.AudioContext||window.webkitAudioContext)();var o=AC.createOscillator(),g=AC.createGain();
  o.frequency.value=freq;o.type="sine";o.connect(g);g.connect(AC.destination);g.gain.setValueAtTime(.0001,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.12,AC.currentTime+.02);g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+(dur||.25));
  o.start();o.stop(AC.currentTime+(dur||.25)+.02);}catch(e){}}

/* ===== LOGIC ===== */
function isBookmarked(id){return !!S.bookmarks[id];}
function toggleBookmark(id){if(S.bookmarks[id])delete S.bookmarks[id];else S.bookmarks[id]=true;saveState();}
function isPracticed(id){return !!S.practiced[id];}
function avgConfidence(){if(!S.confHistory.length)return 0;var sum=S.confHistory.reduce(function(a,b){return a+b.v;},0);return sum/S.confHistory.length;}
function confFace(v){return ["","😣","😕","😐","🙂","😄"][Math.round(v)]||"—";}
function displayStreak(){if(!S.lastGoalDate)return 0;return daysBetween(S.lastGoalDate,dkey())<=1?S.streak:0;}
function recordPractice(topicId,confidence){
  var t=dkey();
  S.practiced[topicId]={date:t,conf:confidence};
  S.confHistory.push({date:t,v:confidence,id:topicId});if(S.confHistory.length>60)S.confHistory=S.confHistory.slice(-60);
  S.sessions++;
  if(S.lastGoalDate!==t){if(S.lastGoalDate&&daysBetween(S.lastGoalDate,t)===1)S.streak++;else S.streak=1;
    S.lastGoalDate=t;if(S.streak>S.best)S.best=S.streak;}
  S.lastActive=t;saveState();refreshTop();
}
function filteredTopics(cat){var arr=cat?TOPICS.filter(function(t){return t.cat===cat;}):TOPICS.slice();
  if(S.diff!=="All"){var d={"Beginner":1,"Intermediate":2,"Advanced":3}[S.diff];arr=arr.filter(function(t){return t.diff===d;});}return arr;}
function dailyTopic(){var seed=0,k=dkey();for(var i=0;i<k.length;i++)seed=(seed*31+k.charCodeAt(i))>>>0;return TOPICS[seed%TOPICS.length];}

function buildTimer(t){
  var isP2=t.cat==="IELTS Part 2";
  var targets={"IELTS Part 1":60,"IELTS Part 3":75,"Everyday Conversation":75,"Business English":90,"Public Speaking":90,"Interview Questions":90,"Storytelling":90,"Debate Topics":120};
  var speakTarget=targets[t.cat]||90;
  var phases=isP2?[{n:"Prep",s:60},{n:"Speak",s:120}]:[{n:"Speak (count up)",s:speakTarget}];
  var card=el("div","timer-card");
  card.innerHTML="<div class='timer-phase' id='tPhase'>"+phases[0].n+"</div><div class='timer-time' id='tTime'>"+fmt(isP2?60:0)+"</div>"+
    "<div class='timer-bar'><i id='tBar'></i></div>"+
    "<div class='timer-controls'><button class='tbtn primary' id='tStart'>▶ Start</button><button class='tbtn' id='tReset'>↺ Reset</button></div>"+
    "<div class='timer-note' id='tNote'>"+(isP2?"1 min to prepare, then 2 mins to speak. A soft chime marks each phase.":"Aim for around "+fmt(speakTarget)+". A chime sounds at your target — keep going if you can!")+"</div>";
  var state={running:false,phase:0,remaining:isP2?60:0,elapsed:0,interval:null};
  var tTime=$("#tTime",card),tBar=$("#tBar",card),tPhase=$("#tPhase",card),tStart=$("#tStart",card),tNote=$("#tNote",card);
  function fmt(s){var m=Math.floor(s/60),ss=s%60;return m+":"+(ss<10?"0":"")+ss;}
  function tick(){
    if(isP2){
      state.remaining--;
      var ph=phases[state.phase];
      tTime.textContent=fmt(Math.max(0,state.remaining));
      tBar.style.width=(100-(state.remaining/ph.s*100))+"%";
      if(state.remaining<=0){beep(state.phase===0?660:520,.35);
        if(state.phase===0){state.phase=1;state.remaining=120;tPhase.textContent="Speak";tNote.textContent="Now speak for two minutes. Don't stop!";}
        else{stop();tPhase.textContent="Done ✓";tNote.textContent="Great — that's a full long-turn. Rate your confidence below.";beep(600,.5);}
      }
    }else{
      state.elapsed++;tTime.textContent=fmt(state.elapsed);
      var pct=Math.min(100,state.elapsed/speakTarget*100);tBar.style.width=pct+"%";
      if(state.elapsed===speakTarget){beep(600,.4);tNote.textContent="Target reached! Keep going if you've got more to say. 💪";}
    }
  }
  function start(){if(state.running)return;state.running=true;tStart.textContent="⏸ Pause";try{if(AC&&AC.state==="suspended")AC.resume();}catch(e){}state.interval=setInterval(tick,1000);}
  function pause(){state.running=false;tStart.textContent="▶ Resume";clearInterval(state.interval);}
  function stop(){state.running=false;tStart.textContent="▶ Start";clearInterval(state.interval);}
  function reset(){stop();state.phase=0;state.remaining=isP2?60:0;state.elapsed=0;
    tPhase.textContent=phases[0].n;tTime.textContent=fmt(isP2?60:0);tBar.style.width="0%";
    tNote.textContent=isP2?"1 min to prepare, then 2 mins to speak. A soft chime marks each phase.":"Aim for around "+fmt(speakTarget)+". A chime sounds at your target — keep going if you can!";}
  tStart.onclick=function(){state.running?pause():start();};
  $("#tReset",card).onclick=reset;
  return card;
}
function fmt(s){var m=Math.floor(s/60),ss=s%60;return m+":"+(ss<10?"0":"")+ss;}

/* ===== BOOKMARKS ===== */
function renderBookmarks(){
  var v=$("#view");v.innerHTML="";
  var head=el("div","page-head");head.innerHTML="<div class='eyebrow'>Saved for later</div><h1>⭐ Your Bookmarks</h1><p>Topics you've starred to revisit and master.</p>";v.appendChild(head);
  var ids=Object.keys(S.bookmarks),topics=TOPICS.filter(function(t){return ids.indexOf(t.id)>=0;});
  if(!topics.length){v.appendChild(el("div","empty","<div class='e'>⭐</div><p>No bookmarks yet. Tap the ☆ star on any topic to save it here.</p>"));return;}
  var g=el("div","grid topics");topics.forEach(function(t){g.appendChild(topicCard(t));});v.appendChild(g);
}

/* ===== PROGRESS ===== */
function renderProgress(){
  var v=$("#view");v.innerHTML="";var c=avgConfidence();
  var head=el("div","page-head");head.innerHTML="<div class='eyebrow'>Your journey</div><h1>📊 Progress Dashboard</h1><p>Consistency is everything. A little speaking every day compounds fast.</p>";v.appendChild(head);
  var sg=el("div","grid g4");
  sg.appendChild(statEl("🔥",displayStreak(),"Current streak"));
  sg.appendChild(statEl("🏅",S.best,"Best streak"));
  sg.appendChild(statEl("🎙️",S.sessions,"Total sessions"));
  sg.appendChild(statEl("✅",Object.keys(S.practiced).length,"Topics practised"));
  sg.appendChild(statEl("💪",c?c.toFixed(1)+" "+confFace(c):"—","Avg confidence"));
  sg.appendChild(statEl("⭐",Object.keys(S.bookmarks).length,"Bookmarks"));
  v.appendChild(sg);

  v.appendChild((function(){var s=el("div","section-title");s.innerHTML="<h2 class='serif'>Confidence trend</h2>";return s;})());
  var cc=el("div","card");
  if(!S.confHistory.length){cc.innerHTML="<div class='empty' style='padding:24px'><div class='e'>💪</div><p>Log a session to start tracking your confidence.</p></div>";}
  else{cc.appendChild(confChart());cc.appendChild(el("div","legend","<span>Each bar is one logged session (1–5 confidence). Watch it climb.</span>"));}
  v.appendChild(cc);

  v.appendChild((function(){var s=el("div","section-title");s.innerHTML="<h2 class='serif'>Progress by category</h2>";return s;})());
  var cg=el("div","grid");cg.style.gridTemplateColumns="repeat(auto-fit,minmax(240px,1fr))";
  CATS.forEach(function(cat){var topics=TOPICS.filter(function(t){return t.cat===cat[0];});
    var done=topics.filter(function(t){return isPracticed(t.id);}).length,pct=Math.round(done/topics.length*100);
    var card=el("div","card");
    card.innerHTML="<div style='display:flex;align-items:center;gap:10px;margin-bottom:10px'><span style='font-size:1.2rem'>"+cat[1]+"</span><b style='flex:1;font-family:var(--serif)'>"+cat[0]+"</b><span style='font-weight:800;color:var(--brand)'>"+pct+"%</span></div>"+
      "<div style='height:8px;background:var(--bg-2);border-radius:999px;overflow:hidden'><i style='display:block;height:100%;width:"+pct+"%;background:linear-gradient(90deg,var(--brand),var(--gold-2));border-radius:999px;transition:width .6s'></i></div>"+
      "<div style='font-size:.76rem;color:var(--faint);font-weight:700;margin-top:6px'>"+done+" / "+topics.length+" topics</div>";
    cg.appendChild(card);});
  v.appendChild(cg);

  var reset=el("button","btn ghost sm","↺ Reset all progress");reset.style.marginTop="22px";
  reset.onclick=function(){if(confirm("Reset streak, sessions, confidence and practice history? Bookmarks stay.")){var bm=S.bookmarks,th=S.theme;S=JSON.parse(JSON.stringify(defaultState));S.bookmarks=bm;S.theme=th;saveState();refreshTop();renderProgress();toast("↺","Progress reset","Fresh start!");}};
  v.appendChild(reset);
}
function confChart(){
  var data=S.confHistory.slice(-10),wrap=el("div","chart");
  data.forEach(function(d,i){var col=el("div","col");col.innerHTML="<span class='v'>"+d.v+"</span><div class='b' style='height:0'></div><small>"+["","😣","😕","😐","🙂","😄"][d.v]+"</small>";
    wrap.appendChild(col);setTimeout(function(){$(".b",col).style.height=(d.v/5*100)+"%";},60+i*40);});
  return wrap;
}

/* ===== RANDOM ===== */
function randomTopic(){var pool=filteredTopics(null);if(!pool.length)pool=TOPICS.slice();var t=pool[Math.floor(Math.random()*pool.length)];
  toast("🎲","Random topic!",t.title);go("topic",t.id);}

/* ===== FX ===== */
function refreshTop(){$("#p-streak").textContent=displayStreak();var c=avgConfidence();$("#p-conf").textContent=c?(c.toFixed(1)+" "+confFace(c)):"—";}
function toast(icon,title,sub){var t=el("div","toast","<div class='ti'>"+icon+"</div><div><b>"+title+"</b><span>"+sub+"</span></div>");$("#toasts").appendChild(t);
  setTimeout(function(){t.style.transition="opacity .4s,transform .4s";t.style.opacity="0";t.style.transform="translateX(120%)";setTimeout(function(){t.remove();},400);},3200);}
function confetti(){if(window.matchMedia&&window.matchMedia("(prefers-reduced-motion:reduce)").matches)return;
  var c=el("div","confetti");document.body.appendChild(c);var cols=["#3452C4","#4C6EF5","#F0B429","#D9A21B","#2F9E44","#E8590C"];
  for(var i=0;i<64;i++){var p=el("i");p.style.left=Math.random()*100+"%";p.style.background=cols[i%cols.length];p.style.animationDuration=(1.6+Math.random()*1.6)+"s";p.style.animationDelay=(Math.random()*.4)+"s";p.style.transform="rotate("+Math.random()*360+"deg)";if(Math.random()>.5)p.style.borderRadius="50%";c.appendChild(p);}
  setTimeout(function(){c.remove();},3600);}

/* ===== THEME + DRAWER ===== */
function applyTheme(t){document.documentElement.setAttribute("data-theme",t);$("#themeBtn").textContent=t==="dark"?"☀️":"🌙";S.theme=t;saveState();}
$("#themeBtn").onclick=function(){applyTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark");};
$("#randomBtn").onclick=randomTopic;
function openDrawer(){$("#sidebar").classList.add("open");$("#scrim").classList.add("show");}
function closeDrawer(){$("#sidebar").classList.remove("open");$("#scrim").classList.remove("show");}
$("#hamb").onclick=openDrawer;$("#scrim").onclick=closeDrawer;

/* ===== INIT ===== */
(function init(){
  applyTheme(S.theme||((window.matchMedia&&window.matchMedia("(prefers-color-scheme:dark)").matches)?"dark":"light"));
  if(S.lastActive){var g=daysBetween(S.lastActive,dkey());if(g>1&&S.lastGoalDate&&daysBetween(S.lastGoalDate,dkey())>1){/* streak shows 0 via displayStreak */}}
  refreshTop();renderNav();renderDashboard();
  if(speechOn)try{window.speechSynthesis.getVoices();}catch(e){}
})();
</script>
</body>
