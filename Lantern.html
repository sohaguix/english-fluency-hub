/* ============================================================
   LESSON PLAYER ENGINE
   ============================================================ */
let L=null; // active lesson state
function startLesson(id){
  const u=UMAP[id]; if(!u) return;
  touchDay();
  const ex=u.make();
  openPlayer(ex, id, false, u.title);
}
function startReview(){
  if(!S.review.length) return;
  touchDay();
  openPlayer(reviewLesson(), null, true, "Review");
}
function openPlayer(exercises, unitId, isReview, title){
  L={ queue:exercises.slice(), idx:0, unitId, isReview, title,
      correct:0, graded:0, xp:0, requeued:0 };
  document.getElementById('livesIc').innerHTML=ic('heart');
  document.getElementById('player').classList.add('on');
  document.body.style.overflow='hidden';
  renderExercise();
}
function closePlayer(){
  document.getElementById('player').classList.remove('on');
  document.body.style.overflow='';
  L=null;
}
document.getElementById('quitBtn').onclick=()=>{ if(!L||confirm("Quit this lesson? Progress in this lesson will be lost.")) closePlayer(); };
document.getElementById('quitBtn').innerHTML=ic('x');

function updateProgress(){
  const pct=Math.round(L.idx/L.queue.length*100);
  document.getElementById('pfill').style.width=pct+'%';
  document.getElementById('livesVal').textContent=S.hearts;
}

// current answer controller
let CUR=null;
function renderExercise(){
  if(L.idx>=L.queue.length){ return finishLesson(); }
  updateProgress();
  const ex=L.queue[L.idx];
  const stage=document.getElementById('qstage');
  const fb=document.getElementById('feedback'); fb.className='feedback'; fb.innerHTML='';
  const btn=document.getElementById('checkBtn');
  btn.disabled=true; btn.className='btn primary'; btn.textContent = ex.type==='teach'||ex.type==='read'?'Continue':'Check';
  btn.onclick=()=>onCheck();
  CUR={ex, answered:false, correct:false, ready:false, value:null, graded:!['teach','read','speak','translate'].includes(ex.type)};
  RENDER[ex.type](ex, stage);
  if(ex.type==='teach'||ex.type==='read'){ CUR.ready=true; btn.disabled=false; }
}
function setReady(v){ CUR.ready=v; document.getElementById('checkBtn').disabled=!v; }

/* ---------- per-type renderers ---------- */
const RENDER={};

RENDER.teach=(ex,st)=>{
  const bn = ex.bn && !ex.noBn ? `<div class="mean bn">${ex.bn}</div>`:'';
  const note = ex.note? `<div class="note">${ex.note}</div>`:'';
  st.innerHTML=`<div class="q-kicker"><span class="pill">New</span> Learn this</div>
    <div class="teach">
      <div class="word">${ex.en}</div>
      <button class="say" onclick="say(${jq(ex.en)})">${ic('speaker')}</button>
      ${bn}
      <div class="ex">${hl(ex.ex, ex.en)}</div>
      ${note}
    </div>`;
  if(ex.en) markSeen(ex.en);
  setTimeout(()=>say(ex.en),260);
};

RENDER.mc=(ex,st)=>{
  const prompt = ex.promptBn? `<div class="q-prompt bn">${ex.prompt}</div>` : `<div class="q-prompt">${ex.prompt}</div>`;
  const speak = ex.speak? `<button class="say" style="width:40px;height:40px;margin:0 0 10px" onclick="say(${jq(ex.speak)})">${ic('speaker')}</button>`:'';
  st.innerHTML=`<div class="q-kicker">${ex.kicker||'Question'}</div>
    ${prompt}${speak}<div class="q-sub">${ex.sub||''}</div>
    <div class="choices" id="choices"></div>`;
  const box=document.getElementById('choices');
  ex.choices.forEach((c,i)=>{
    const d=document.createElement('button');

  });
};

RENDER.listen=(ex,st)=>{
  st.innerHTML=`<div class="q-kicker">${ex.kicker||'Listen'}</div>
    <div style="text-align:center;margin:6px 0 20px">
      <button class="say" style="width:64px;height:64px;margin:0 auto" onclick="say(${jq(ex.play)})">${ic('speaker')}</button>
      <button class="say" style="width:40px;height:40px;margin:10px auto 0;background:var(--paper-2);box-shadow:0 3px 0 var(--line)" onclick="say(${jq(ex.play)},0.62)"><span style="color:var(--ink-soft);font-weight:800;font-size:11px">0.5×</span></button>

    const d=document.createElement('button'); d.className='choice';
    d.innerHTML=`<span class="key">${String.fromCharCode(65+i)}</span><span>${c}</span>`;
    d.onclick=()=>{ if(CUR.answered)return; document.querySelectorAll('#choices .choice').forEach(x=>x.classList.remove('sel')); d.classList.add('sel'); CUR.value=c; setReady(true); };
    box.appendChild(d);
  });
  setTimeout(()=>say(ex.play),300);
};

RENDER.fill=(ex,st)=>{
  st.innerHTML=`<div class="q-kicker">${ex.kicker||'Fill the gap'}</div>
    <div class="q-prompt" style="font-size:24px">${ex.sentence.replace('____','<span style="color:var(--brand)">____</span>')}</div>
    <div class="q-sub bn">${ex.sub||''}</div>
    <div class="choices" id="choices"></div>`;
  const box=document.getElementById('choices');
  ex.choices.forEach((c,i)=>{
    const d=document.createElement('button'); d.className='choice';

    d.onclick=()=>{ if(CUR.answered)return; document.querySelectorAll('#choices .choice').forEach(x=>x.classList.remove('sel')); d.classList.add('sel'); CUR.value=c; setReady(true); };
    box.appendChild(d);
  });
};

RENDER.build=(ex,st)=>{
  const words=shuffle(ex.answer.replace(/[.?!,]/g,'').split(/\s+/));
  const head = ex.promptBn
    ? `<div class="q-prompt" style="font-size:22px">Say this in English</div><div class="q-sub bn" style="font-size:18px;color:var(--ink)">${ex.promptBn}</div>`
    : `<div class="q-prompt" style="font-size:22px">${ex.prompt||'Arrange the words'}</div>`;
  st.innerHTML=`<div class="q-kicker">${ex.kicker||'Build the sentence'}</div>
    ${head}
    <div class="bank-answer empty" id="ans" style="margin-top:14px"></div>
    <div class="bank" id="bank"></div>`;
  const ans=document.getElementById('ans'), bank=document.getElementById('bank');
  CUR.placed=[];
  words.forEach((w,i)=>{
    const t=document.createElement('button'); t.className='tile'; t.textContent=w; t.dataset.i=i;
    t.onclick=()=>{ if(CUR.answered)return;
      if(t.classList.contains('used')){ // remove from answer
        t.classList.remove('used'); const chip=ans.querySelector(`[data-src="${i}"]`); if(chip)chip.remove();
      } else {
        t.classList.add('used');
        const chip=document.createElement('button'); chip.className='tile placed'; chip.textContent=w; chip.dataset.src=i;
        chip.onclick=()=>{ chip.remove(); t.classList.remove('used'); syncBuild(); };
        ans.appendChild(chip);
      }
      syncBuild();
    };
    bank.appendChild(t);
  });
  function syncBuild(){
    const chips=[...ans.querySelectorAll('.tile')];
    ans.classList.toggle('empty', chips.length===0);
    CUR.value=chips.map(c=>c.textContent).join(' ');
    setReady(chips.length>0);
  }
};

RENDER.match=(ex,st)=>{
  st.innerHTML=`<div class="q-kicker">${ex.kicker||'Match the pairs'}</div>
    <div class="q-sub">Tap an English word, then its meaning.</div>
    <div class="match-grid"><div class="match-col" id="colA"></div><div class="match-col" id="colB"></div></div>`;
  const A=document.getElementById('colA'), B=document.getElementById('colB');
  const left=shuffle(ex.pairs.map((p,i)=>({t:p.a,i}))), right=shuffle(ex.pairs.map((p,i)=>({t:p.b,i})));
  let selA=null, matched=0;
  left.forEach(o=>{ const c=document.createElement('button'); c.className='mcell'; c.textContent=o.t; c.dataset.i=o.i;
    c.onclick=()=>{ if(c.classList.contains('matched'))return; A.querySelectorAll('.mcell').forEach(x=>x.classList.remove('sel')); c.classList.add('sel'); selA=c; };
    A.appendChild(c); });
  right.forEach(o=>{ const c=document.createElement('button'); c.className='mcell bn'; c.textContent=o.t; c.dataset.i=o.i;
    c.onclick=()=>{ if(c.classList.contains('matched')||!selA)return;
      if(selA.dataset.i===c.dataset.i){ selA.classList.add('matched'); selA.classList.remove('sel'); c.classList.add('matched'); selA=null; matched++;
        if(matched===ex.pairs.length){ CUR.value='__match_done__'; setReady(true); document.getElementById('checkBtn').textContent='Continue'; }
      } else { c.classList.add('miss'); const s=selA; setTimeout(()=>c.classList.remove('miss'),360); }
    };
    B.appendChild(c); });
};

RENDER.speak=(ex,st)=>{
  const bn = ex.bn && !ex.noBn? `<div class="mean bn" style="font-size:18px;margin-top:6px">${ex.bn}</div>`:'';
  st.innerHTML=`<div class="q-kicker">Speaking</div>
    <div class="q-sub" style="text-align:center;margin-bottom:6px">Read this sentence aloud</div>
    <div class="teach" style="padding:22px">
      <div style="font-family:var(--disp);font-size:24px;font-weight:600;line-height:1.35">${ex.sentence}</div>

      <button class="say" style="width:44px;height:44px;margin:14px auto 0" onclick="say(${jq(ex.sentence)})">${ic('speaker')}</button>
    </div>
    <div class="speak-box">
      <button class="mic" id="mic">${ic('mic')}</button>
      <div class="heard" id="heard">${CAN_LISTEN?'Tap the mic and say it':'Say it aloud, then continue'}</div>
    </div>`;
  const mic=document.getElementById('mic'), heard=document.getElementById('heard');
  if(!CAN_LISTEN){ CUR.value='__spoken__'; setReady(true);
    mic.onclick=()=>{ heard.innerHTML='<b>Nice!</b> Keep going.'; setReady(true); };
    return;
  }
  mic.onclick=()=>{
    const rec=new SR(); rec.lang='en-US'; rec.interimResults=false; rec.maxAlternatives=1;
    mic.classList.add('rec'); heard.textContent='Listening…';
    rec.onresult=(e)=>{ const said=e.results[0][0].transcript; const sim=similarity(said, ex.sentence);
      mic.classList.remove('rec');
      if(sim>=0.55){ heard.innerHTML=`<b style="color:var(--green)">Great:</b> “${said}”`; CUR.value='__spoken__'; }
      else { heard.innerHTML=`Heard: “${said}” — try once more`; CUR.value='__spoken__'; }
      setReady(true);
    };
    rec.onerror=()=>{ mic.classList.remove('rec'); heard.innerHTML='No mic access. Say it aloud, then continue.'; CUR.value='__spoken__'; setReady(true); };
    rec.onend=()=>mic.classList.remove('rec');
    try{ rec.start(); }catch(e){ heard.textContent='Say it aloud, then continue.'; CUR.value='__spoken__'; setReady(true); }
  };
};

RENDER.translate=(ex,st)=>{
  st.innerHTML=`<div class="q-kicker">Writing · translate</div>
    <div class="q-sub">Read the Bengali, then write it in English.</div>
    <div class="teach" style="padding:18px 20px;text-align:left"><div class="bn" style="font-size:17px;line-height:1.7">${ex.bn}</div></div>
    <textarea class="tinput" id="tw" rows="3" placeholder="Write your English here…" style="margin-top:14px;resize:vertical" oninput="CUR.value=this.value;setReady(this.value.trim().length>3)"></textarea>`;
};

RENDER.read=(ex,st)=>{
  const paras=ex.text.split(/(?<=[.!?"])\s+(?=[A-Z"])/).reduce((acc,s,i)=>{ if(i%3===0)acc.push([]); acc[acc.length-1].push(s); return acc; },[]).map(g=>g.join(' '));
  st.innerHTML=`<div class="q-kicker">Reading</div>
    <div class="q-prompt" style="font-size:26px;margin-bottom:12px">${ex.title}</div>
    <div class="passage" id="pass">${paras.map(p=>`<p>${p}</p>`).join('')}</div>
    <div class="q-sub" style="margin-top:14px">Read it fully. Questions come next. Tap ${ic('speaker')} to listen.</div>
    <button class="say" style="width:44px;height:44px;margin-top:8px" onclick="sayLong(${jq(ex.text)})">${ic('speaker')}</button>`;
};

/* ---------- check / advance ---------- */
function onCheck(){
  const ex=CUR.ex, btn=document.getElementById('checkBtn'), fb=document.getElementById('feedback');
  if(!CUR.answered){
    // translate: reveal model answer, then continue on next click
    if(ex.type==='translate'){
      CUR.answered=true; addXp(12,'writing'); if(ex.item)0;
      showFeedback(true, ex); btn.textContent='Continue'; setReady(true); return;
    }
    // non-graded (teach / read / speak) → just advance
    if(!CUR.graded){
      awardNonGraded(ex);
      next(); return;
    }
    CUR.answered=true;
    let ok=false, correctText='';
    if(ex.type==='mc'||ex.type==='listen'||ex.type==='fill'){ ok = norm(CUR.value)===norm(ex.answer); correctText=ex.answer;
      document.querySelectorAll('#choices .choice').forEach(c=>{ const txt=c.querySelector('span:last-child').textContent;
        c.classList.add('dis'); if(norm(txt)===norm(ex.answer)) c.classList.add('correct');
        else if(c.classList.contains('sel')) c.classList.add('wrong'); else c.classList.add('mute'); });
    } else if(ex.type==='build'){ ok = norm(CUR.value)===norm(ex.answer.replace(/[.?!,]/g,'')); correctText=ex.answer; }
    else if(ex.type==='match'){ ok=true; }
    // scoring
    L.graded++;
    if(ok){ L.correct++; correctFx(); addXp(xpFor(ex), ex.skill);
      showFeedback(true, ex);
      if(ex.item) removeFromReview(ex.item.en);
    } else {
      loseHeart(); wrongFx();
      showFeedback(false, ex, correctText);
      if(ex.item) pushReview(ex.item, ex.skill);
      requeue(ex);
    }
    btn.textContent='Continue'; setReady(true);
  } else { next(); }
}
function next(){ L.idx++; renderExercise(); }

function awardNonGraded(ex){
  if(ex.type==='teach'){ addXp(2, ex.skill); }
  else if(ex.type==='read'){ addXp(6,'reading'); }
  else if(ex.type==='speak'){ addXp(8,'speaking'); }
}

function xpFor(ex){ return ({mc:10,listen:10,fill:10,build:12,match:15})[ex.type]||8; }

function showFeedback(ok, ex, correctText){
  const fb=document.getElementById('feedback');
  if(ex.type==='translate'){
    fb.className='feedback good show'; fb.innerHTML=`<div class="fi">${ic('check')}</div><div>Model answer<div class="corr">${ex.model}</div></div>`;
    return;
  }
  if(ok){ fb.className='feedback good show'; fb.innerHTML=`<div class="fi">${ic('check')}</div><div>${pick(['Nice work!','Exactly right.','Well done!','Perfect.'])}</div>`; }
  else { fb.className='feedback bad show';
    fb.innerHTML=`<div class="fi">${ic('x')}</div><div>Not quite.<span class="corr">Answer: <b>${correctText||ex.answer}</b>${ex.item&&ex.item.bn?` · ${ex.item.bn}`:''}</span></div>`; }
}

function requeue(ex){
  if(ex._rq || L.requeued>=4) return;
  const copy=Object.assign({}, ex); copy._rq=true; copy.answered=false;
  L.queue.push(copy); L.requeued++;
}

/* ---------- economy ---------- */
function addXp(n, skill){ S.xp+=n; L.xp+=n; if(skill&&S.skills[skill]!=null) S.skills[skill]+=n; renderTop(); save(); }
function loseHeart(){ if(S.hearts>0){ S.hearts--; renderTop(); save(); if(S.hearts===0) toast('Out of hearts — keep going, they refill tomorrow','heart'); } }
function markSeen(en){ if(en&&!S.seen[en]){ S.seen[en]=true; save(); } }
function pushReview(item, skill){ if(!item||!item.en) return; if(S.review.some(r=>r.en===item.en))return;
  S.review.push({en:item.en, bn:item.bn, ex:item.ex, skill}); if(S.review.length>60)S.review.shift(); save(); }
function removeFromReview(en){ const i=S.review.findIndex(r=>r.en===en); if(i>=0){ S.review.splice(i,1); save(); } }

/* ---------- finish ---------- */
function finishLesson(){
  const acc = L.graded? L.correct/L.graded : 1;
  let crowns = acc>=0.9?3 : acc>=0.75?2 : 1;
  if(L.unitId){
    const u=unit(L.unitId); u.done=true; u.best=Math.max(u.best, Math.round(acc*100)); u.crowns=Math.max(u.crowns, crowns);
    save();
  }
  document.getElementById('pfill').style.width='100%';
  const ds=document.getElementById('doneScreen');
  const perfect = L.graded>0 && L.correct===L.graded;
  ds.innerHTML=`
    <div class="medal">${medalSvg(crowns)}</div>
    <h2>${perfect?'Flawless!':pick(['Lesson complete!','Well done!','You did it!'])}</h2>
    <div class="tag">${L.isReview?'Review session finished':'“'+ (L.title||'Lesson') +'” complete'}</div>
    <div class="done-stats">
      <div class="done-stat xp"><div class="v">+${L.xp}</div><div class="l">XP earned</div></div>
      <div class="done-stat acc"><div class="v">${L.graded?Math.round(acc*100):100}%</div><div class="l">Accuracy</div></div>
      <div class="done-stat streak"><div class="v">${S.streak}</div><div class="l">Day streak</div></div>
    </div>
    <button class="btn primary" style="min-width:220px" onclick="afterDone()">Continue</button>
    ${acc<0.75&&!L.isReview?`<button class="btn ghost" onclick="replayLesson()">Try this lesson again</button>`:''}`;
  document.getElementById('player').classList.remove('on');
  ds.classList.add('on');
  if(acc>=0.75) confetti();
}
function replayLesson(){ const id=L.unitId; document.getElementById('doneScreen').classList.remove('on'); if(id) startLesson(id); }
function afterDone(){
  document.getElementById('doneScreen').classList.remove('on');
  document.body.style.overflow=''; L=null;
  render('learn'); go('learn');
}

/* ============================================================
   HELPERS
   ============================================================ */
function jq(s){ return JSON.stringify(String(s)); }
function norm(s){ return String(s||'').toLowerCase().replace(/[.,!?"'’]/g,'').replace(/\s+/g,' ').trim(); }
function hl(text, word){ if(!word) return text; try{ const re=new RegExp('('+word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','i'); return text.replace(re,'<span class="hl">$1</span>'); }catch(e){ return text; } }
function pick(a){ return a[(Math.random()*a.length)|0]; }
function similarity(a,b){ a=norm(a).split(' '); b=norm(b).split(' '); const setB=new Set(b); let hit=0; a.forEach(w=>{ if(setB.has(w)){hit++; setB.delete(w);} }); return hit/Math.max(a.length,b.length,1); }
function sayLong(t){ if(!('speechSynthesis'in window))return; speechSynthesis.cancel(); const parts=t.match(/[^.!?]+[.!?]?/g)||[t]; parts.forEach((p,i)=>{ const u=new SpeechSynthesisUtterance(p.trim()); u.rate=0.92; if(VOICE)u.voice=VOICE; speechSynthesis.speak(u); }); }

function correctFx(){ try{ beep(660,0.08); setTimeout(()=>beep(880,0.09),80); }catch(e){} }
function wrongFx(){ try{ beep(200,0.14,'sawtooth'); }catch(e){} }
let AC=null;
function beep(freq,dur,type){ if(!window.AudioContext&&!window.webkitAudioContext)return; AC=AC||new (window.AudioContext||window.webkitAudioContext)(); const o=AC.createOscillator(),g=AC.createGain(); o.type=type||'sine'; o.frequency.value=freq; o.connect(g); g.connect(AC.destination); g.gain.setValueAtTime(0.06,AC.currentTime); g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur); o.start(); o.stop(AC.currentTime+dur); }

function toast(msg, icn){ const t=document.getElementById('toast'); t.innerHTML=(icn?ic(icn):'')+`<span>${msg}</span>`; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600); }

function confetti(){ const box=document.getElementById('confetti'); box.style.display='block'; box.innerHTML='';
  const cols=['#F0A62F','#4B47C7','#2E9E6B','#E1573F','#8257E5','#2E93C9'];
  for(let i=0;i<80;i++){ const p=document.createElement('div'); p.className='cpiece';
    p.style.left=Math.random()*100+'%'; p.style.background=cols[(Math.random()*cols.length)|0];
    p.style.animationDuration=(1.6+Math.random()*1.4)+'s'; p.style.animationDelay=(Math.random()*0.4)+'s';
    p.style.transform=`rotate(${Math.random()*360}deg)`; if(Math.random()>0.5)p.style.borderRadius='50%';
    box.appendChild(p);
  }
  setTimeout(()=>{ box.style.display='none'; },3200);
}

function medalSvg(crowns){
  const gold='#F0A62F', deep='#C87E12';
  return `<svg viewBox="0 0 120 120" fill="none">
    <circle cx="60" cy="54" r="38" fill="${gold}" stroke="${deep}" stroke-width="4"/>
    <circle cx="60" cy="54" r="28" fill="#fff" opacity=".2"/>
    <path d="M42 54l12 12 24-24" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M40 88l-8 24 28-12 28 12-8-24" fill="${gold}" stroke="${deep}" stroke-width="3" stroke-linejoin="round"/>
    ${Array.from({length:crowns}).map((_,i)=>`<circle cx="${48+i*12}" cy="16" r="5" fill="${gold}" stroke="${deep}" stroke-width="2"/>`).join('')}
  </svg>`;
}

/* ============================================================
   INIT
   ============================================================ */
function init(){
  touchDay(); renderTop(); buildNav(); render('learn');
  // warm up voices
  if('speechSynthesis'in window){ setTimeout(pickVoice,300); }
}
init();
