<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Lantern — Learn English Step by Step</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:root{
  --paper:#FAF6EF; --paper-2:#F3ECDF; --card:#FFFDF8;
  --ink:#20242E; --ink-soft:#585C6C; --ink-faint:#8A8E9C;
  --brand:#4B47C7; --brand-deep:#322E9E; --brand-soft:#E7E6FA;
  --gold:#F0A62F; --gold-deep:#C87E12; --gold-soft:#FBE6BC;
  --green:#2E9E6B; --green-soft:#D6F0E2;
  --coral:#E1573F; --coral-soft:#FBDDD4;
  --violet:#8257E5; --violet-soft:#EBE3FB;
  --sky:#2E93C9; --sky-soft:#D6EDF8;
  --line:rgba(32,36,46,.10); --line-2:rgba(32,36,46,.06);
  --shadow-sm:0 1px 2px rgba(32,36,46,.06), 0 2px 6px rgba(32,36,46,.05);
  --shadow-md:0 4px 10px rgba(32,36,46,.07), 0 12px 30px rgba(32,36,46,.09);
  --shadow-node:0 4px 0 rgba(32,36,46,.14);
  --r-sm:12px; --r:18px; --r-lg:26px;
  --disp:'Fraunces',Georgia,serif; --sans:'Inter',system-ui,sans-serif; --bn:'Noto Sans Bengali','Inter',sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--sans); color:var(--ink); background:var(--paper);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  background-image:radial-gradient(circle at 12% 8%, rgba(240,166,47,.06), transparent 42%),
                   radial-gradient(circle at 88% 4%, rgba(75,71,199,.06), transparent 40%);
  min-height:100vh; overflow-x:hidden;
}
.bn{font-family:var(--bn); font-weight:500}
h1,h2,h3,h4{font-family:var(--disp); font-weight:600; letter-spacing:-.01em; line-height:1.12; margin:0}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
.tnum{font-variant-numeric:tabular-nums}
::selection{background:var(--gold-soft)}

/* ============ APP SHELL ============ */
#app{max-width:940px; margin:0 auto; padding:0 20px 120px; position:relative}

/* Top bar */
.topbar{position:sticky; top:0; z-index:40; display:flex; align-items:center; gap:10px;
  padding:14px 16px; margin:0 -20px 8px; backdrop-filter:blur(14px) saturate(1.4);
  background:rgba(250,246,239,.78); border-bottom:1px solid var(--line-2)}
.brand{display:flex; align-items:center; gap:9px; margin-right:auto; font-family:var(--disp);
  font-weight:700; font-size:19px; letter-spacing:-.02em}
.brand .lantern{width:26px; height:26px; display:grid; place-items:center; filter:drop-shadow(0 2px 4px rgba(240,166,47,.4))}
.stat{display:flex; align-items:center; gap:6px; font-weight:700; font-size:14px;
  padding:7px 11px; border-radius:999px; background:var(--card); box-shadow:var(--shadow-sm); border:1px solid var(--line-2)}
.stat svg{width:17px; height:17px}
.stat.streak{color:var(--gold-deep)} .stat.xp{color:var(--brand-deep)} .stat.hearts{color:var(--coral)}

/* Bottom nav */
.nav{position:fixed; left:50%; bottom:16px; transform:translateX(-50%); z-index:50;
  display:flex; gap:4px; padding:6px; border-radius:999px; background:var(--card);
  box-shadow:var(--shadow-md); border:1px solid var(--line)}
.nav button{display:flex; flex-direction:column; align-items:center; gap:3px; width:64px; padding:8px 4px;
  border-radius:999px; font-size:10.5px; font-weight:700; color:var(--ink-faint); letter-spacing:.01em; transition:.18s}
.nav button svg{width:22px; height:22px; stroke-width:2}
.nav button.on{color:var(--brand); background:var(--brand-soft)}
.nav button:not(.on):hover{color:var(--ink-soft)}

/* ============ HOME / PATH ============ */
.hero{padding:26px 4px 6px}
.hero .eyebrow{font-weight:800; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold-deep)}
.hero h1{font-size:clamp(30px,6vw,44px); margin:8px 0 6px; font-weight:600; font-optical-sizing:auto}
.hero h1 em{font-style:italic; color:var(--brand)}
.hero p{color:var(--ink-soft); font-size:15.5px; max-width:52ch; line-height:1.55; margin:0}

.continue-card{margin:20px 0 8px; padding:20px; border-radius:var(--r-lg); position:relative; overflow:hidden;
  background:linear-gradient(135deg,#3A36B4,#4B47C7 55%,#5D57DE); color:#fff; box-shadow:var(--shadow-md)}
.continue-card::after{content:""; position:absolute; right:-40px; top:-40px; width:180px; height:180px;
  background:radial-gradient(circle,rgba(240,166,47,.5),transparent 68%)}
.continue-card .lbl{font-size:12px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; opacity:.85}
.continue-card h3{font-size:22px; margin:6px 0 3px; color:#fff; position:relative}
.continue-card .sub{opacity:.82; font-size:13.5px; position:relative}
.continue-card .go{margin-top:16px; position:relative; display:inline-flex; align-items:center; gap:8px;
  background:var(--gold); color:#3a2a06; font-weight:800; font-size:14px; padding:11px 20px; border-radius:999px;
  box-shadow:0 4px 0 var(--gold-deep); transition:transform .12s}
.continue-card .go:active{transform:translateY(3px); box-shadow:0 1px 0 var(--gold-deep)}

/* Section header on path */
.stage-head{display:flex; align-items:center; gap:14px; margin:34px 0 6px; padding:0 2px}
.stage-head .num{font-family:var(--disp); font-weight:900; font-size:15px; color:#fff; background:var(--ink);
  width:34px; height:34px; border-radius:11px; display:grid; place-items:center; flex:none; box-shadow:var(--shadow-sm)}
.stage-head .meta{flex:1}
.stage-head .k{font-size:11px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-faint)}
.stage-head h2{font-size:23px; margin-top:1px}
.stage-head .prog{font-size:12px; font-weight:700; color:var(--ink-soft); white-space:nowrap}

/* The winding path */
.trail{position:relative; padding:14px 0 8px; margin:0 auto; max-width:520px}
.node-row{display:flex; justify-content:center; position:relative; padding:9px 0}
.node{position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer;
  transition:transform .14s}
.node:active{transform:translateY(2px)}
.node .disc{width:74px; height:74px; border-radius:50%; display:grid; place-items:center; position:relative;
  background:var(--card); box-shadow:var(--shadow-node), var(--shadow-sm); border:1px solid var(--line)}
.node .disc svg.ic{width:30px; height:30px}
.node.done .disc{background:var(--green); border-color:transparent; box-shadow:0 4px 0 #1f7a50}
.node.done .disc svg.ic{color:#fff}
.node.current .disc{background:var(--gold); border-color:transparent; box-shadow:0 5px 0 var(--gold-deep)}
.node.current .disc svg.ic{color:#4a3405}
.node.locked{cursor:not-allowed; opacity:.62}
.node.locked .disc{background:var(--paper-2); box-shadow:0 3px 0 rgba(32,36,46,.10)}
.node.locked .disc svg.ic{color:var(--ink-faint)}
.node .cap{font-size:12px; font-weight:700; color:var(--ink-soft); max-width:110px; text-align:center; line-height:1.25}
.node.current .cap{color:var(--gold-deep)}
.node .crowns{position:absolute; top:-8px; right:-6px; display:flex; gap:1px}
.node .crown{width:15px; height:15px; color:var(--gold)}
/* current pulse ring */
.node.current .disc::before{content:""; position:absolute; inset:-7px; border-radius:50%;
  border:3px solid var(--gold); opacity:.5; animation:pulse 2.1s ease-out infinite}
@keyframes pulse{0%{transform:scale(.92); opacity:.55} 70%{transform:scale(1.14); opacity:0} 100%{opacity:0}}
/* dotted connector */
.trail::before{content:""; position:absolute; left:50%; top:20px; bottom:20px; width:0;
  border-left:3px dotted var(--line); transform:translateX(-50%); z-index:0}
/* horizontal offset zigzag */
.node-row:nth-child(4n+1){justify-content:center}
.node-row:nth-child(4n+2){justify-content:center; padding-left:118px}
.node-row:nth-child(4n+3){justify-content:center}
.node-row:nth-child(4n+0){justify-content:center; padding-right:118px}
@media(max-width:460px){
  .node-row:nth-child(4n+2){padding-left:74px}
  .node-row:nth-child(4n+0){padding-right:74px}
  .node .disc{width:66px;height:66px}
}

/* review chip on path */
.review-cta{max-width:520px; margin:16px auto 0; display:flex; align-items:center; gap:13px; padding:15px 17px;
  border-radius:var(--r); background:var(--violet-soft); border:1px solid rgba(130,87,229,.2); cursor:pointer; transition:.15s}
.review-cta:hover{transform:translateY(-1px); box-shadow:var(--shadow-sm)}
.review-cta .ib{width:42px;height:42px;border-radius:12px;background:var(--violet);display:grid;place-items:center;flex:none}
.review-cta .ib svg{width:22px;height:22px;color:#fff}
.review-cta h4{font-size:15px;font-family:var(--sans);font-weight:800}
.review-cta p{margin:2px 0 0;font-size:12.5px;color:var(--ink-soft)}
.review-cta .cnt{margin-left:auto;background:var(--violet);color:#fff;font-weight:800;font-size:13px;padding:5px 12px;border-radius:999px}

/* ============ LESSON PLAYER ============ */
.player{position:fixed; inset:0; z-index:100; background:var(--paper); display:none; flex-direction:column;
  background-image:radial-gradient(circle at 50% -8%, rgba(75,71,199,.06), transparent 46%)}
.player.on{display:flex}
.player-top{display:flex; align-items:center; gap:14px; padding:16px 18px; max-width:660px; margin:0 auto; width:100%}
.player-top .quit{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;color:var(--ink-faint);
  background:var(--card);box-shadow:var(--shadow-sm)}
.pbar{flex:1; height:14px; border-radius:999px; background:var(--paper-2); overflow:hidden; box-shadow:inset 0 1px 2px rgba(0,0,0,.05)}
.pbar .fill{height:100%; border-radius:999px; background:linear-gradient(90deg,var(--green),#42b884);
  width:0%; transition:width .4s cubic-bezier(.2,.9,.2,1); position:relative}
.pbar .fill::after{content:"";position:absolute;top:2px;left:6px;right:6px;height:3px;border-radius:2px;background:rgba(255,255,255,.4)}
.player-top .lives{display:flex;align-items:center;gap:5px;font-weight:800;color:var(--coral);font-size:15px}
.player-top .lives svg{width:20px;height:20px}

.stage{flex:1; overflow-y:auto; padding:8px 18px 20px}
.stage-inner{max-width:600px; margin:0 auto; width:100%}
.q-kicker{font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--brand);margin:12px 0 14px;
  display:flex;align-items:center;gap:8px}
.q-kicker .pill{background:var(--brand-soft);padding:3px 10px;border-radius:999px}
.q-prompt{font-family:var(--disp);font-size:clamp(23px,5vw,30px);font-weight:600;line-height:1.22;margin-bottom:6px}
.q-sub{color:var(--ink-soft);font-size:15px;margin-bottom:20px}
.q-sub .bn{color:var(--ink)}

/* teaching card */
.teach{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:26px 24px;box-shadow:var(--shadow-md);
  text-align:center;position:relative;overflow:hidden}
.teach::before{content:"";position:absolute;left:0;right:0;top:0;height:5px;background:linear-gradient(90deg,var(--gold),var(--brand))}
.teach .word{font-family:var(--disp);font-size:38px;font-weight:600;letter-spacing:-.02em;margin:6px 0 4px}
.teach .say{margin:4px auto 12px;width:52px;height:52px;border-radius:50%;background:var(--brand);display:grid;place-items:center;
  box-shadow:0 4px 0 var(--brand-deep);transition:transform .1s}
.teach .say:active{transform:translateY(3px);box-shadow:0 1px 0 var(--brand-deep)}
.teach .say svg{width:24px;height:24px;color:#fff}
.teach .mean{font-family:var(--bn);font-size:22px;font-weight:600;color:var(--brand-deep);margin-bottom:14px}
.teach .ex{background:var(--paper);border-radius:var(--r);padding:14px 16px;font-size:16px;line-height:1.5;color:var(--ink);
  border:1px dashed var(--line)}
.teach .ex .hl{color:var(--gold-deep);font-weight:700}
.teach .note{margin-top:14px;font-size:13.5px;color:var(--ink-soft);line-height:1.5;text-align:left}

/* choices */
.choices{display:flex;flex-direction:column;gap:11px;margin-top:6px}
.choice{display:flex;align-items:center;gap:13px;padding:16px 18px;border-radius:var(--r);background:var(--card);
  border:1.5px solid var(--line);box-shadow:0 2px 0 var(--line);font-size:16px;font-weight:600;text-align:left;transition:.12s;width:100%}
.choice:hover:not(.dis){border-color:var(--brand);transform:translateY(-1px)}
.choice .key{width:26px;height:26px;flex:none;border-radius:8px;background:var(--paper-2);display:grid;place-items:center;
  font-size:13px;font-weight:800;color:var(--ink-soft)}
.choice.sel{border-color:var(--brand);background:var(--brand-soft)}
.choice.sel .key{background:var(--brand);color:#fff}
.choice.correct{border-color:var(--green);background:var(--green-soft)}
.choice.correct .key{background:var(--green);color:#fff}
.choice.wrong{border-color:var(--coral);background:var(--coral-soft)}
.choice.wrong .key{background:var(--coral);color:#fff}
.choice.dis{cursor:default}
.choice.mute{opacity:.5}
.choice .bn{font-family:var(--bn);font-weight:600}

/* word bank / builder */
.bank-answer{min-height:58px;border-bottom:2px dashed var(--line);display:flex;flex-wrap:wrap;gap:8px;
  padding:10px 4px 16px;margin-bottom:22px;align-content:flex-start}
.bank-answer.empty::before{content:"Tap the words below to build your answer";color:var(--ink-faint);font-size:14px;font-weight:500}
.bank{display:flex;flex-wrap:wrap;gap:9px;justify-content:center}
.tile{padding:11px 15px;border-radius:12px;background:var(--card);border:1.5px solid var(--line);box-shadow:0 2px 0 var(--line);
  font-size:16px;font-weight:600;transition:.1s}
.tile:hover{border-color:var(--brand)}
.tile:active{transform:translateY(2px);box-shadow:0 0 0 var(--line)}
.tile.used{opacity:.32;pointer-events:none;background:var(--paper-2)}
.tile.placed{background:var(--brand-soft);border-color:var(--brand)}

/* match */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.match-col{display:flex;flex-direction:column;gap:10px}
.mcell{padding:15px 12px;border-radius:14px;background:var(--card);border:1.5px solid var(--line);box-shadow:0 2px 0 var(--line);
  font-size:15.5px;font-weight:600;text-align:center;transition:.12s}
.mcell.bn{font-family:var(--bn)}
.mcell.sel{border-color:var(--brand);background:var(--brand-soft)}
.mcell.matched{border-color:var(--green);background:var(--green-soft);color:var(--green);pointer-events:none;opacity:.85}
.mcell.miss{border-color:var(--coral);background:var(--coral-soft);animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* text input */
.tinput{width:100%;padding:16px 18px;border-radius:var(--r);border:1.5px solid var(--line);background:var(--card);
  font-family:var(--sans);font-size:17px;font-weight:600;color:var(--ink);box-shadow:0 2px 0 var(--line);outline:none}
.tinput:focus{border-color:var(--brand)}
.model-answer{margin-top:16px;padding:16px 18px;border-radius:var(--r);background:var(--green-soft);border:1px solid rgba(46,158,107,.25)}
.model-answer .k{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--green);margin-bottom:5px}
.model-answer .txt{font-size:16px;line-height:1.5;font-weight:500}

/* reading passage */
.passage{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:22px;box-shadow:var(--shadow-sm);
  max-height:44vh;overflow-y:auto;font-family:var(--disp);font-size:17px;line-height:1.66;color:#2a2e3a}
.passage p{margin:0 0 14px}

/* speaking */
.speak-box{text-align:center;padding:8px 0}
.mic{margin:12px auto;width:88px;height:88px;border-radius:50%;background:var(--coral);display:grid;place-items:center;
  box-shadow:0 5px 0 #b23f2c;transition:transform .1s}
.mic:active{transform:translateY(3px)}
.mic svg{width:38px;height:38px;color:#fff}
.mic.rec{animation:micpulse 1.1s infinite}
@keyframes micpulse{0%,100%{box-shadow:0 5px 0 #b23f2c,0 0 0 0 rgba(225,87,63,.4)}50%{box-shadow:0 5px 0 #b23f2c,0 0 0 16px rgba(225,87,63,0)}}
.heard{margin-top:14px;font-size:15px;color:var(--ink-soft);min-height:22px}
.heard b{color:var(--ink)}

/* footer check bar */
.checkbar{padding:16px 18px 22px;border-top:1px solid var(--line-2);background:var(--card)}
.checkbar-inner{max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.feedback{display:none;padding:14px 16px;border-radius:var(--r);font-weight:600;font-size:14.5px;align-items:flex-start;gap:11px;line-height:1.45}
.feedback.show{display:flex}
.feedback.good{background:var(--green-soft);color:#1c6e48}
.feedback.bad{background:var(--coral-soft);color:#a83a26}
.feedback .fi{width:26px;height:26px;flex:none;border-radius:50%;display:grid;place-items:center;color:#fff}
.feedback.good .fi{background:var(--green)} .feedback.bad .fi{background:var(--coral)}
.feedback .corr{display:block;font-weight:500;margin-top:3px;opacity:.9}
.feedback .corr b{font-weight:800}
.btn{padding:15px;border-radius:var(--r);font-weight:800;font-size:16px;text-align:center;transition:transform .1s;letter-spacing:.01em}
.btn.primary{background:var(--green);color:#fff;box-shadow:0 4px 0 #1f7a50}
.btn.primary:active{transform:translateY(4px);box-shadow:0 0 0 #1f7a50}
.btn.primary:disabled{background:var(--paper-2);color:var(--ink-faint);box-shadow:0 4px 0 var(--line);cursor:not-allowed}
.btn.ghost{background:transparent;color:var(--ink-soft);box-shadow:none}
.btn.skip{background:var(--paper-2);color:var(--ink-soft);box-shadow:0 4px 0 var(--line)}
.btn.skip:active{transform:translateY(4px);box-shadow:0 0 0 var(--line)}

/* lesson complete screen */
.done-screen{position:fixed;inset:0;z-index:110;background:var(--paper);display:none;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:30px;
  background-image:radial-gradient(circle at 50% 30%,rgba(240,166,47,.14),transparent 55%)}
.done-screen.on{display:flex}
.done-screen .medal{width:120px;height:120px;margin-bottom:8px;animation:pop .5s cubic-bezier(.2,1.4,.4,1)}
@keyframes pop{0%{transform:scale(.3) rotate(-12deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.done-screen h2{font-size:34px;margin:6px 0}
.done-screen .tag{color:var(--ink-soft);font-size:15.5px;margin-bottom:22px}
.done-stats{display:flex;gap:12px;margin-bottom:26px}
.done-stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 20px;box-shadow:var(--shadow-sm);min-width:96px}
.done-stat .v{font-family:var(--disp);font-size:26px;font-weight:700}
.done-stat .l{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);margin-top:2px}
.done-stat.xp .v{color:var(--gold-deep)} .done-stat.acc .v{color:var(--green)} .done-stat.streak .v{color:var(--coral)}

/* ============ PANELS (skills / vocab / profile) ============ */
.panel{display:none} .panel.on{display:block; animation:fade .35s}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.panel-head{padding:26px 2px 8px}
.panel-head h2{font-size:30px;font-weight:600}
.panel-head p{color:var(--ink-soft);margin:6px 0 0;font-size:15px}

.skill-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:13px;margin-top:18px}
.skill-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow-sm)}
.skill-card .top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.skill-card .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex:none}
.skill-card .ic svg{width:20px;height:20px;color:#fff}
.skill-card h4{font-size:15px;font-family:var(--sans);font-weight:800}
.skill-card .lv{font-size:11.5px;color:var(--ink-faint);font-weight:700}
.meter{height:10px;border-radius:999px;background:var(--paper-2);overflow:hidden}
.meter .m{height:100%;border-radius:999px;transition:width .8s cubic-bezier(.2,.9,.2,1)}
.skill-card .pct{font-size:12px;font-weight:800;margin-top:7px;color:var(--ink-soft)}

.bank-tabs{display:flex;gap:8px;margin:18px 0 4px;flex-wrap:wrap}
.bank-tab{padding:8px 15px;border-radius:999px;background:var(--card);border:1px solid var(--line);font-weight:700;font-size:13.5px;

.profile-card{background:linear-gradient(135deg,#2b2f3d,#20242E);color:#fff;border-radius:var(--r-lg);padding:26px;margin-top:18px;
  box-shadow:var(--shadow-md);position:relative;overflow:hidden}

  background:radial-gradient(circle,rgba(240,166,47,.35),transparent 68%)}

.profile-card .xpsub{font-size:12.5px;opacity:.8}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-top:16px}
.pstat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px;text-align:center;box-shadow:var(--shadow-sm)}
.pstat .v{font-family:var(--disp);font-size:24px;font-weight:700}

.reset-btn{margin-top:20px;width:100%;padding:13px;border-radius:var(--r);background:var(--card);border:1px solid var(--line);
  color:var(--coral);font-weight:700;font-size:14px;box-shadow:var(--shadow-sm)}

/* toast + confetti */
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);z-index:200;opacity:0;
  background:var(--ink);color:#fff;padding:12px 20px;border-radius:999px;font-weight:700;font-size:14px;box-shadow:var(--shadow-md);
  transition:.3s;pointer-events:none;display:flex;align-items:center;gap:8px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.confetti{position:fixed;inset:0;z-index:150;pointer-events:none;overflow:hidden}
.cpiece{position:absolute;width:10px;height:14px;top:-20px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(105vh) rotate(720deg)}}

.empty{text-align:center;padding:50px 20px;color:var(--ink-faint)}
.empty svg{width:56px;height:56px;margin-bottom:12px;opacity:.5}
.empty h3{font-size:20px;color:var(--ink-soft);margin-bottom:6px}

@media(prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.05ms!important}}

/* ===== LANTERN AI TUTOR ===== */
.ai-wrap{display:flex;flex-direction:column;min-height:calc(100vh - 190px)}
.ai-head{display:flex;justify-content:space-between;align-items:center;padding:2px 2px 12px;border-bottom:1px solid var(--line-2);margin-bottom:12px}
.ai-title{font:800 20px/1.1 var(--disp);color:var(--ink)}

.ai-head-r{display:flex;align-items:center;gap:9px}
.ai-level{font:700 11px/1 var(--sans);letter-spacing:.08em;text-transform:uppercase;color:var(--brand);background:var(--brand-soft);border-radius:999px;padding:6px 11px}
.ai-new{border:1px solid var(--line);background:var(--card);color:var(--ink-soft);border-radius:999px;padding:6px 12px;font:700 12px/1 var(--sans);cursor:pointer}
.ai-new:hover{border-color:var(--brand);color:var(--brand)}
.ai-log{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding:4px 2px 8px}
.ai-msg{max-width:88%;font-size:14px;line-height:1.55;animation:aiIn .25s ease}
@keyframes aiIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.ai-msg.me{align-self:flex-end;background:var(--brand);color:#fff;padding:11px 15px;border-radius:16px;border-bottom-right-radius:5px}
.ai-msg.bot{align-self:flex-start;color:var(--ink);width:100%;max-width:100%}
.ai-msg.bot>div:not(.aicard):not([id^=aic]){background:var(--brand-soft);padding:12px 15px;border-radius:16px;border-bottom-left-radius:5px;display:inline-block}
.ai-msg.bot [id^=aic]{background:var(--brand-soft);padding:12px 15px;border-radius:16px;border-bottom-left-radius:5px;display:inline-block}
.ai-msg .bn{font-family:var(--bn)}
.ai-loading{display:flex;align-items:center;gap:10px;color:var(--ink-soft);font-size:12.5px}
.ai-dots{display:inline-flex;gap:4px}
.ai-dots i{width:7px;height:7px;border-radius:50%;background:var(--brand);opacity:.5;animation:aidot 1s infinite}
.ai-dots i:nth-child(2){animation-delay:.15s}.ai-dots i:nth-child(3){animation-delay:.3s}
@keyframes aidot{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}
.ai-tip{font-style:italic}
/* cards */
.aicard{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--c);border-radius:16px;padding:15px 16px;box-shadow:var(--shadow-sm);width:100%;box-sizing:border-box}

.aic-body{margin:0 0 8px;font-size:13.5px;color:var(--ink-soft);line-height:1.55}
.aic-list{margin:6px 0;padding-left:18px}
.aic-list li{font-size:13.5px;margin:5px 0;line-height:1.5;color:var(--ink)}
.aic-mistakes{display:flex;flex-direction:column;gap:6px;margin:8px 0;background:var(--paper-2);border-radius:12px;padding:10px 12px}
.aic-mistakes .x{color:var(--coral);display:block;font-size:13px}
.aic-mistakes .ok{color:var(--green);display:block;font-size:13px;font-weight:600}

.aic-opt.wrong{border-color:var(--coral);background:var(--coral-soft)}
.aic-fb{margin-top:8px;font-size:13px;color:var(--ink-soft);line-height:1.5}
.aic-fb .ok,.aic-fb b.ok{color:var(--green)}.aic-fb .x,.aic-fb b.x{color:var(--coral)}
.aic-word{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:6px}

.aic-say{border:none;background:var(--brand-soft);color:var(--brand);width:30px;height:30px;border-radius:9px;cursor:pointer;font-size:14px;margin-left:auto}
.aic-mean{font-size:13.5px;color:var(--ink-soft);margin:4px 0 6px;line-height:1.5}

.aic-lbl{font:700 10.5px/1 var(--sans);letter-spacing:.09em;text-transform:uppercase;color:var(--ink-faint);margin:10px 0 5px}
.aic-chips{display:flex;flex-wrap:wrap;gap:6px}

.aic-chips.syn span{background:var(--green-soft);color:#1c6b47}
.aic-chips.ant span{background:var(--coral-soft);color:#a13320}
.aic-chips.coll span{background:var(--brand-soft);color:var(--brand-deep)}
.ai-btn{border:none;border-radius:11px;background:var(--brand);color:#fff;font:700 13px/1 var(--sans);padding:10px 14px;cursor:pointer;margin:6px 6px 0 0;transition:filter .15s}
.ai-btn:hover{filter:brightness(1.07)}.ai-btn.rec{background:var(--coral);animation:aidot 1s infinite}
.aic-pron-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.aic-scorebar{height:13px;border-radius:8px;background:var(--paper-2);overflow:hidden;margin:10px 0 5px}
.aic-scorebar>i{display:block;height:100%;border-radius:8px;transition:width .5s}
.aic-scoren{font:800 15px/1 var(--disp)}
.aic-note{font-size:12.5px;color:var(--ink-soft);margin-top:8px;line-height:1.5}
.aic-rw{display:flex;flex-direction:column;gap:8px}
.aic-rw-row{display:flex;gap:9px;align-items:flex-start}
.aic-rw-lbl{font:800 9.5px/1.4 var(--sans);letter-spacing:.06em;text-transform:uppercase;flex:none;width:66px;padding-top:2px}
.aic-rw-lbl.x{color:var(--coral)}.aic-rw-lbl.ok{color:var(--green)}

.aic-rw-txt.good{color:var(--ink);font-weight:600;background:var(--green-soft);border-radius:9px;padding:7px 10px}
.aic-timeline{margin:8px 0}
.aic-step{display:flex;gap:11px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--line-2)}
.aic-step:last-child{border-bottom:none}
.aic-step-n{flex:none;width:24px;height:24px;border-radius:50%;background:var(--sky);color:#fff;font:800 12px/24px var(--sans);text-align:center}
.aic-step b{font-size:13.5px;color:var(--ink);display:block}
.aic-step span{font-size:12.5px;color:var(--ink-soft);display:block;margin-top:1px;line-height:1.45}
.aic-tr{text-align:center;margin:4px 0}
.aic-tr-src{font-size:17px;color:var(--ink);font-weight:600}

.ai-chips-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}

.ai-act-ic{font-size:20px;display:inline-flex}.ai-act-ic svg{width:20px;height:20px;color:var(--brand)}
.ai-foot{position:sticky;bottom:0;background:linear-gradient(180deg,transparent,var(--paper) 22%);padding-top:10px;margin-top:8px}
.ai-follows{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:9px}

 "I want to buy a new pair of shoes today.", "My shopping budget is 2000 taka.", "I want to buy a new shirt from ABC.", "Do you know where Shirt-Mania is?", "Where is the washroom?", "Which way is the washroom?", "How long does the shopping mall stay open?", "When does this store close?", "Are your prices fixed?", "What’s the price?", "The price is 500.", "I want to give you 350, is that possible?", "That’s too high. I want to pay 350 taka.", "Is there a food court here?", "I am hungry, so let's eat after shopping.", "Look at that jacket! It looks so good.", "I wish I had enough to buy that Jacket.", "I wish I could afford that jacket."], "School": ["Do you want to be my friend?", "What class do we have next?", "How long is this class?", "When does this class end?", "Do you have an extra pencil?", "Can you lend me a pencil?", "Can I borrow this pencil for today?", "Can you share your tiffin with me?", "Did you study for the exam tomorrow?", "We have an exam tomorrow.", "My favorite subject is English.", "I want to play with you in the field.", "Let’s play football during tiffin break.", "Please help me during the exam. I did not study.", "Can you help me with this homework?", "When is our Final Exam?"], "University": ["What is your major?", "My major is Marketing.", "Which department are you in?", "I am in the BBA department.", "What is your CGPA?", "How many credits do you have left?", "When will you graduate?", "What do you want to do after university?", "Do you want to go abroad after University?", "Will you stay there or come back?", "I will stay there.", "I want to get a corporate job after university.", "I want to start a company/business after university."]}, "reading": [{"title": "The Big Tree", "level": "Medium", "text": "Once upon a time, there was a big tree. It was the biggest tree in the forest. All the other animals were afraid of the big tree. They thought that it was dangerous. One day, a little bird flew into the forest. He was lost and he didn't know where he was going. He saw the big tree and he was scared. But he was also very tired, so he decided to rest on the big tree's branches. The big tree was surprised to see the little bird. He had never seen a bird so small before. He asked the little bird why he was so scared. The little bird said, \"All the other animals told me that you were dangerous.\" The big tree laughed. \"I'm not dangerous,\" he said. \"I'm just a big tree.\" The little bird didn't believe him at first. But then the big tree told him all about himself. He told the little bird about his roots, his trunk, his branches, and his leaves. He told the little bird about the animals that lived in his branches and the animals that ate his leaves. The little bird listened to the big tree's story and he realized that the big tree wasn't dangerous at all. He was just a big tree who wanted to be friends. The little bird and the big tree became best friends. They played together every day. The little bird would sing to the big tree and the big tree would tell the little bird stories. One day, a group of hunters came to the forest. They were looking for animals to kill. The little bird saw the hunters and he was scared. He flew to the big tree and told him what was happening. The big tree was also scared. He didn't know what to do. But then he had an idea. He told the little bird to fly to the other animals in the forest and tell them to hide. The little bird did as the big tree said. He flew to the other animals in the forest and told them to hide. The animals were all very scared, but they listened to the little bird. They all hid in the trees and in the bushes. The hunters came to the big tree and they couldn't see any animals. They were very disappointed. They decided to go back to the village. The little bird and the big tree were very happy. They had saved the animals in the forest. The little bird and the big tree continued to be best friends. They lived happily ever after. Three Friends! Once upon a time, in a green forest, there were three animal friends. A rabbit named Robbie, a squirrel named Sammy, and a bird named Benny. They lived in a cozy treehouse, high up in a tall oak tree. Robbie, Sammy, and Benny were the best of friends. They liked to do everything together. They played games, shared stories, and helped each other when needed. They knew that true friends were important. One sunny morning, as they played near the river, they heard a faint cry for help. They followed the sound and discovered a tiny, frightened mouse named Molly. She was trapped on a small, slippery rock in the middle of the river. Robbie, Sammy, and Benny knew they had to help. Robbie used his strong legs to hop across the river and reached the rock. Sammy climbed up a tree to gather some leaves for Molly to stand on, so she wouldn't slip. Benny, being a bird, flew over to provide some shade with his wings. Together, they made a bridge with the leaves so Molly could safely walk back to the riverbank. Molly was so grateful for their help, and they soon became good friends. Molly, Robbie, Sammy, and Benny spent their days exploring the forest, having picnics, and sharing their stories. One day, while they were exploring, they found a mysterious cave. Curiosity got the better of them, and they decided to explore it. They ventured deep into the cave, discovering sparkling gems and hidden treasures. But as they went further, they got lost! Robbie, Sammy, Benny, and Molly were scared, but they remembered the importance of sticking together. They held hands and walked in the dark cave, singing songs to keep their spirits up. Their friendship and bravery helped them find their way out of the cave. Finally, they emerged from the cave and saw the sunlight once again. They were relieved and happy to be outside. Their friendship had led them through a difficult time. From then on, they continued to explore the forest, but they always remembered that their friendship was their greatest treasure. They knew that as long as they had each other, they could face any adventure that came their way. And so, Robbie, Sammy, Benny, and Molly's friendship grew stronger every day as they continued to share their adventures in the big, green forest, where they learned that true friends stick together through thick and thin."}, {"title": "The Golden Wave", "level": "Advanced", "text": "Once upon a time, there was a young boy named Tommy. Tommy lived in a small coastal village. He always dreamed of becoming a sailor. He would spend his days by the sea, watching the ships as they sailed away. His heart longed to go on an adventure of his own. One bright and sunny morning, as Tommy was sitting beside the port area of his village, a stranger approached him. The stranger had a weathered face and a twinkle in his eye. He introduced himself as Captain Jack, the master of a fine ship called the \"Golden Wave.\" Captain Jack was in need of a new crew member, and he thought Tommy could be an excellent sailor. Tommy was overjoyed at the opportunity and eagerly accepted the offer. He joined the crew of the \"Golden Wave\" and bid farewell to his boring village. When the ship set sail, Tommy was filled with excitement and a little bit of fear. The days at sea were hard but there was a lot to learn for Tommy. He worked alongside the experienced sailors. His work included: climbing the rigging, hoisting sails, and learning how to steer the ship. Captain Jack was a patient teacher, always guiding and encouraging Tommy as he learned everything. One day, a fierce storm rolled in, with waves crashing against the ship and wind howling like a hungry wolf. The crew scrambled to secure everything. But it was a tough battle against the angry sea. Tommy was holding the ropes of the ship for dear life, completely drenched, and fearing for the ship. In the midst of the chaos, Captain Jack stood strong and steady, barking orders to his crew. He was fearless, and his confidence spread like a shield over the entire crew. The storm raged on for hours, but the \"Golden Wave\" withstood it. Through their hard work and the captain's leadership, they emerged from the storm. As the sun finally broke through the clouds and the sea calmed, Tommy realized that he owed his life to Captain Jack's bravery and wisdom. The crew came together to celebrate their survival, and Captain Jack and Tommy became closer than ever before. Time passed, and Tommy continued to learn the ways of the sea from Captain Jack. They faced more adventures and challenges together, growing as sailors and friends. But, after the good times, there was a moment of sadness. One peaceful evening, as they were sailing under a clear, starry sky, Captain Jack suddenly fell ill. Tommy gave a lot of effort to care for him. But the captain's condition grew worse. With a heavy heart, Captain Jack called Tommy to his side. In a weak but serious voice, he said, \"Tommy, my dear friend, the time has come for me to pass on. You have shown the heart of a true sailor, and I trust you to lead this crew. You are now the captain of the 'Golden Wave.'\" Tears welled up in Tommy's eyes, but he knew he had to be strong for Captain Jack. He accepted the captain's hat and the responsibility that came with it. The crew gathered around, and with heavy hearts, they said their farewells to Captain Jack. From that day forward, Tommy led the crew with courage, just as Captain Jack had taught him. The crew respected him, and they saw in him the same bravery and wisdom they had seen in their former captain. Tommy had become a true leader. Under Tommy's command, the \"Golden Wave\" continued to sail the seas, facing new adventures and challenges. And so, the young boy who had once dreamed of becoming a sailor had not only realized his dream but also became one of the most respected and well-known Captains of his time."}], "writing_pairs": [{"bn": "একটা ছেলে বাসায় যাওয়ার পথে দেখে যে একটা বাচ্চা বিড়াল রাস্তায় পড়ে আছে। ওর মা নেই আশে  cat etc. After seeing the cat, the girl picked up the cat on her lap very carefully. The cat instantly liked the girl very much."}, {"bn": "এই দেখে ছেলেটা বুঝতে পাড়ে যে, মেয়েটা আসলেই যত্ন নিতে পারবে বিড়ালটার। বিড়ালটার ভাগ্য ভালো যে ও একটা ভালো বাসায়, আদর যত্ন পেয়ে, থাকতে পারবে। এই ভেবে অনেক খুশি হয়ে বিড়ালটাকে সে দিয়ে আসে। বাসায় আসার পথে, ছেলেটার বিড়ালটার কথা ভেবে একটু খারাপ লাগে। কারণ গত ২ দিনে বিড়ালটা তার মনে জায়গা করে নিয়েছিল।", "en": "Seeing this the boy understands that, the girl really can take care of the cat. The cat is lucky that it can stay in a nice house while getting a lot of love and care. Thinking this, he gives the cat away very happily. On his way home, the boy feels a little bad thinking about the cat. Because during the last two days, the cat got close to his heart."}, {"bn": "Write it yourself: একটা জোনাকি পোকা কে নিয়ে একটা গল্প লেখো।", "en": "Once upon a time, there was a firefly. His name was Pico. Pico was very lonely. He did not have any friends. He lived in a forest. The forest had many animals and birds. Pico started wondering how he can make more friends. He realized that an easy way to make friends is to help other animals. So, Pico decided that every night he will go outside to help animals. Pico waited for nighttime. And then he left his house. In the dark, he saw that there was a rabbit who was lost. Pico flew to the rabbit and asked the rabbit, \" Are you lost?\" The rabbit said, \"Yes, I am lost. Please help me go home. I am so scared.\" Pico said, \"Don't worry. I am a firefly. I can glow at night. I will help you go home.\" Then Pico told the Rabbit to follow his light. And slowly Pico flew to the Rabbit's home. The rabbit's family was very thankful to Pico. And the rabbit became Pico's friend. Just like that, Pico made a new friend. Just like this, Pico started helping a lot of animals every night with his light. And very soon, everyone in the forest loved Pico and became his friend. Pico was very happy because now he had a lot of friends. The moral of the story is - you can make friends if you help people."}]}</script>

let VOICE=null;
function pickVoice(){
  const vs=speechSynthesis.getVoices();
  VOICE = vs.find(v=>/en-GB/i.test(v.lang)&&/female|Google|Kate|Serena|Libby/i.test(v.name))
       || vs.find(v=>/en-US/i.test(v.lang)&&/Google|Samantha|Female/i.test(v.name))
       || vs.find(v=>/^en/i.test(v.lang)) || vs[0] || null;
}
if('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function say(text, rate){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=rate||0.92; u.pitch=1.02; if(VOICE) u.voice=VOICE; u.lang=(VOICE&&VOICE.lang)||'en-GB';
  speechSynthesis.speak(u);
}

/* ============================================================
   CURRICULUM BUILDER
   ============================================================ */
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0; [a[i],a[j]]=[a[j],a[i]];} return a; }
function sample(arr,n,exclude){ const p=shuffle(arr.filter(x=>!exclude||!exclude(x))); return p.slice(0,n); }
function chunk(arr,size){ const o=[]; for(let i=0;i<arr.length;i+=size) o.push(arr.slice(i,i+size)); return o; }

// global distractor pools
const ALL_VOCAB = [...RAW.vocab.abstract, ...RAW.vocab.advanced, ...RAW.vocab.phrasal];
const BN_POOL = ALL_VOCAB.map(v=>v.bn);
const EN_POOL = ALL_VOCAB.map(v=>v.en);
function distractBn(correct,n){ return sample(BN_POOL, n, x=>x===correct); }
function distractEn(correct,n){ return sample(EN_POOL, n, x=>x===correct); }

/* ---- exercise generators ---- */
function exTeach(v, skill){ return {type:"teach", en:v.en, bn:v.bn, ex:v.ex, skill}; }
function exMeaning(v, skill){ // pick the Bengali meaning
  const opts=shuffle([v.bn, ...distractBn(v.bn,3)]);
  return {type:"mc", skill, kicker:"Meaning", prompt:v.en, speak:v.en,
    sub:"Choose the correct meaning", bn:true, choices:opts, answer:v.bn, item:v};
}
function exWord(v, skill){ // pick English word for meaning
  const opts=shuffle([v.en, ...distractEn(v.en,3)]);
  return {type:"mc", skill, kicker:"Which word?", promptBn:v.bn, prompt:"“"+v.bn+"”",
    sub:"Which English word means this?", choices:opts, answer:v.en, item:v};
}
function exListen(v, skill){
  const opts=shuffle([v.en, ...distractEn(v.en,3)]);
  return {type:"listen", skill:"listening", play:v.ex||v.en, kicker:"Listen",
    sub:"Tap the word you heard", choices:opts, answer:v.en, item:v, hintWord:v.en};
}
function exFill(v, skill){
  const ex=v.ex;
  const w = v.en.split(' ')[0];
  let sentence=ex, ok=false;
  const re=new RegExp('\\b'+v.en.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i');
  if(re.test(ex)){ sentence=ex.replace(re,"____"); ok=true; }
  if(!ok){ return exMeaning(v,skill); }
  const opts=shuffle([v.en, ...distractEn(v.en,3)]);
  return {type:"fill", skill, kicker:"Fill the gap", sentence, sub:v.bn, choices:opts, answer:v.en, item:v};
}
function exMatch(items){
  const pairs=items.slice(0,4).map(v=>({a:v.en, b:v.bn}));
  return {type:"match", skill:"vocab", kicker:"Match the pairs", pairs};
}
function exSpeak(v){ return {type:"speak", skill:"speaking", sentence:v.ex||v.en, bn:v.bn, hint:v.en}; }

// build a vocabulary lesson from ~8 items
function vocabLesson(items, skill){
  skill=skill||"vocab";
  const ex=[];
  const fresh = items.filter(v=>!S.seen[v.en]);
  const teachSet = (fresh.length?fresh:items).slice(0,4);
  teachSet.forEach(v=>ex.push(exTeach(v,skill)));
  // quiz
  const q=[];
  items.forEach((v,i)=>{
    if(i%3===0) q.push(exMeaning(v,skill));
    else if(i%3===1) q.push(exFill(v,skill));
    else q.push(exWord(v,skill));
  });
  q.push(exListen(items[items.length-1], skill));
  if(items.length>=4) q.push(exMatch(items));
  q.push(exSpeak(items[0]));
  return ex.concat(shuffle(q)).map(markNew(items));
}
function markNew(items){ return e=>e; }

// foundation lesson
function foundationLesson(rows){
  const ex=[];
  rows.forEach(r=>{
    ex.push({type:"teach", en:r.en, bn:r.bn, ex:"Pattern:  "+r.tag, note:r.meaning, skill:"grammar"});
  });
  rows.forEach(r=>{
    ex.push({type:"mc", skill:"grammar", kicker:r.tag, prompt:r.en, speak:r.en,
      sub:"What does it mean?", bn:true, choices:shuffle(r.opts), answer:r.bn});
  });
  rows.slice(0,3).forEach(r=>{
    ex.push({type:"build", skill:"grammar", kicker:"Build the sentence", promptBn:r.bn,
      prompt:"Say: “"+r.bn+"”", answer:r.en});
  });
  ex.push(exSpeakSentence(rows[0].en, rows[0].bn));
  return ex;
}
function exSpeakSentence(en,bn){ return {type:"speak", skill:"speaking", sentence:en, bn, hint:en}; }

// tense lesson (grammar) for a group
function tenseLesson(group){
  const rows=TENSES.filter(t=>t.grp===group);
  const ex=[];
  rows.forEach(t=>{
    ex.push({type:"teach", en:t.name, bn:t.bn, ex:t.ex, note:"Structure:  "+t.struct, skill:"grammar"});
  });
  rows.forEach(t=>{
    const opts=shuffle([t.ex, ...sample(TENSES.filter(x=>x.name!==t.name).map(x=>x.ex),3)]);
    ex.push({type:"mc", skill:"grammar", kicker:t.name, prompt:t.name, sub:t.bn+" — pick the correct example",
      choices:opts, answer:t.ex});
  });
  rows.forEach(t=>{
    ex.push({type:"build", skill:"grammar", kicker:t.name, prompt:"Say: “"+t.exbn+"”", promptBn:t.exbn, answer:t.ex});
  });
  ex.push(exSpeakSentence(rows[0].ex, rows[0].exbn));
  return ex;
}

// parts-of-speech lesson
function posLesson(p){
  const ex=[];
  ex.push({type:"teach", en:p.name, bn:p.bn, ex:p.def, note:p.defbn, skill:"grammar"});
  p.items.slice(0,3).forEach(v=>ex.push(exTeach(v,"vocab")));
  p.items.forEach((v,i)=>{
    if(i%2===0) ex.push(exMeaning(v,"vocab")); else ex.push(exFill(v,"vocab"));
  });
  ex.push(exMatch(p.items));
  ex.push(exListen(p.items[1],"listening"));
  ex.push(exSpeak(p.items[0]));
  return shuffleKeepTeachFirst(ex);
}
function shuffleKeepTeachFirst(ex){
  const teach=ex.filter(e=>e.type==="teach"); const rest=shuffle(ex.filter(e=>e.type!=="teach"));
  return teach.concat(rest);
}

// spoken situation lesson
function spokenLesson(name, phrases){
  const items=phrases.slice(0,7).map(p=>({en:p, bn:"", ex:p}));
  const ex=[];
  items.slice(0,3).forEach(p=>ex.push({type:"teach", en:p.en, bn:"", ex:"Say this in a "+name.toLowerCase()+".", skill:"speaking", noBn:true}));
  items.forEach((p,i)=>{
    if(i%2===0) ex.push({type:"listen", skill:"listening", play:p.en, kicker:"Listen", sub:"Tap what you heard",
      choices:shuffle([p.en, ...sample(phrases.filter(x=>x!==p.en),3)]), answer:p.en});
    else ex.push({type:"build", skill:"speaking", prompt:"Arrange the words", kicker:name, answer:p.en, freeSentence:true});
  });
  items.slice(0,4).forEach(p=>ex.push({type:"speak", skill:"speaking", sentence:p.en, bn:"", hint:p.en, noBn:true}));
  return ex;
}

  qs.forEach(q=>ex.push({type:"mc", skill:"reading", kicker:"Comprehension", prompt:q.q,
    sub:"Based on “"+passage.title+"”", choices:shuffle(q.opts), answer:q.opts[q.a]}));
  return ex;
}

// writing (translation) lesson
function writingLesson(pairs){
  const ex=[];
  pairs.forEach(p=>{
    ex.push({type:"translate", skill:"writing", bn:p.bn, model:p.en});
  });
  return ex;
}

// review lesson from queue
function reviewLesson(){
  const items=shuffle(S.review).slice(0,8).map(r=>({en:r.en,bn:r.bn,ex:r.ex}));
  return vocabLesson(items,"vocab");
}

const ORDER=[]; const UMAP={};
STAGES.forEach(st=>st.units.forEach(u=>{ ORDER.push(u.id); UMAP[u.id]=u; }));
S.totalLessons=ORDER.length;
function unlockedIndex(){ // first not-done index that is unlocked
  for(let i=0;i<ORDER.length;i++){ if(!unit(ORDER[i]).done) return i; }
  return ORDER.length;
}
function isUnlocked(i){ return true; }

/* ============================================================
   RENDER: HOME PATH
   ============================================================ */
function renderLearn(){
  const el=document.getElementById('panel-learn');
  const curIdx=unlockedIndex();
  const curId = ORDER[Math.min(curIdx,ORDER.length-1)];
  const curU = UMAP[curId];
  const doneCount = ORDER.filter(id=>unit(id).done).length;
  let html=`<div class="hero">
     <div class="eyebrow">Your English journey</div>
     <h1>Learn English, <em>one lantern at a time.</em></h1>
     <p>A step-by-step path from your first sentence to advanced vocabulary. Built from your complete course, with বাংলা help along the way.</p>
   </div>`;

  // continue card
  if(curU){
    const stgName = STAGES.find(s=>s.units.some(u=>u.id===curId)).title;
    html+=`<div class="continue-card" onclick="startLesson('${curId}')">
       <div class="lbl">${doneCount>0?'Continue learning':'Start here'}</div>
       <h3>${curU.title}</h3>
       <div class="sub">${stgName} · ${curU.subtitle}</div>
       <div class="go">${curU.make?'Start lesson':'Start'} ${ic('bolt')}</div>
     </div>`;
  } else {
    html+=`<div class="continue-card"><div class="lbl">Complete</div><h3>You finished every lesson</h3>
      <div class="sub">Keep your streak alive with a review session.</div></div>`;
  }

  // review CTA
  if(S.review.length>=4){
    html+=`<div class="review-cta" onclick="startReview()">
      <div class="ib">${ic('refresh')}</div>
      <div><h4>Time to review</h4><p>Words you found tricky are ready to practise again</p></div>
      <div class="cnt">${S.review.length}</div></div>`;
  }

  // stages + trails
  STAGES.forEach(st=>{
    const done=st.units.filter(u=>unit(u.id).done).length;
    html+=`<div class="stage-head">
       <div class="num">${ic(st.icon)}</div>
       <div class="meta"><div class="k">${st.kicker}</div><h2>${st.title}</h2></div>
       <div class="prog">${done}/${st.units.length}</div>
     </div><div class="trail">`;
    st.units.forEach(u=>{
      const i=ORDER.indexOf(u.id); const st2=unit(u.id);
      let cls="node", inner;
      if(st2.done){ cls+=" done"; inner=ic('check'); }
      else if(isUnlocked(i)){ cls+=" current"; inner=ic(u.icon); }
      else { cls+=" locked"; inner=ic('lock'); }
      const crowns = st2.crowns? `<div class="crowns">${Array(st2.crowns).fill(0).map(()=>'<span class="crown">'+ic('crown')+'</span>').join('')}</div>`:'';
      const onclick = (st2.done||isUnlocked(i))? `onclick="startLesson('${u.id}')"`:'';
      html+=`<div class="node-row"><div class="${cls}" ${onclick}>
        <div class="disc"><span class="ic">${inner}</span>${crowns}</div>
        <div class="cap">${u.title}</div></div></div>`;
    });
    html+=`</div>`;
  });
  el.innerHTML=html;
}

let bankTab="abstract", bankLimit=30, bankQuery="";
function renderBank(){
  const el=document.getElementById('panel-bank');
  const sets={abstract:{label:"Abstract Nouns",data:RAW.vocab.abstract},
              phrasal:{label:"Phrasal Verbs",data:RAW.vocab.phrasal},
              advanced:{label:"Advanced Words",data:RAW.vocab.advanced}};
  let data=sets[bankTab].data;
  if(bankQuery){ const q=bankQuery.toLowerCase(); data=data.filter(v=>v.en.toLowerCase().includes(q)||v.bn.includes(bankQuery)||v.ex.toLowerCase().includes(q)); }
  const shown=data.slice(0,bankLimit);
  let html=`<div class="panel-head"><h2>Vocabulary bank <span class="bank-audio">${ic('speaker')}</span></h2>
    <p>${RAW.vocab.abstract.length+RAW.vocab.phrasal.length+RAW.vocab.advanced.length} words with meaning, example, and audio — tap the speaker on any word to hear it.</p></div>
    <div class="bank-tabs">`;
  Object.entries(sets).forEach(([k,v])=>{ html+=`<button class="bank-tab ${k===bankTab?'on':''}" onclick="setBankTab('${k}')">${v.label} · ${v.data.length}</button>`; });
  html+=`</div><input class="wsearch" placeholder="Search a word or meaning…" value="${bankQuery.replace(/"/g,'&quot;')}" oninput="bankSearch(this.value)"><div class="wlist">`;
  if(!shown.length) html+=`<div class="empty"><h3>No matches</h3><p>Try another word.</p></div>`;
  shown.forEach(v=>{
    html+=`<div class="wrow"><div style="flex:1;min-width:0"><div class="w-en">${v.en}</div><div class="w-ex">${v.ex}</div></div><div class="w-bn">${v.bn}</div><button class="say2" onclick="say(${JSON.stringify(v.ex||v.en).replace(/"/g,'&quot;')})" aria-label="Play">${ic('speaker')}</button></div>`;
  });
  html+=`</div>`;
  if(shown.length<data.length) html+=`<div class="wmore" onclick="bankMore()">Show more (${data.length-shown.length} left)</div>`;
  el.innerHTML=html;
}
function setBankTab(k){ bankTab=k; bankLimit=30; render('bank'); }
function bankSearch(v){ bankQuery=v; bankLimit=30; renderBank(); }
function bankMore(){ bankLimit+=40; renderBank(); }

let AI={ msgs:[], ctx:{lastWord:null,lastTopic:null,hard:0}, seq:0, started:false };
function aiEsc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function aiShuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function aiHasBn(s){return /[ঀ-৿]/.test(s);}
function aiLevel(){ const d=(typeof ORDER!=='undefined')?ORDER.filter(id=>unit(id).done).length:0; return d>=30?'Fluent':d>=18?'Advanced':d>=8?'Intermediate':'Beginner'; }

/* ---- word data ---- */
let AI_WORDS=null;
function aiWordIndex(){ if(AI_WORDS) return AI_WORDS; AI_WORDS={};
  const add=v=>{ if(v&&v.en){const k=String(v.en).toLowerCase(); if(!AI_WORDS[k]) AI_WORDS[k]={en:v.en,bn:v.bn||'',ex:v.ex||''};} };
  try{RAW.vocab.abstract.forEach(add);RAW.vocab.advanced.forEach(add);RAW.vocab.phrasal.forEach(add);}catch(e){}
  try{POS.forEach(p=>p.items.forEach(add));}catch(e){}
  return AI_WORDS; }
function aiRich(word){ return RICHV.find(v=>v.en.toLowerCase()===word.toLowerCase()); }
function aiVocab(word){
  const r=aiRich(word); if(r) return r;
  const w=aiWordIndex()[word.toLowerCase()];
  if(w) return {en:w.en,ipa:IPA_EXTRA[word.toLowerCase()]||'',pos:'',bn:w.bn,def:'',syn:[],ant:[],coll:[],ex:w.ex};
  return null;
}
function aiIpa(word){ const r=aiRich(word); if(r) return r.ipa; return IPA_EXTRA[word.toLowerCase()]||''; }

/* ---- grammar matching ---- */
function aiGrammarFor(q){
  const s=' '+q.toLowerCase().replace(/[^a-z0-9]+/g,' ').replace(/\s+/g,' ').trim()+' ';
  for(const t of TENSES){ if(q.toLowerCase().indexOf(t.name.toLowerCase())>=0){
    const others=aiShuffle(TENSES.filter(x=>x.name!==t.name).map(x=>x.ex)).slice(0,3);
    const opts=aiShuffle([t.ex,...others]);
    return {title:t.name,bn:t.bn,body:"<b>Structure:</b> "+t.struct,
      points:["Example: <b>"+t.ex+"</b> <span class='bn'>("+t.exbn+")</span>","Use it for: "+t.bn],
      mistakes:[],practice:{q:"Which sentence is in the "+t.name+"?",options:opts,a:opts.indexOf(t.ex),ex:"‘"+t.ex+"’ is the "+t.name+"."}};
  }}
  for(const g of GRAMTOPICS){ if(g.key.some(k=>s.indexOf(' '+k.replace(/[^a-z0-9]+/g,' ').trim()+' ')>=0 || q.toLowerCase().indexOf(k)>=0)) return g; }
  for(const p of POS){ const key=p.name.toLowerCase().replace(/s$/,''); if(s.indexOf(' '+key+' ')>=0){
    const right=p.items[0].en; const wrongPool=aiShuffle(POS.filter(x=>x!==p).flatMap(x=>x.items.map(i=>i.en))).slice(0,3);
    const opts=aiShuffle([right,...wrongPool]);
    return {title:p.name,bn:p.bn,body:p.def+" <span class='bn'>"+p.defbn+"</span>",
      points:p.items.slice(0,3).map(v=>"<b>"+v.en+"</b> <span class='bn'>("+v.bn+")</span> — "+v.ex),
      mistakes:[],practice:{q:"Which word is a "+key+"?",options:opts,a:opts.indexOf(right),ex:"‘"+right+"’ is a "+key+"."}};
  }}
  return null;
}

/* ---- rewrite / correction ---- */
function aiRewrite(text){
  let out=text.trim(); const changes=[];
  const T=[
    [/\bam having\b/gi,"have","‘have’ is stative — it doesn't take -ing."],
    [/\bis having\b/gi,"has","‘have’ is stative — it doesn't take -ing."],
    [/\bare having\b/gi,"have","‘have’ is stative — it doesn't take -ing."],
    [/\bdiscuss(ed|ing)?\s+about\b/gi,"discussed","‘discuss’ takes no ‘about’."],
    [/\bmarried with\b/gi,"married to","We say ‘married to’ someone."],
    [/\bgood in\b/gi,"good at","‘good at’ for a skill."],
    [/\bmore better\b/gi,"better","‘better’ is already comparative."],
    [/\brevert back\b/gi,"reply","‘revert back’ isn't standard."],
    [/\bgo school\b/gi,"go to school","We need ‘to’ before ‘school’."],
    [/\beveryday\b/g,"every day","‘every day’ (two words) is the time phrase."]
  ];
  T.forEach(r=>{ if(r[0].test(out)){ const before=out; out=out.replace(r[0],r[1]); if(before!==out) changes.push({to:r[1],why:r[2]}); } });
  // article a→an before vowel
  out=out.replace(/\ba (hour|honest|umbrella|apple|elephant|orange|idea|engineer|answer|hour)\b/gi,(m,w)=>{changes.push({to:"an "+w,why:"Use ‘an’ before a vowel sound."});return "an "+w;});
  // capital I
  if(/\bi\b/.test(out)){ out=out.replace(/\bi\b/g,"I"); changes.push({to:"I",why:"The pronoun ‘I’ is always capital."}); }
  // capitalise first letter
  if(/^[a-z]/.test(out)){ out=out.charAt(0).toUpperCase()+out.slice(1); changes.push({to:"Capital start",why:"Sentences begin with a capital letter."}); }
  // end punctuation
  if(!/[.!?]["']?$/.test(out)){ out=out+"."; changes.push({to:"‘.’ at the end",why:"End a statement with a full stop."}); }
  return {orig:text.trim(),improved:out,changes};
}

/* ---- quiz ---- */
function aiBuildQuiz(){
  const pool=[];
  GRAMTOPICS.forEach(g=>pool.push({q:g.practice.q,options:g.practice.options,a:g.practice.a,ex:g.practice.ex}));
  // vocab meaning
  aiShuffle(RICHV).slice(0,6).forEach(v=>{ const wrong=aiShuffle(RICHV.filter(x=>x!==v).map(x=>x.bn)).slice(0,3); const opts=aiShuffle([v.bn,...wrong]); pool.push({q:"What does <b>"+v.en+"</b> mean?",options:opts,a:opts.indexOf(v.bn),ex:"‘"+v.en+"’ = "+v.bn+"."}); });
  // tense id
  aiShuffle(TENSES).slice(0,4).forEach(t=>{ const wrong=aiShuffle(TENSES.filter(x=>x.name!==t.name).map(x=>x.ex)).slice(0,3); const opts=aiShuffle([t.ex,...wrong]); pool.push({q:"Pick the <b>"+t.name+"</b> sentence:",options:opts,a:opts.indexOf(t.ex),ex:"That's the "+t.name+"."}); });
  const pick=pool[(Math.random()*pool.length)|0];
  return {q:pick.q,options:pick.options,a:pick.a,ex:pick.ex,answered:null};
}
function aiQuizForWord(word){ const v=aiRich(word)||aiVocab(word); if(!v) return aiBuildQuiz();
  const wrong=aiShuffle(RICHV.filter(x=>x.en!==v.en).map(x=>x.bn)).slice(0,3); const opts=aiShuffle([v.bn,...wrong]);
  return {q:"What does <b>"+v.en+"</b> mean?",options:opts,a:opts.indexOf(v.bn),ex:"‘"+v.en+"’ = "+v.bn+(v.ex?". Example: "+v.ex:"")+".",answered:null}; }

/* ---- study plan ---- */
function aiPlan(){
  const lvl=aiLevel(); const streak=(typeof S!=='undefined')?(S.streak||0):0;
  let weak='vocabulary';
  try{ let wv=Infinity; Object.entries(SKILLS).forEach(([k,m])=>{const v=S.skills[k]||0; if(v<wv){wv=v;weak=m.name;}}); }catch(e){}
  const due=(typeof S!=='undefined'&&S.review)?S.review.length:0;

    {t:"Grammar focus (5 min)",d:lvl==='Beginner'?"Practise ‘First Sentences’ and the present tenses.":lvl==='Intermediate'?"Master past & future tenses and articles.":"Polish prepositions, tag questions and comparatives."},
    {t:"Build "+weak+" (5 min)",d:"Your lightest skill — one focused lesson here balances you out."},
    {t:"Speak out loud (3 min)",d:"Shadow 3 phrases in the Pronunciation studio and beat 80%."},
    {t:"Quick quiz (2 min)",d:"End with a 3-question quiz to lock it in."}
  ];
  return {level:lvl,streak,steps};
}

/* ---- translate ---- */
const AI_TR=[
 {bn:"আমি প্রতিদিন ইংরেজি শিখি",en:"I learn English every day.",note:"‘every day’ (two words) is the time phrase; present simple for habits."},
 {bn:"আমার একটা প্রশ্ন আছে",en:"I have a question.",note:"‘have’ shows possession — no -ing."},
 {bn:"আমি ভালো আছি",en:"I'm fine / I'm doing well.",note:"Natural reply to ‘How are you?’."},
 {bn:"আমি ইংরেজিতে ভালো হতে চাই",en:"I want to get better at English.",note:"‘get better at’ sounds more natural than ‘be good in’."},
 {bn:"দয়া করে আরেকবার বলুন",en:"Could you say that again, please?",note:"Polite request form."}
];
function aiTranslate(text){
  const bnMode=aiHasBn(text);
  const clean=text.replace(/^translate[:\-\s]*/i,'').trim();
  if(bnMode){
    const hit=AI_TR.find(x=>clean.indexOf(x.bn)>=0)|| AI_TR.find(x=>x.bn.indexOf(clean)>=0);
    if(hit) return {src:clean,out:hit.en,notes:[hit.note],dir:'bn'};
    // try word-by-word meaning hint
    return {src:clean,out:"", notes:["I focus on meaning, not word-for-word. Tell me the idea in a short sentence and I'll give the natural English — try one of the examples below."],dir:'bn'};
  }
  // english → bangla word
  const w=aiVocab(clean.split(/\s+/)[0]);
  if(w&&w.bn) return {src:clean,out:w.bn,notes:[w.ex?("Example: "+w.ex):"A single-word meaning; full sentences work best."],dir:'en'};
  return {src:clean,out:"",notes:["Type a short Bengali sentence and I'll give the natural English (not word-for-word)."],dir:'en'};
}

/* ============================================================
   CLASSIFY + RESPOND
   ============================================================ */
function aiClassify(q){
  const raw=q.trim(); const s=' '+raw.toLowerCase()+' ';
  if(aiHasBn(raw)||/\btranslate\b/i.test(raw)) return {kind:'translate',data:aiTranslate(raw)};
  if(/^(rewrite|improve|correct|fix|check)\b/i.test(raw)||/is this (correct|right|ok)/i.test(raw)){
    let sent=raw.replace(/^(rewrite|improve|correct|fix|check)[:\-\s]*/i,'').replace(/^is this (correct|right|ok)[:\-\s]*/i,'').replace(/\?$/,'').trim();
    if(!sent) return {kind:'text',data:{html:"Type a sentence after the word, e.g. <i>rewrite: I am having a car</i>."}};
    return {kind:'rewrite',data:aiRewrite(sent)};
  }
  if(/\bquiz\b|test me|ask me a question|another question|quiz me/i.test(s)){
    if(/on this|this word/i.test(s)&&AI.ctx.lastWord) return {kind:'quiz',data:aiQuizForWord(AI.ctx.lastWord)};
    return {kind:'quiz',data:aiBuildQuiz()};
  }
  let pm=raw.match(/(?:pronounce|pronunciation of|how (?:do|to)(?: i)? say|say the word|stress of)\s+["'“]?([a-zA-Z][a-zA-Z\-]{1,20})/i);
  if(pm||/pronunciation|pronounce it/i.test(s)){ const w=pm?pm[1]:(AI.ctx.lastWord||'comfortable'); return {kind:'pron',data:{word:w,ipa:aiIpa(w)}}; }
  if(/study plan|make.*plan|plan for me|what should i (learn|study|do)|where do i start/i.test(s)) return {kind:'plan',data:aiPlan()};
  if(/practice speaking|conversation|role ?play|let'?s (talk|practice)|speaking practice|dialogue/i.test(s)) return {kind:'dialchoose',data:{}};
  // vocab
  let wm=raw.match(/(?:meaning of|what does|whats|define|synonyms? (?:of|for)|meaning for)\s+["'“]?([a-zA-Z][a-zA-Z\-]{1,20})/i);
  let word=wm?wm[1]:null;
  if(!word){ const m2=raw.match(/^what is (?:a |an |the )?([a-zA-Z\-]{3,})\??$/i); if(m2 && !aiGrammarFor(raw)) word=m2[1]; }
  if(/word of the day|build (my )?vocab|new word|teach me a word|use it in a sentence/i.test(s)){
    if(/use it in a sentence/i.test(s)&&AI.ctx.lastWord){ const v=aiVocab(AI.ctx.lastWord); if(v) return {kind:'text',data:{html:"Here's <b>"+v.en+"</b> in a sentence:<br>“"+(v.ex||("I use "+v.en+" often."))+"”<br>Now try making your own — type it as <i>check: your sentence</i>."}}; }
    const fresh=aiShuffle(RICHV)[0]; return {kind:'vocab',data:fresh};
  }
  if(word){ const v=aiVocab(word); if(v) return {kind:'vocab',data:v}; }
  // grammar
  const g=aiGrammarFor(raw); if(g||/\bgrammar\b|teach me/i.test(s)){ if(g) return {kind:'grammar',data:g};
    return {kind:'text',data:{html:"I can explain any of these — just tap one:",follow:["Present perfect","Articles a/an/the","since vs for","Stative verbs","Tag questions","Comparatives"]}}; }
  // synonyms follow
  if(/synonym|antonym/i.test(s)&&AI.ctx.lastWord){ const v=aiRich(AI.ctx.lastWord); if(v) return {kind:'text',data:{html:"<b>"+v.en+"</b> — synonyms: "+(v.syn.join(", ")||"—")+"<br>antonyms: "+(v.ant.join(", ")||"—")}}; }
  if(/^(hi|hii|hello|hey|salam|assalam|good (morning|evening|afternoon))\b/i.test(raw)) return {kind:'text',data:{html:"Hello! 👋 I'm your Lantern tutor. What would you like to work on today — grammar, vocabulary, pronunciation, or a quick quiz?"}};
  if(/\bthank/i.test(s)) return {kind:'text',data:{html:"You're welcome! Keep going — small daily steps make you fluent. 🌟"}};
  if(/help|what can you|what do you do|options/i.test(s)) return {kind:'text',data:{html:"I can: explain <b>grammar</b>, build <b>vocabulary</b> (with IPA, synonyms & examples), <b>score your pronunciation</b>, <b>rewrite</b> your sentences, run <b>quizzes</b>, make a <b>study plan</b>, do <b>speaking practice</b>, and <b>translate</b> ideas from বাংলা."}};
  // fallback: known word?
  for(const w of raw.toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/)){ if(w.length>3&&aiVocab(w)) return {kind:'vocab',data:aiVocab(w)}; }
  return {kind:'text',data:{html:"I'm your English tutor, so I answer from real lessons. Try:<br><i>“Teach me the present perfect” · “meaning of achieve” · “how do I say comfortable?” · “quiz me” · “rewrite: I go school everyday”</i>"}};
}

function aiFollowsFor(kind,data){
  if(kind==='grammar') return ["Quiz me on this","Give another example","Make a study plan"];
  if(kind==='vocab') return ["Use it in a sentence","Pronounce it","Quiz me on this word","Synonyms & antonyms"];
  if(kind==='pron') return ["Another word","Teach me a tense","Quiz me"];
  if(kind==='quiz') return ["Another question","Teach me grammar","Build vocabulary"];
  if(kind==='rewrite') return ["Rewrite another","Teach me the mistake","Quiz me"];
  if(kind==='plan') return ["Start today's lesson","Build vocabulary","Practice speaking"];
  if(kind==='translate') return ["Translate another","Teach me the grammar","Build vocabulary"];
  return ["Teach me grammar","Build vocabulary","Practice pronunciation","Quiz me"];
}

function aiSend(preset){
  const inp=document.getElementById('aiIn');
  let q=(preset!=null?preset:(inp?inp.value:'')).trim();
  if(!q||AI.thinking) return;
  AI.msgs.push({id:AI.seq++,role:'user',kind:'text',data:{html:aiEsc(q)}});
  if(inp) inp.value='';
  const loadId=AI.seq++;
  AI.msgs.push({id:loadId,role:'ai',kind:'loading',data:{tip:AI_TIPS[(Math.random()*AI_TIPS.length)|0]}});
  AI.thinking=true; aiRenderLog(); aiRenderFollows();
  setTimeout(function(){
    const res=aiClassify(q);
    if(res.kind==='vocab') AI.ctx.lastWord=res.data.en;
    if(res.kind==='pron') AI.ctx.lastWord=res.data.word;
    if(res.kind==='grammar') AI.ctx.lastTopic=res.data;
    const i=AI.msgs.findIndex(m=>m.id===loadId);
    const msg={id:loadId,role:'ai',kind:res.kind,data:res.data};
    if(res.kind==='text') msg.data.stream=true;
    msg.follow = (res.data&&res.data.follow)?res.data.follow:aiFollowsFor(res.kind,res.data);
    if(i>=0) AI.msgs[i]=msg;
    AI.thinking=false; aiRenderLog(); aiRenderFollows();
  }, 700+((Math.random()*500)|0));
}

function aiType(el,html){
  const toks=(html.match(/<[^>]+>|[^<]+/g)||[]); let parts=[];
  toks.forEach(t=>{ if(t[0]==='<') parts.push(t); else t.split(/(\s+)/).forEach(w=>{if(w)parts.push(w);}); });
  el.innerHTML=''; let i=0;
  const tm=setInterval(function(){ el.innerHTML+=parts[i++]; const log=document.getElementById('aiLog'); if(log) log.scrollTop=log.scrollHeight; if(i>=parts.length) clearInterval(tm); },16);
}
function aiRenderFollows(){
  const box=document.getElementById('aiFollows'); if(!box) return;
  const last=[...AI.msgs].reverse().find(m=>m.role==='ai'&&m.kind!=='loading');
  if(AI.msgs.length<=1||!last||!last.follow){ box.innerHTML=''; return; }
  box.innerHTML=last.follow.map(f=>"<button class='ai-chip' onclick=\"aiFollow('"+f.replace(/'/g,"\\'")+"')\">"+f+"</button>").join('');
}

  let inner='';
  switch(m.kind){
    case 'text': inner="<div id='aic-"+m.id+"'>"+m.data.html+"</div>"; break;
    case 'grammar': inner=aiCardGrammar(m); break;
    case 'vocab': inner=aiCardVocab(m); break;
    case 'pron': inner=aiCardPron(m); break;
    case 'quiz': inner=aiCardQuiz(m); break;
    case 'rewrite': inner=aiCardRewrite(m); break;
    case 'plan': inner=aiCardPlan(m); break;
    case 'translate': inner=aiCardTranslate(m); break;
    case 'dialchoose': inner=aiCardDialChoose(m); break;
    case 'dialogue': inner=aiCardDialogue(m); break;
    default: inner=m.data.html||'';
  }
  return "<div class='ai-msg bot'>"+inner+"</div>";
}
function aiCard(tag,color,title,body){ return "<div class='aicard' style='--c:"+color+"'><div class='aicard-h'><span class='aicard-tag'>"+tag+"</span><span class='aicard-t'>"+title+"</span></div>"+body+"</div>"; }
function aiCardGrammar(m){ const g=m.data;
  let b="<p class='aic-body'>"+g.body+"</p><ul class='aic-list'>"+g.points.map(p=>"<li>"+p+"</li>").join('')+"</ul>";
  if(g.mistakes&&g.mistakes.length) b+="<div class='aic-mistakes'>"+g.mistakes.map(x=>"<div><span class='x'>✗ "+x[0]+"</span><span class='ok'>✓ "+x[1]+"</span></div>").join('')+"</div>";
  if(g.practice){ b+=aiPracticeHTML(m.id,g.practice); }
  return aiCard("GRAMMAR","var(--brand)",g.title+" <span class='bn'>"+g.bn+"</span>",b);
}
function aiPracticeHTML(id,p){
  return "<div class='aic-practice' id='aiprac-"+id+"'><div class='aic-practice-q'>✏️ Try it: "+p.q+"</div>"+
    p.options.map((o,i)=>"<button class='aic-opt' onclick=\"aiPrac("+id+","+i+","+p.a+")\">"+o+"</button>").join('')+
    "<div class='aic-fb' id='aifb-"+id+"' data-ex=\""+String(p.ex).replace(/"/g,'&quot;')+"\"></div></div>";
}
function aiPrac(id,i,a){
  const wrap=document.getElementById('aiprac-'+id); if(!wrap) return;
  const opts=wrap.querySelectorAll('.aic-opt'); opts.forEach(o=>o.disabled=true);
  opts[i].classList.add(i===a?'right':'wrong'); if(i!==a) opts[a].classList.add('right');
  const fb=document.getElementById('aifb-'+id); fb.innerHTML=(i===a?"<b class='ok'>Correct! ✅</b> ":"<b class='x'>Not quite. </b>")+fb.getAttribute('data-ex');
}
function aiCardVocab(m){ const v=m.data;
  let b="<div class='aic-word'><span class='aic-w'>"+v.en+"</span>"+(v.ipa?"<span class='aic-ipa'>"+v.ipa+"</span>":"")+(v.pos?"<span class='aic-pos'>"+v.pos+"</span>":"")+
    "<button class='aic-say' onclick=\"say('"+v.en.replace(/'/g,"\\'")+"')\">🔊</button></div>";
  b+="<div class='aic-mean'>"+(v.def?v.def+" — ":"")+"<span class='bn'>"+v.bn+"</span></div>";
  if(v.ex) b+="<div class='aic-ex'>“"+v.ex+"”</div>";
  const chips=(arr,cls)=>arr&&arr.length?"<div class='aic-chips "+cls+"'>"+arr.map(x=>"<span>"+x+"</span>").join('')+"</div>":"";
  if(v.syn&&v.syn.length) b+="<div class='aic-lbl'>Synonyms</div>"+chips(v.syn,'syn');
  if(v.ant&&v.ant.length) b+="<div class='aic-lbl'>Antonyms</div>"+chips(v.ant,'ant');
  if(v.coll&&v.coll.length) b+="<div class='aic-lbl'>Collocations</div>"+chips(v.coll,'coll');
  return aiCard("VOCABULARY","var(--green)","Word builder",b);
}
function aiCardPron(m){ const d=m.data;
  let b="<div class='aic-word'><span class='aic-w'>"+d.word+"</span>"+(d.ipa?"<span class='aic-ipa'>"+d.ipa+"</span>":"")+"</div>";
  b+=d.ipa?"<div class='aic-mean'>The <b>ˈ</b> mark shows the <b>stressed</b> syllable — say it louder and longer.</div>":"<div class='aic-mean'>Listen and repeat to copy the sound and rhythm.</div>";
  b+="<div class='aic-pron-row'><button class='ai-btn' onclick=\"say('"+d.word.replace(/'/g,"\\'")+"')\">🔊 Hear it</button>"+
     "<button class='ai-btn' id='aimic-"+m.id+"' onclick=\"aiScore("+m.id+",'"+d.word.replace(/'/g,"\\'")+"')\">🎤 Speak & score</button></div>"+
     "<div id='aiscore-"+m.id+"'></div>";
  return aiCard("PRONUNCIATION","var(--coral)","Say it right",b);
}
function aiScore(id,word){
  const out=document.getElementById('aiscore-'+id); const btn=document.getElementById('aimic-'+id);
  if(typeof SR==='undefined'||!SR){ if(out) out.innerHTML="<div class='aic-note'>Your browser can't use the mic. Tap 🔊 and repeat aloud.</div>"; return; }
  try{ const rec=new SR(); rec.lang='en-US'; rec.interimResults=false; if(btn) btn.classList.add('rec');
    if(out) out.innerHTML="<div class='aic-note'>🎙️ Listening…</div>";
    rec.onresult=function(e){ const said=e.results[0][0].transcript; const pct=Math.round(similarity(said,word)*100);
      if(btn) btn.classList.remove('rec'); const col=pct>=80?'var(--green)':pct>=55?'var(--gold-deep)':'var(--coral)';
      out.innerHTML="<div class='aic-scorebar'><i style='width:"+pct+"%;background:"+col+"'></i></div><div class='aic-scoren' style='color:"+col+"'>"+pct+"% · "+(pct>=80?'Excellent!':pct>=55?'Good, almost!':'Keep trying')+"</div><div class='aic-note'>Heard: “"+said+"”</div>"; };
    rec.onerror=function(){ if(btn) btn.classList.remove('rec'); if(out) out.innerHTML="<div class='aic-note'>No mic access. Tap 🔊 and repeat aloud.</div>"; };
    rec.start();
  }catch(e){ if(out) out.innerHTML="<div class='aic-note'>Mic not available right now.</div>"; }
}
function aiCardQuiz(m){ const q=m.data;
  let b="<div class='aic-practice-q'>"+q.q+"</div>"+
    q.options.map((o,i)=>"<button class='aic-opt "+(q.answered!=null?(i===q.a?'right':(i===q.answered?'wrong':'')):'')+"' "+(q.answered!=null?'disabled':'')+" onclick=\"aiQuizAns("+m.id+","+i+")\">"+o+"</button>").join('');
  if(q.answered!=null) b+="<div class='aic-fb'>"+(q.answered===q.a?"<b class='ok'>Correct! ✅</b> ":"<b class='x'>Not quite. </b>")+q.ex+"</div>";
  return aiCard("QUIZ","var(--gold)","Quick check",b);
}
function aiQuizAns(id,i){ const m=AI.msgs.find(x=>x.id===id); if(!m||m.data.answered!=null) return; m.data.answered=i; aiRenderLog(); }
function aiCardRewrite(m){ const d=m.data;
  let b="<div class='aic-rw'><div class='aic-rw-row'><span class='aic-rw-lbl x'>Your text</span><div class='aic-rw-txt'>"+aiEsc(d.orig)+"</div></div>"+
    "<div class='aic-rw-row'><span class='aic-rw-lbl ok'>Improved</span><div class='aic-rw-txt good'>"+aiEsc(d.improved)+"</div></div></div>";
  if(d.changes.length) b+="<div class='aic-lbl'>What changed & why</div><ul class='aic-list'>"+d.changes.map(c=>"<li><b>"+aiEsc(c.to)+"</b> — "+c.why+"</li>").join('')+"</ul>";
  else b+="<div class='aic-note'>Your sentence already looks good! ✅</div>";
  return aiCard("REWRITE","var(--violet)","Correction",b);
}
function aiCardPlan(m){ const d=m.data;
  let b="<div class='aic-note'>Level: <b>"+d.level+"</b> · Streak: <b>"+d.streak+" day"+(d.streak===1?"":"s")+"</b>. Here's a ~17-minute plan for today:</div>";
  b+="<div class='aic-timeline'>"+d.steps.map((s,i)=>"<div class='aic-step'><div class='aic-step-n'>"+(i+1)+"</div><div><b>"+s.t+"</b><span>"+s.d+"</span></div></div>").join('')+"</div>";
  b+="<button class='ai-btn' onclick=\"go('learn')\">Start now →</button>";
  return aiCard("STUDY PLAN","var(--sky)","Your plan for today",b);
}
function aiCardTranslate(m){ const d=m.data;
  let b="<div class='aic-tr'><div class='aic-tr-src bn'>"+aiEsc(d.src)+"</div>"+(d.out?"<div class='aic-tr-arrow'>↓</div><div class='aic-tr-out'>“"+aiEsc(d.out)+"”</div>":"")+"</div>";
  if(d.notes&&d.notes.length) b+="<div class='aic-lbl'>Why (not word-for-word)</div><ul class='aic-list'>"+d.notes.map(n=>"<li>"+n+"</li>").join('')+"</ul>";
  if(!d.out) b+="<div class='ai-chips-row'>"+AI_TR.slice(0,3).map(x=>"<button class='ai-chip' onclick=\"aiSend('translate: "+x.bn+"')\">"+x.bn+"</button>").join('')+"</div>";
  return aiCard("TRANSLATE","var(--gold-deep)","Meaning first",b);
}
function aiCardDialChoose(m){
  let b="<div class='aic-note'>Pick a scene and we'll have a short conversation. I'll suggest replies — tap one or speak it aloud.</div><div class='ai-acts'>";
  Object.entries(DIALOGUES).forEach(([k,v])=>{ b+="<button class='ai-act' onclick=\"aiDialStart('"+k+"')\"><span class='ai-act-ic'>"+ic(v.icon)+"</span><span>"+v.name+"</span></button>"; });
  b+="</div>";
  return aiCard("SPEAKING","var(--coral)","Conversation practice",b);
}
function aiDialStart(k){ AI.msgs.push({id:AI.seq++,role:'ai',kind:'dialogue',data:{scen:k,step:0}}); aiRenderLog(); aiRenderFollows(); const t=DIALOGUES[k].turns[0]; setTimeout(()=>say(t.ai),200); }
function aiCardDialogue(m){ const d=m.data; const sc=DIALOGUES[d.scen]; const turn=sc.turns[d.step];
  let b="<div class='aic-dial'><div class='aic-dial-ai'>"+ic('chat')+" <span>"+turn.ai+"</span> <button class='aic-say' onclick=\"say('"+turn.ai.replace(/'/g,"\\'")+"')\">🔊</button></div>";
  if(d.step<sc.turns.length-1){ b+="<div class='aic-lbl'>Your reply</div><div class='ai-chips-row'>"+turn.replies.map((r,i)=>"<button class='ai-chip' onclick=\"aiDialReply("+m.id+","+i+")\">"+r+"</button>").join('')+"</div>"; }
  else b+="<div class='aic-note'>🎉 Great conversation! Well done.</div><button class='ai-btn' onclick=\"aiSend('Let\\'s practice speaking')\">Try another scene</button>";
  b+="</div>";
  return aiCard("SPEAKING · "+sc.name,"var(--coral)","Roleplay",b);
}
function aiDialReply(id,i){ const m=AI.msgs.find(x=>x.id===id); if(!m) return; const sc=DIALOGUES[m.data.scen]; const turn=sc.turns[m.data.step];
  AI.msgs.push({id:AI.seq++,role:'user',kind:'text',data:{html:aiEsc(turn.replies[i])}});
  m.data.step=Math.min(m.data.step+1,sc.turns.length-1);
  const next={id:AI.seq++,role:'ai',kind:'dialogue',data:{scen:m.data.scen,step:m.data.step}};
  AI.msgs.push(next); aiRenderLog(); aiRenderFollows();
  const t=sc.turns[m.data.step]; setTimeout(()=>say(t.ai),250);
}

{id:"conflict", title:"Difficult Conversations & Conflict Resolution", bn:"কঠিন আলোচনা ও দ্বন্দ্ব নিরসন", icon:"cards", level:"Advanced",

 practice:[{q:"A teammate keeps interrupting you in meetings. What's the best way to raise it?", options:["You're so rude, stop it!","When I get interrupted, I lose my train of thought. Could we make sure everyone finishes speaking?","Never mind, it's fine."], a:1, ex:"An 'I' statement describes the impact without attacking, making the person more likely to listen."},
