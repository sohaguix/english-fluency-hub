  {q:"Which is an appropriate formal sign-off?",options:["Later","Best regards","cya"],a:1,ex:"Best regards is professional and widely accepted in business email."}
 ],
 mistakes:[
  "Writing a vague or empty subject line that gets ignored",
  "Being too casual in a formal email, such as starting with Hey",
  "Burying the main request deep in a long paragraph",
  "Forgetting to attach the file you mention in the email"
 ],
 culture:[
  "In business email, getting to the point quickly is seen as respectful of time.",
  "Match formality to the reader, more formal for new contacts, warmer for known colleagues.",
  "A short thank-you line at the end leaves a positive, professional impression."
 ],
 roleplay:[
  {ai:"Hi, I never received the document you mentioned. Can you resend it?",replies:["Apologies for that. Please find it attached, and let me know if it opens fine.","So sorry, I must have missed the attachment. I am resending it now."]},
  {ai:"Could you confirm whether Thursday works for the call?",replies:["Yes, Thursday at 2 pm works well for me. I will send a calendar invite.","Thursday is fine on my end. Please let me know your preferred time."]},
  {ai:"We need the proposal urgently. When can you send it?",replies:["I understand the urgency. I will have it to you by tomorrow morning.","I can send a draft by end of day and the final version tomorrow."]},
  {ai:"Thanks for the quick reply, that is all I needed.",replies:["You are welcome. Please do not hesitate to reach out if anything else comes up.","Glad I could help. I look forward to working with you on this."]}
 ]},
{id:"interview", title:"Interview Communication", bn:"সাক্ষাৎকারের যোগাযোগ", icon:"mic", level:"Advanced",
 objectives:["Answer common interview questions with structure and confidence","Present strengths and achievements without sounding arrogant","Ask thoughtful questions and close the interview well"],
 steps:[
  {t:"Prepare your story",d:"Have clear examples of achievements ready, using the situation, task, action, result structure."},
  {t:"Open with a strong self-introduction",d:"Give a concise summary of who you are, your experience, and what you bring."},
  {t:"Answer with structure",d:"For behavioral questions, describe the situation, what you did, and the result you achieved."},
  {t:"Show self-awareness",d:"When asked about weaknesses, name a real one and explain how you are improving it."},
  {t:"Ask smart questions and close",d:"Ask about the team or goals, then thank the interviewer and express genuine interest."}
 ],
 examples:[
  {sit:"Answering tell me about yourself",say:"I am a marketing specialist with five years of experience, and I focus on turning data into campaigns that grow revenue."},
  {sit:"Describing an achievement",say:"When our sales dropped, I led a new outreach plan that increased leads by thirty percent in three months."},
  {sit:"Discussing a weakness",say:"I used to take on too much myself, so I have been learning to delegate and trust my team more."}
 ],
 phrases:[
  "Thank you for the opportunity to interview for this role.",
  "In my previous role, I was responsible for leading a small team.",
  "One achievement I am proud of is improving our process efficiency.",
  "That is a great question, let me give you a specific example.",
  "I would describe my working style as collaborative and detail-oriented.",
  "I am really drawn to this role because it aligns with my long-term goals.",
  "Could you tell me more about how success is measured in this position?",
  "I am confident I could add value to your team from day one."
 ],
 vocab:[
  {en:"strengths",bn:"শক্তির দিক"},
  {en:"to delegate",bn:"দায়িত্ব ভাগ করে দেওয়া"},
  {en:"achievement",bn:"অর্জন"},
  {en:"to align with",bn:"সঙ্গতিপূর্ণ হওয়া"},
  {en:"proactive",bn:"সক্রিয় ও উদ্যোগী"},
  {en:"track record",bn:"অতীত কৃতিত্বের রেকর্ড"}
 ],
 practice:[
  {q:"How should you answer a behavioral question like tell me about a challenge?",options:["Give a vague general answer","Use a clear situation, action, and result example","Say you have never faced a challenge"],a:1,ex:"A structured, specific example shows real skill and is memorable."},
  {q:"What is the best way to discuss a weakness?",options:["Say you have none","Name a real one and how you are improving it","Give a fake strength like I work too hard"],a:1,ex:"Honesty plus growth shows self-awareness, which employers value."},
  {q:"What should you do at the end of an interview?",options:["Leave silently","Ask a thoughtful question and thank them","Ask only about salary and days off"],a:1,ex:"A good closing question and genuine thanks leave a strong final impression."}
 ],
 mistakes:[
  "Giving long, unstructured answers that lose the interviewer",
  "Sounding either too arrogant or too unsure of yourself",
  "Speaking negatively about a former employer or colleague",
  "Not preparing any questions to ask at the end"
 ],
 culture:[
  "Confidently stating your achievements is expected, not seen as boasting, if backed by facts.",
  "Interviewers value specific examples over general claims about your abilities.",
  "Sending a short thank-you email afterward is a common and respected practice."
 ],
 roleplay:[
  {ai:"So, tell me a little about yourself.",replies:["I am a project manager with six years of experience delivering software on time and on budget.","Sure. I specialize in operations, and I am proud of a track record of improving team efficiency."]},
  {ai:"What would you say is your biggest weakness?",replies:["I used to struggle with delegating, but I have actively worked on trusting my team more.","I can be a perfectionist, so I have learned to balance quality with realistic deadlines."]},
  {ai:"Can you describe a time you handled a difficult situation?",replies:["When a key client threatened to leave, I led weekly check-ins that rebuilt their trust and renewed the contract.","During a tight deadline, I reprioritized tasks with the team and we still delivered on time."]},
  {ai:"Do you have any questions for me?",replies:["Yes, how do you measure success in this role during the first six months?","I would love to know more about the team culture and how you support growth."]}
 ]},
{id:"business", title:"Business English Frameworks", bn:"বিজনেস ইংলিশ কাঠামো", icon:"layers", level:"Advanced",
 objectives:["Negotiate, persuade, and present ideas in business settings","Use precise business vocabulary and diplomatic language","Handle high-stakes conversations with clarity and tact"],
 steps:[
  {t:"Frame the value proposition",d:"Lead with the benefit or outcome that matters most to your audience before the details."},
  {t:"Use diplomatic language",d:"Soften strong positions with hedging words like perhaps, tend to, and it might be worth."},
  {t:"Negotiate with give and take",d:"Signal flexibility using if and then conditions to trade value rather than simply conceding."},
  {t:"Support claims with evidence",d:"Back statements with numbers, examples, or trends to build credibility."},
  {t:"Close with a clear call to action",d:"End by proposing a concrete next step and confirming agreement."}
 ],
 examples:[
  {sit:"Making a persuasive pitch",say:"By automating this process, we could cut costs by twenty percent and free the team for higher-value work."},
  {sit:"Negotiating terms",say:"If you can commit to a twelve-month contract, then we would be able to offer a better rate."},
  {sit:"Pushing back diplomatically",say:"I take your point, though it might be worth considering the long-term impact before we decide."}
 ],
 phrases:[
  "Let me walk you through the key benefits.",
  "From a strategic standpoint, this positions us well for growth.",
  "If we go this route, then we can expect a stronger return.",
  "I would like to propose a slightly different approach.",
  "Correct me if I am wrong, but it seems the main concern is cost.",
  "Shall we aim to finalize the terms by the end of the week?",
  "That is a fair point, and here is how we can address it.",
  "To move this forward, I suggest we agree on the scope first."
 ],
 vocab:[
  {en:"value proposition",bn:"মূল্য প্রস্তাব"},
  {en:"to leverage",bn:"সুবিধা কাজে লাগানো"},
  {en:"return on investment",bn:"বিনিয়োগের প্রতিদান"},
  {en:"to negotiate terms",bn:"শর্ত নিয়ে দর কষাকষি"},
  {en:"scope",bn:"কাজের পরিধি"},
  {en:"bottom line",bn:"মূল ফলাফল বা লাভ"}
 ],
 practice:[
  {q:"What is a strong way to open a business pitch?",options:["List every technical detail first","Lead with the main benefit for the audience","Talk mostly about your company history"],a:1,ex:"Leading with the benefit captures attention and shows relevance immediately."},
  {q:"Which sentence uses diplomatic negotiation language?",options:["Take it or leave it.","If you commit to a longer term, then we can offer a better rate.","That is my final price, no discussion."],a:1,ex:"The if and then structure trades value and keeps the negotiation open."},
  {q:"How should you handle an objection in a business meeting?",options:["Ignore it and keep talking","Acknowledge it, then address it with evidence","Get defensive and argue"],a:1,ex:"Acknowledging and answering with evidence builds trust and credibility."}
 ],
 mistakes:[
  "Overloading the audience with detail before showing the value",
  "Being too rigid in negotiation instead of offering trade-offs",
  "Making claims without any data or examples to back them",
  "Using aggressive language that damages the long-term relationship"
 ],
 culture:[
  "Diplomatic hedging is respected in high-level business talks, not seen as weak.",
  "Data and evidence carry strong weight when persuading Western business audiences.",
  "Negotiation is expected to be a give and take, so leaving some room is normal."
 ],
 roleplay:[
  {ai:"Your proposal looks interesting, but the price is above our budget.",replies:["I understand. If we adjust the scope slightly, then we can bring the cost down.","Let me show you the return on investment, and we can explore a package that fits."]},
  {ai:"Why should we choose your company over a cheaper competitor?",replies:["Our track record shows we deliver on time, which lowers your long-term costs.","We focus on results, and clients typically see a strong return within six months."]},
  {ai:"I am not sure this approach will work for our market.",replies:["That is a fair concern. It might be worth running a small pilot first.","Correct me if I am wrong, but the main risk seems to be scale. We can plan for that."]},
  {ai:"Okay, I think we can move forward with this.",replies:["Excellent. Shall we aim to finalize the terms by the end of the week?","Great. To keep momentum, I suggest we agree on the scope and next steps today."]}
 ]},
{id:"presentation", title:"Presentation & Public Speaking", bn:"উপস্থাপনা ও জনসমক্ষে বক্তৃতা", icon:"mic", level:"Advanced",
 objectives:["Open with a hook that grabs attention in the first 30 seconds","Structure your talk with a clear beginning, middle, and end","Handle nerves, pauses, and audience questions with confidence"],
 steps:[{t:"Open with a hook",d:"Start with a question, a surprising fact, or a short story instead of just introducing yourself."},{t:"State your agenda",d:"Tell the audience what you will cover: 'Today I will walk you through three key points.'"},{t:"Deliver the body",d:"Present one main idea per slide or section, and use signpost phrases to move between them."},{t:"Use vocal variety",d:"Slow down for important points, pause after key ideas, and change your tone to keep attention."},{t:"Close with a call to action",d:"Summarise your key message and end with a clear next step or a memorable line."}],
 examples:[{sit:"Opening a talk to a large audience",say:"Imagine you could save two hours every day. By the end of this talk, you will know exactly how."},{sit:"Moving to your final point",say:"That brings me to my last and most important point."},{sit:"Wrapping up",say:"So, to leave you with one thought: small changes today create big results tomorrow."}],
 phrases:["Let me start by asking you a question.","Today I would like to talk to you about...","Let us move on to the next point.","As you can see on this slide...","To sum up, the key takeaway is...","That is a great question, let me answer that.","I will come back to that point in a moment.","Thank you all for your time and attention."],
 vocab:[{en:"hook",bn:"শ্রোতার মনোযোগ আকর্ষণকারী শুরু"},{en:"signpost",bn:"দিকনির্দেশক বাক্যাংশ"},{en:"call to action",bn:"পদক্ষেপ নেওয়ার আহ্বান"},{en:"vocal variety",bn:"কণ্ঠস্বরের বৈচিত্র্য"},{en:"takeaway",bn:"মূল শিক্ষা বা বার্তা"},{en:"rapport",bn:"সুসম্পর্ক বা বোঝাপড়া"}],
 practice:[{q:"What is the best way to open a presentation?",options:["With a hook like a question or surprising fact","By reading every slide aloud","By apologising for being nervous"],a:0,ex:"A hook grabs attention immediately and makes the audience want to listen."},{q:"Which phrase helps you move between sections smoothly?",options:["Um, so anyway...","Let us move on to the next point.","I forgot what I was saying."],a:1,ex:"Signpost phrases guide the audience and make your structure clear."},{q:"How should you end a strong presentation?",options:["Just say 'that is all'","With a clear summary and call to action","By walking off quickly"],a:1,ex:"A summary plus a call to action leaves a lasting, actionable impression."}],
 mistakes:["Reading directly from your slides word for word","Speaking too fast because of nerves","Ending abruptly without a summary","Overloading slides with too much text"],
 culture:["In many Western settings, audiences appreciate a light joke or personal story to build rapport","Making eye contact shows confidence and honesty","Inviting questions at the end signals openness and respect for the audience"],
 roleplay:[{ai:"Good morning everyone, are we ready to begin?",replies:["Good morning, yes, let us get started.","Yes, thank you all for coming, I am excited to share this with you."]},{ai:"That was interesting, but could you explain your second point again?",replies:["Of course, let me go over that point in more detail.","Certainly, that is a great question, allow me to clarify."]},{ai:"How does this apply to a smaller team like ours?",replies:["Great question, the same principles scale down easily, let me show you how.","I am glad you asked, for smaller teams the impact is even faster."]},{ai:"Thank you, that was a very clear presentation.",replies:["Thank you so much, I appreciate your kind words.","Thank you, I am glad you found it useful."]}]},
{id:"uxdemo", title:"UX Design Prototype Presentation", bn:"ইউএক্স ডিজাইন প্রোটোটাইপ উপস্থাপনা", icon:"layers", level:"Advanced",
 objectives:["Set clear context and the user problem before showing any screens","Walk stakeholders through the user flow logically","Explain design decisions and gather actionable feedback"],
 steps:[{t:"Set the context",d:"Remind stakeholders of the goal and who the user is: 'This prototype focuses on first-time users signing up.'"},{t:"Frame the user problem",d:"State the pain point clearly: 'Users were dropping off because the form felt too long.'"},{t:"Walk through the flow",d:"Move screen by screen, narrating what the user sees and does at each step."},{t:"Explain design decisions",d:"Justify key choices with reasoning: 'We split the form into steps to reduce cognitive load.'"},{t:"Invite and frame feedback",d:"Ask focused questions: 'Does this flow match how your customers actually behave?'"}],
 examples:[{sit:"Starting the demo",say:"Before I show the screens, let me quickly set the context for this flow."},{sit:"Explaining a choice",say:"We chose a progress bar here so users always know how many steps are left."},{sit:"Asking for feedback",say:"I would love your thoughts, does this address the drop-off issue we discussed?"}],
 phrases:["Let me start by framing the problem we are solving.","This is a clickable prototype, so I will walk you through the flow.","On this screen, the user is trying to...","The reasoning behind this decision was...","This is still a work in progress, so feedback is welcome.","Let me highlight one key interaction here.","How does this align with what you are seeing from real users?","I want to flag one open question for the group."],
 vocab:[{en:"user flow",bn:"ব্যবহারকারীর ধাপক্রম"},{en:"prototype",bn:"প্রাথমিক নমুনা"},{en:"pain point",bn:"সমস্যা বা অসুবিধার বিন্দু"},{en:"drop-off",bn:"ব্যবহারকারীর সরে যাওয়া"},{en:"cognitive load",bn:"মানসিক চাপ বা প্রক্রিয়াকরণের ভার"},{en:"iteration",bn:"পুনরাবৃত্তি বা উন্নয়ন চক্র"}],
 practice:[{q:"What should you do before showing any prototype screens?",options:["Set the context and user problem","Show every screen as fast as possible","Ask stakeholders to guess the goal"],a:0,ex:"Context helps stakeholders judge the design against a real problem, not just aesthetics."},{q:"How should you present a design decision?",options:["Say 'it just looks better'","Justify it with reasoning tied to the user","Skip the explanation entirely"],a:1,ex:"Explaining the reasoning builds trust and shows the decision was intentional."},{q:"What is a good way to invite feedback?",options:["Ask a focused question about user behaviour","Ask 'do you like it?' only","Avoid asking anything"],a:0,ex:"Focused questions produce actionable feedback instead of vague opinions."}],
 mistakes:["Jumping into screens before explaining the problem","Defending your design instead of listening to feedback","Using heavy jargon that stakeholders do not understand","Presenting the prototype as final when it is still a draft"],
 culture:["Framing feedback as collaboration keeps stakeholders engaged rather than defensive","In cross-functional meetings, tie design choices to business goals, not just visuals","Acknowledging good feedback openly encourages more honest input"],
 roleplay:[{ai:"So walk me through this, what exactly are we looking at?",replies:["Sure, this is the sign-up flow for first-time users, let me set the context first.","Happy to, let me start with the problem we are solving, then show the screens."]},{ai:"Why did you split the form into three steps?",replies:["Good question, we split it to reduce cognitive load and cut the drop-off rate.","We tested a long single form and users abandoned it, so steps felt friendlier."]},{ai:"I am not sure users will understand this icon.",replies:["That is a fair point, let me note it and we can test the icon with users.","Thank you, I will flag that, we can add a label to make it clearer."]},{ai:"This looks solid, what happens next?",replies:["Next we run a quick usability test, then I will share the results with you.","Great, our next step is user testing, and I will iterate based on findings."]}]},
{id:"negotiation", title:"Negotiation Techniques", bn:"আলোচনা ও দর-কষাকষির কৌশল", icon:"compass", level:"Advanced",
 objectives:["Open a negotiation while building trust and rapport","Make and respond to offers with clear, professional language","Reach a win-win outcome without damaging the relationship"],
 steps:[{t:"Prepare your position",d:"Know your goal, your best alternative, and the point where you will walk away."},{t:"Build rapport first",d:"Start friendly and find common ground before discussing numbers."},{t:"Make your case",d:"Explain your reasoning and the value you offer, not just what you want."},{t:"Trade concessions",d:"Never give something without asking for something in return: 'If we do X, could you do Y?'"},{t:"Confirm the agreement",d:"Summarise what was agreed clearly so both sides leave with the same understanding."}],
 examples:[{sit:"Opening a price discussion",say:"Before we talk numbers, I want to make sure this works well for both of us."},{sit:"Making a counter-offer",say:"I understand your position, but that budget is a little tight, could we meet in the middle?"},{sit:"Trading a concession",say:"If you can commit to a longer contract, I can offer you a better rate."}],
 phrases:["Let us see if we can find a solution that works for both of us.","I hear what you are saying, however...","What if we approached it this way?","Would you be open to a compromise?","That is a fair point, let me suggest an alternative.","I can be flexible on the timeline if you can be flexible on the price.","Let me make sure I understand your priorities.","So, to confirm, we have agreed that..."],
 vocab:[{en:"leverage",bn:"সুবিধা বা প্রভাব খাটানোর ক্ষমতা"},{en:"concession",bn:"ছাড় দেওয়া"},{en:"compromise",bn:"আপস বা মাঝামাঝি সমাধান"},{en:"win-win",bn:"উভয়পক্ষের লাভজনক সমাধান"},{en:"walk-away point",bn:"সরে যাওয়ার সীমা"},{en:"common ground",bn:"সাধারণ ভিত্তি বা মিল"}],
 practice:[{q:"What is the best mindset for a strong negotiation?",options:["Win at any cost","Aim for a win-win outcome","Give in immediately to avoid conflict"],a:1,ex:"Win-win outcomes protect the relationship and lead to lasting agreements."},{q:"How should you handle a concession?",options:["Give it freely to seem generous","Trade it for something in return","Refuse to concede anything"],a:1,ex:"Trading concessions keeps the exchange balanced and shows the value of each item."},{q:"Which phrase softens disagreement professionally?",options:["You are completely wrong.","I hear what you are saying, however...","That is a ridiculous offer."],a:1,ex:"Acknowledging the other side first keeps the tone respectful and productive."}],
 mistakes:["Making the first offer too extreme and losing credibility","Focusing only on your own needs, not the other side's","Giving concessions without asking for anything back","Letting emotions take over during tense moments"],
 culture:["In many cultures, some small talk before business builds essential trust","Being direct is valued in Western negotiations, but stay polite and calm","Never make the other side lose face, even when you disagree strongly"],
 roleplay:[{ai:"Honestly, your price is much higher than we expected.",replies:["I understand your concern, let me explain the value behind it.","I hear you, could we look at what is driving the price together?"]},{ai:"We would need a 20 percent discount to move forward.",replies:["That is a big ask, but if you extend the contract, I can work on it.","I appreciate the offer, could we meet in the middle at 10 percent?"]},{ai:"Our budget is fixed, there is no room to increase it.",replies:["Understood, then let us adjust the scope to fit your budget.","Alright, if the budget is fixed, can we be flexible on the deadline instead?"]},{ai:"Okay, I think we can make that work.",replies:["Wonderful, let me summarise what we have agreed on.","Great, so to confirm, we are aligned on the terms, correct?"]}]},
{id:"storytelling", title:"Storytelling Frameworks", bn:"গল্প বলার কাঠামো", icon:"book", level:"Intermediate",
 objectives:["Structure a story with a clear beginning, conflict, and resolution","Use vivid detail and emotion to keep listeners engaged","Connect your story to a clear message or lesson"],
 steps:[{t:"Set the scene",d:"Give the listener a time, place, and character: 'A few years ago, I was working on a project that seemed impossible.'"},{t:"Introduce the conflict",d:"Describe the problem or tension that makes the story worth telling."},{t:"Build the tension",d:"Show the struggle and stakes so the listener feels invested."},{t:"Reveal the turning point",d:"Share the moment when things changed or you learned something."},{t:"Land the message",d:"Connect the story to your point: 'And that is why I believe...'"}],
 examples:[{sit:"Starting a personal story",say:"Let me tell you about the day everything nearly went wrong."},{sit:"Building tension",say:"With only one hour left, we still had no solution, and everyone was watching."},{sit:"Delivering the lesson",say:"That experience taught me that the best ideas often come under pressure."}],
 phrases:["Let me tell you a quick story.","It all started when...","At that moment, I realised...","But here is the interesting part...","Long story short...","And that is when everything changed.","The lesson I took from that was...","You can probably guess what happened next."],
 vocab:[{en:"set the scene",bn:"পরিবেশ বা পটভূমি তৈরি করা"},{en:"conflict",bn:"দ্বন্দ্ব বা সমস্যা"},{en:"turning point",bn:"মোড় ঘোরানো মুহূর্ত"},{en:"stakes",bn:"ঝুঁকি বা যা হারানোর ভয়"},{en:"resolution",bn:"সমাধান বা পরিণতি"},{en:"relatable",bn:"সহজে অনুভব করা যায় এমন"}],
 practice:[{q:"What makes a story engaging?",options:["A clear conflict and turning point","A long list of facts","No emotion at all"],a:0,ex:"Conflict and a turning point create tension that keeps listeners hooked."},{q:"Why should a story connect to a message?",options:["It should not, stories are just for fun","So the listener remembers the point","To make the story longer"],a:1,ex:"A clear message gives the story purpose and makes it memorable."},{q:"How should you begin a short story in conversation?",options:["Give every background detail first","Set the scene briefly and get to the point","Start with the ending"],a:1,ex:"A brief scene draws people in without losing them in detail."}],
 mistakes:["Including too many irrelevant details","Forgetting to connect the story to a clear point","Telling the story in a flat, monotone voice","Making the story too long for the moment"],
 culture:["Personal, humble stories often connect well in Western audiences","Humour can lighten a story, but keep it inclusive","A relatable everyday struggle is often more powerful than a dramatic one"],
 roleplay:[{ai:"So how did you get into this field?",replies:["Funny you ask, let me tell you a quick story about that.","It actually started with a small failure, let me explain."]},{ai:"That sounds tough, what did you do?",replies:["At that moment, I realised I had to try something completely different.","Honestly, I panicked at first, but then something clicked."]},{ai:"And did it work out in the end?",replies:["It did, and that is when everything changed for me.","Not right away, but the lesson stuck with me forever."]},{ai:"Wow, that is a great story.",replies:["Thank you, the takeaway for me was to never give up too early.","I am glad you liked it, it really shaped how I work today."]}]},
{id:"persuasion", title:"Persuasive Communication", bn:"প্রভাবশালী যোগাযোগ", icon:"spark", level:"Advanced",
 objectives:["Build credibility and appeal to logic and emotion","Structure an argument that anticipates objections","Move your listener toward a clear, confident yes"],
 steps:[{t:"Establish credibility",d:"Show why you are worth listening to with experience or evidence early on."},{t:"Appeal to logic",d:"Support your point with facts, data, or clear reasoning."},{t:"Appeal to emotion",d:"Connect to what your listener cares about: their goals, fears, or values."},{t:"Address objections",d:"Raise the likely 'but what about...' and answer it before they do."},{t:"Ask for the commitment",d:"End with a clear, specific request: 'So, can I count on your support?'"}],

/* ============================================================
   ENGLISH COMMUNICATION FRAMEWORKS
   ============================================================ */
let FW={cur:null, ans:{}, role:null, filter:"All"};
const FW_KEY="lantern.fw.v1";
function fwLoad(){ try{const r=JSON.parse(localStorage.getItem(FW_KEY)); if(r&&r.done) return r;}catch(e){} return {done:{}}; }
let FWS=fwLoad();
function fwSave(){ try{localStorage.setItem(FW_KEY,JSON.stringify(FWS));}catch(e){} }
function fwIsDone(id){ return !!FWS.done[id]; }
function fwMark(id){ FWS.done[id]=true; fwSave(); }
function fwGet(id){ return FRAMEWORKS.find(f=>f.id===id); }
function fwEsc(s){ return String(s).replace(/'/g,"\\'"); }
const FW_LVLC={Beginner:"var(--green)",Intermediate:"var(--gold-deep)",Advanced:"var(--coral)"};

function renderFrameworks(){
  FW.cur=null;
  const el=document.getElementById('panel-frameworks');
  const done=FRAMEWORKS.filter(f=>fwIsDone(f.id)).length;
  const pct=Math.round(done/FRAMEWORKS.length*100);
  const levels=["All","Beginner","Intermediate","Advanced"];
  let html="<div class='panel-head'><h2>Communication Frameworks</h2>"+
    "<p>Structured playbooks to speak naturally and confidently in real situations — work, travel, interviews and more. <span class='bn'>(বাস্তব পরিস্থিতিতে আত্মবিশ্বাসে কথা বলো)</span></p></div>";
  html+="<div class='fw-prog'><div class='fw-prog-bar'><i style='width:"+pct+"%'></i></div><div class='fw-prog-t'>"+done+" / "+FRAMEWORKS.length+" completed</div></div>";
  html+="<div class='fw-filters'>"+levels.map(l=>"<button class='fw-fil"+(FW.filter===l?" on":"")+"' onclick=\"fwSetFilter('"+l+"')\">"+l+"</button>").join('')+"</div>";
  html+="<div class='fw-grid'>";
  FRAMEWORKS.filter(f=>FW.filter==="All"||f.level===FW.filter).forEach(f=>{
    const d=fwIsDone(f.id);
    html+="<button class='fw-card"+(d?" done":"")+"' onclick=\"fwOpen('"+f.id+"')\">"+
      "<div class='fw-card-ic' style='color:"+FW_LVLC[f.level]+"'>"+ic(f.icon)+"</div>"+
      "<div class='fw-card-b'><div class='fw-card-t'>"+f.title+"</div>"+
      "<div class='fw-card-bn bn'>"+f.bn+"</div>"+
      "<span class='fw-lvl' style='color:"+FW_LVLC[f.level]+";border-color:"+FW_LVLC[f.level]+"'>"+f.level+"</span></div>"+
      (d?"<span class='fw-check'>"+ic('check')+"</span>":"<span class='fw-go'>→</span>")+"</button>";
  });
  html+="</div>";
  el.innerHTML=html;
  window.scrollTo({top:0,behavior:'smooth'});
}
function fwSetFilter(l){ FW.filter=l; renderFrameworks(); }

function fwOpen(id){
  FW.cur=id;
  const f=fwGet(id); if(!f) return;
  const el=document.getElementById('panel-frameworks');
  const lc=FW_LVLC[f.level];
  let h="<button class='fw-back' onclick='renderFrameworks()'>← All frameworks</button>";
  h+="<div class='fw-hero' style='--lc:"+lc+"'><div class='fw-hero-ic'>"+ic(f.icon)+"</div>"+
     "<div><div class='fw-hero-t'>"+f.title+"</div><div class='fw-hero-bn bn'>"+f.bn+"</div>"+
     "<div class='fw-hero-tags'><span class='fw-lvl' style='color:"+lc+";border-color:"+lc+"'>"+f.level+"</span>"+
     (fwIsDone(id)?"<span class='fw-done-tag'>✓ Completed</span>":"")+"</div></div></div>";

  h+=fwSec("🎯","Learning objectives","<ul class='fw-list'>"+f.objectives.map(o=>"<li>"+o+"</li>").join('')+"</ul>");
  h+=fwSec("🧭","Step-by-step structure","<div class='fw-steps'>"+f.steps.map((s,i)=>"<div class='fw-step'><div class='fw-step-n'>"+(i+1)+"</div><div><b>"+s.t+"</b><span>"+s.d+"</span></div></div>").join('')+"</div>");
  h+=fwSec("💬","Real-life examples",f.examples.map(e=>"<div class='fw-ex'><div class='fw-ex-sit'>"+e.sit+"</div><div class='fw-ex-say'>“"+e.say+"” <button class='fw-say' onclick=\"say('"+fwEsc(e.say)+"')\">🔊</button></div></div>").join(''));
  h+=fwSec("🗣️","Common phrases","<div class='fw-phrases'>"+f.phrases.map(p=>"<button class='fw-phrase' onclick=\"say('"+fwEsc(p)+"')\">"+p+" <span>🔊</span></button>").join('')+"</div>");
  h+=fwSec("📖","Vocabulary highlights","<div class='fw-vocab'>"+f.vocab.map(v=>"<div class='fw-vrow'><button class='fw-say' onclick=\"say('"+fwEsc(v.en)+"')\">🔊</button><b>"+v.en+"</b><span class='bn'>"+v.bn+"</span></div>").join('')+"</div>");
  h+=fwSec("⚠️","Common mistakes to avoid","<ul class='fw-list fw-warn'>"+f.mistakes.map(m=>"<li>"+m+"</li>").join('')+"</ul>");
  h+=fwSec("🌍","Cultural communication tips","<ul class='fw-list fw-culture'>"+f.culture.map(c=>"<li>"+c+"</li>").join('')+"</ul>");
  // practice
  let pr="";
  f.practice.forEach((q,qi)=>{
    const key=id+"-"+qi; const chosen=FW.ans[key];
    pr+="<div class='fw-prac'><div class='fw-prac-q'>"+(qi+1)+". "+q.q+"</div>"+
      q.options.map((o,oi)=>"<button class='aic-opt "+(chosen!=null?(oi===q.a?'right':(oi===chosen?'wrong':'')):'')+"' "+(chosen!=null?'disabled':'')+" onclick=\"fwAnswer('"+id+"',"+qi+","+oi+")\">"+o+"</button>").join('')+
      (chosen!=null?"<div class='aic-fb'>"+(chosen===q.a?"<b class='ok'>Correct! ✅</b> ":"<b class='x'>Not quite. </b>")+q.ex+"</div>":"")+"</div>";
  });
  h+=fwSec("✏️","Practice exercises",pr);
  // roleplay
  h+=fwSec("🎭","Interactive role-play",fwRoleHTML(f));
  // AI practice
  h+=fwSec("🤖","Practice with AI","<p class='fw-aip'>Open your AI Tutor for a live conversation about this topic — it gives feedback and pronunciation scoring.</p><button class='ai-btn' onclick=\"fwToAI('"+id+"')\">Practice with AI Tutor →</button>");
  // complete
  const alldone=f.practice.every((q,qi)=>FW.ans[id+"-"+qi]!=null);
  h+="<div class='fw-complete'>"+(fwIsDone(id)?"<span class='fw-done-tag'>✓ Completed — well done!</span>":"<button class='ai-btn "+(alldone?'':'ghost')+"' onclick=\"fwCompleteBtn('"+id+"')\">"+(alldone?"Mark as complete 🎉":"Finish the practice to complete")+"</button>")+"</div>";

  el.innerHTML=h;
  window.scrollTo({top:0,behavior:'smooth'});
}
function fwSec(icn,title,body){ return "<div class='fw-sec'><div class='fw-sec-h'><span class='fw-sec-ic'>"+icn+"</span>"+title+"</div><div class='fw-sec-b'>"+body+"</div></div>"; }
function fwAnswer(id,qi,oi){ const key=id+"-"+qi; if(FW.ans[key]!=null) return; FW.ans[key]=oi; fwOpen(id); }
function fwCompleteBtn(id){ const f=fwGet(id); const alldone=f.practice.every((q,qi)=>FW.ans[id+"-"+qi]!=null); if(!alldone){ document.querySelector('.fw-prac')&&document.querySelector('.fw-prac').scrollIntoView({behavior:'smooth'}); return; } fwMark(id); fwOpen(id); }
function fwToAI(id){ const f=fwGet(id); go('coach'); setTimeout(function(){ if(typeof aiSend==='function') aiSend("Let's practice speaking"); },350); }

/* role-play */
function fwRoleHTML(f){
  const active=FW.role&&FW.role.id===f.id;
  const step=active?FW.role.step:0;
  const turns=f.roleplay||[];
  if(!turns.length) return "<p class='fw-aip'>—</p>";
  if(!active) return "<p class='fw-aip'>Play a short scripted conversation. Tap a suggested reply (or say it aloud) to continue.</p><button class='ai-btn' onclick=\"fwRoleStart('"+f.id+"')\">▶ Start role-play</button>";
  let h="<div class='fw-role'>";
  for(let i=0;i<=step && i<turns.length;i++){
    h+="<div class='fw-role-ai'>"+ic('chat')+" <span>"+turns[i].ai+"</span> <button class='fw-say' onclick=\"say('"+fwEsc(turns[i].ai)+"')\">🔊</button></div>";
    if(i<step){ /* already replied - show chosen */ if(FW.role.picks&&FW.role.picks[i]!=null) h+="<div class='fw-role-me'>"+turns[i].replies[FW.role.picks[i]]+"</div>"; }
  }
  const cur=turns[step];
  if(step<turns.length-1){
    h+="<div class='fw-role-replies'>"+cur.replies.map((r,ri)=>"<button class='ai-chip' onclick=\"fwRoleReply('"+f.id+"',"+ri+")\">"+r+"</button>").join('')+"</div>";
  } else {
    h+="<div class='fw-aip'>🎉 Great — you completed the role-play!</div><button class='ai-btn ghost' onclick=\"fwRoleStart('"+f.id+"')\">Replay</button>";
  }
  h+="</div>";
  return h;
}
function fwRoleStart(id){ FW.role={id:id,step:0,picks:{}}; fwOpen(id); const f=fwGet(id); setTimeout(()=>say(f.roleplay[0].ai),250); }
function fwRoleReply(id,ri){ if(!FW.role||FW.role.id!==id) return; const f=fwGet(id); FW.role.picks[FW.role.step]=ri; FW.role.step=Math.min(FW.role.step+1,f.roleplay.length-1); fwOpen(id); const t=f.roleplay[FW.role.step]; setTimeout(()=>say(t.ai),300); }

/* ============================================================
   LESSON PLAYER ENGINE
   ============================================================ */
let L=null; // active lesson state
function startLesson(id){
  const u=UMAP[id]; if(!u) return;
  touchDay();
  const ex=u.make();
  openPlayer(ex, id, false, u.title);
}
function startReview(){
  if(!S.review.length) return;
  touchDay();
  openPlayer(reviewLesson(), null, true, "Review");
}
function openPlayer(exercises, unitId, isReview, title){
  L={ queue:exercises.slice(), idx:0, unitId, isReview, title,
      correct:0, graded:0, xp:0, requeued:0 };
  document.getElementById('livesIc').innerHTML=ic('heart');
  document.getElementById('player').classList.add('on');
  document.body.style.overflow='hidden';
  renderExercise();
}
function closePlayer(){
  document.getElementById('player').classList.remove('on');
  document.body.style.overflow='';
  L=null;
}
document.getElementById('quitBtn').onclick=()=>{ if(!L||confirm("Quit this lesson? Progress in this lesson will be lost.")) closePlayer(); };
document.getElementById('quitBtn').innerHTML=ic('x');

function updateProgress(){
  const pct=Math.round(L.idx/L.queue.length*100);
  document.getElementById('pfill').style.width=pct+'%';
  document.getElementById('livesVal').textContent=S.hearts;
}

// current answer controller
let CUR=null;
function renderExercise(){
  if(L.idx>=L.queue.length){ return finishLesson(); }
  updateProgress();
  const ex=L.queue[L.idx];
  const stage=document.getElementById('qstage');
  const fb=document.getElementById('feedback'); fb.className='feedback'; fb.innerHTML='';
  const btn=document.getElementById('checkBtn');
  btn.disabled=true; btn.className='btn primary'; btn.textContent = ex.type==='teach'||ex.type==='read'?'Continue':'Check';
  btn.onclick=()=>onCheck();
  CUR={ex, answered:false, correct:false, ready:false, value:null, graded:!['teach','read','speak','translate'].includes(ex.type)};
  RENDER[ex.type](ex, stage);
  if(ex.type==='teach'||ex.type==='read'){ CUR.ready=true; btn.disabled=false; }
}
function setReady(v){ CUR.ready=v; document.getElementById('checkBtn').disabled=!v; }

/* ---------- per-type renderers ---------- */

RENDER.mc=(ex,st)=>{

  const speak = ex.speak? `<button class="say" style="width:40px;height:40px;margin:0 0 10px" onclick="say(${jq(ex.speak)})">${ic('speaker')}</button>`:'';

};

RENDER.listen=(ex,st)=>{
  st.innerHTML=`<div class="q-kicker">${ex.kicker||'Listen'}</div>
    <div style="text-align:center;margin:6px 0 20px">
      <button class="say" style="width:64px;height:64px;margin:0 auto" onclick="say(${jq(ex.play)})">${ic('speaker')}</button>

};

RENDER.fill=(ex,st)=>{

RENDER.build=(ex,st)=>{
  const words=shuffle(ex.answer.replace(/[.?!,]/g,'').split(/\s+/));
  const head = ex.promptBn
    ? `<div class="q-prompt" style="font-size:22px">Say this in English</div><div class="q-sub bn" style="font-size:18px;color:var(--ink)">${ex.promptBn}</div>`
    : `<div class="q-prompt" style="font-size:22px">${ex.prompt||'Arrange the words'}</div>`;
  st.innerHTML=`<div class="q-kicker">${ex.kicker||'Build the sentence'}</div>
    ${head}
    <div class="bank-answer empty" id="ans" style="margin-top:14px"></div>
    <div class="bank" id="bank"></div>`;
  const ans=document.getElementById('ans'), bank=document.getElementById('bank');
  CUR.placed=[];
  words.forEach((w,i)=>{
    const t=document.createElement('button'); t.className='tile'; t.textContent=w; t.dataset.i=i;
    t.onclick=()=>{ if(CUR.answered)return;
      if(t.classList.contains('used')){ // remove from answer
        t.classList.remove('used'); const chip=ans.querySelector(`[data-src="${i}"]`); if(chip)chip.remove();
      } else {
        t.classList.add('used');
        const chip=document.createElement('button'); chip.className='tile placed'; chip.textContent=w; chip.dataset.src=i;
        chip.onclick=()=>{ chip.remove(); t.classList.remove('used'); syncBuild(); };
        ans.appendChild(chip);
      }
      syncBuild();
    };
    bank.appendChild(t);
  });
  function syncBuild(){
    const chips=[...ans.querySelectorAll('.tile')];
    ans.classList.toggle('empty', chips.length===0);
    CUR.value=chips.map(c=>c.textContent).join(' ');
    setReady(chips.length>0);
  }
};

RENDER.match=(ex,st)=>{
  st.innerHTML=`<div class="q-kicker">${ex.kicker||'Match the pairs'}</div>
    <div class="q-sub">Tap an English word, then its meaning.</div>
    <div class="match-grid"><div class="match-col" id="colA"></div><div class="match-col" id="colB"></div></div>`;
  const A=document.getElementById('colA'), B=document.getElementById('colB');
  const left=shuffle(ex.pairs.map((p,i)=>({t:p.a,i}))), right=shuffle(ex.pairs.map((p,i)=>({t:p.b,i})));
  let selA=null, matched=0;
  left.forEach(o=>{ const c=document.createElement('button'); c.className='mcell'; c.textContent=o.t; c.dataset.i=o.i;
    c.onclick=()=>{ if(c.classList.contains('matched'))return; A.querySelectorAll('.mcell').forEach(x=>x.classList.remove('sel')); c.classList.add('sel'); selA=c; };
    A.appendChild(c); });
  right.forEach(o=>{ const c=document.createElement('button'); c.className='mcell bn'; c.textContent=o.t; c.dataset.i=o.i;
    c.onclick=()=>{ if(c.classList.contains('matched')||!selA)return;
      if(selA.dataset.i===c.dataset.i){ selA.classList.add('matched'); selA.classList.remove('sel'); c.classList.add('matched'); selA=null; matched++;
        if(matched===ex.pairs.length){ CUR.value='__match_done__'; setReady(true); document.getElementById('checkBtn').textContent='Continue'; }
      } else { c.classList.add('miss'); const s=selA; setTimeout(()=>c.classList.remove('miss'),360); }
    };
    B.appendChild(c); });
};

RENDER.speak=(ex,st)=>{
  const bn = ex.bn && !ex.noBn? `<div class="mean bn" style="font-size:18px;margin-top:6px">${ex.bn}</div>`:'';
  st.innerHTML=`<div class="q-kicker">Speaking</div>
    <div class="q-sub" style="text-align:center;margin-bottom:6px">Read this sentence aloud</div>
    <div class="teach" style="padding:22px">
      <div style="font-family:var(--disp);font-size:24px;font-weight:600;line-height:1.35">${ex.sentence}</div>
      ${bn}
      <button class="say" style="width:44px;height:44px;margin:14px auto 0" onclick="say(${jq(ex.sentence)})">${ic('speaker')}</button>
    </div>
    <div class="speak-box">
      <button class="mic" id="mic">${ic('mic')}</button>
      <div class="heard" id="heard">${CAN_LISTEN?'Tap the mic and say it':'Say it aloud, then continue'}</div>
    </div>`;
  const mic=document.getElementById('mic'), heard=document.getElementById('heard');
  if(!CAN_LISTEN){ CUR.value='__spoken__'; setReady(true);
    mic.onclick=()=>{ heard.innerHTML='<b>Nice!</b> Keep going.'; setReady(true); };
    return;
  }
  mic.onclick=()=>{
    const rec=new SR(); rec.lang='en-US'; rec.interimResults=false; rec.maxAlternatives=1;
    mic.classList.add('rec'); heard.textContent='Listening…';
    rec.onresult=(e)=>{ const said=e.results[0][0].transcript; const sim=similarity(said, ex.sentence);
      mic.classList.remove('rec');
      if(sim>=0.55){ heard.innerHTML=`<b style="color:var(--green)">Great:</b> “${said}”`; CUR.value='__spoken__'; }
      else { heard.innerHTML=`Heard: “${said}” — try once more`; CUR.value='__spoken__'; }
      setReady(true);
    };
    rec.onerror=()=>{ mic.classList.remove('rec'); heard.innerHTML='No mic access. Say it aloud, then continue.'; CUR.value='__spoken__'; setReady(true); };
    rec.onend=()=>mic.classList.remove('rec');
    try{ rec.start(); }catch(e){ heard.textContent='Say it aloud, then continue.'; CUR.value='__spoken__'; setReady(true); }
  };
};

RENDER.translate=(ex,st)=>{
  st.innerHTML=`<div class="q-kicker">Writing · translate</div>
    <div class="q-sub">Read the Bengali, then write it in English.</div>
    <div class="teach" style="padding:18px 20px;text-align:left"><div class="bn" style="font-size:17px;line-height:1.7">${ex.bn}</div></div>
    <textarea class="tinput" id="tw" rows="3" placeholder="Write your English here…" style="margin-top:14px;resize:vertical" oninput="CUR.value=this.value;setReady(this.value.trim().length>3)"></textarea>`;
};

RENDER.read=(ex,st)=>{
  const paras=ex.text.split(/(?<=[.!?"])\s+(?=[A-Z"])/).reduce((acc,s,i)=>{ if(i%3===0)acc.push([]); acc[acc.length-1].push(s); return acc; },[]).map(g=>g.join(' '));
  st.innerHTML=`<div class="q-kicker">Reading</div>
    <div class="q-prompt" style="font-size:26px;margin-bottom:12px">${ex.title}</div>
    <div class="passage" id="pass">${paras.map(p=>`<p>${p}</p>`).join('')}</div>
    <div class="q-sub" style="margin-top:14px">Read it fully. Questions come next. Tap ${ic('speaker')} to listen.</div>
    <button class="say" style="width:44px;height:44px;margin-top:8px" onclick="sayLong(${jq(ex.text)})">${ic('speaker')}</button>`;
};

/* ---------- check / advance ---------- */
function onCheck(){
  const ex=CUR.ex, btn=document.getElementById('checkBtn'), fb=document.getElementById('feedback');
  if(!CUR.answered){
    // translate: reveal model answer, then continue on next click
    if(ex.type==='translate'){
      CUR.answered=true; addXp(12,'writing'); if(ex.item)0;
      showFeedback(true, ex); btn.textContent='Continue'; setReady(true); return;
    }
    // non-graded (teach / read / speak) → just advance
    if(!CUR.graded){
      awardNonGraded(ex);
      next(); return;
    }
    CUR.answered=true;
    let ok=false, correctText='';
    if(ex.type==='mc'||ex.type==='listen'||ex.type==='fill'){ ok = norm(CUR.value)===norm(ex.answer); correctText=ex.answer;
      document.querySelectorAll('#choices .choice').forEach(c=>{ const txt=c.querySelector('span:last-child').textContent;
        c.classList.add('dis'); if(norm(txt)===norm(ex.answer)) c.classList.add('correct');
        else if(c.classList.contains('sel')) c.classList.add('wrong'); else c.classList.add('mute'); });
    } else if(ex.type==='build'){ ok = norm(CUR.value)===norm(ex.answer.replace(/[.?!,]/g,'')); correctText=ex.answer; }
    else if(ex.type==='match'){ ok=true; }
    // scoring
    L.graded++;
    if(ok){ L.correct++; correctFx(); addXp(xpFor(ex), ex.skill);
      showFeedback(true, ex);
      if(ex.item) removeFromReview(ex.item.en);
    } else {
      loseHeart(); wrongFx();
      showFeedback(false, ex, correctText);
      if(ex.item) pushReview(ex.item, ex.skill);
      requeue(ex);
    }
    btn.textContent='Continue'; setReady(true);
  } else { next(); }
}
function next(){ L.idx++; renderExercise(); }

function awardNonGraded(ex){
  if(ex.type==='teach'){ addXp(2, ex.skill); }
  else if(ex.type==='read'){ addXp(6,'reading'); }
  else if(ex.type==='speak'){ addXp(8,'speaking'); }
}

function xpFor(ex){ return ({mc:10,listen:10,fill:10,build:12,match:15})[ex.type]||8; }

function showFeedback(ok, ex, correctText){
  const fb=document.getElementById('feedback');
  if(ex.type==='translate'){
    fb.className='feedback good show'; fb.innerHTML=`<div class="fi">${ic('check')}</div><div>Model answer<div class="corr">${ex.model}</div></div>`;
    return;
  }
  if(ok){ fb.className='feedback good show'; fb.innerHTML=`<div class="fi">${ic('check')}</div><div>${pick(['Nice work!','Exactly right.','Well done!','Perfect.'])}</div>`; }
  else { fb.className='feedback bad show';
    fb.innerHTML=`<div class="fi">${ic('x')}</div><div>Not quite.<span class="corr">Answer: <b>${correctText||ex.answer}</b>${ex.item&&ex.item.bn?` · ${ex.item.bn}`:''}</span></div>`; }
}

function requeue(ex){
  if(ex._rq || L.requeued>=4) return;
  const copy=Object.assign({}, ex); copy._rq=true; copy.answered=false;
  L.queue.push(copy); L.requeued++;
}

/* ---------- economy ---------- */
function addXp(n, skill){ S.xp+=n; L.xp+=n; if(skill&&S.skills[skill]!=null) S.skills[skill]+=n; renderTop(); save(); }
function loseHeart(){ if(S.hearts>0){ S.hearts--; renderTop(); save(); if(S.hearts===0) toast('Out of hearts — keep going, they refill tomorrow','heart'); } }
function markSeen(en){ if(en&&!S.seen[en]){ S.seen[en]=true; save(); } }
function pushReview(item, skill){ if(!item||!item.en) return; if(S.review.some(r=>r.en===item.en))return;
  S.review.push({en:item.en, bn:item.bn, ex:item.ex, skill}); if(S.review.length>60)S.review.shift(); save(); }
function removeFromReview(en){ const i=S.review.findIndex(r=>r.en===en); if(i>=0){ S.review.splice(i,1); save(); } }

/* ---------- finish ---------- */
function finishLesson(){
  const acc = L.graded? L.correct/L.graded : 1;
  let crowns = acc>=0.9?3 : acc>=0.75?2 : 1;
  if(L.unitId){
    const u=unit(L.unitId); u.done=true; u.best=Math.max(u.best, Math.round(acc*100)); u.crowns=Math.max(u.crowns, crowns);
    save();
  }
  document.getElementById('pfill').style.width='100%';
  const ds=document.getElementById('doneScreen');
  const perfect = L.graded>0 && L.correct===L.graded;
  ds.innerHTML=`
    <div class="medal">${medalSvg(crowns)}</div>
    <h2>${perfect?'Flawless!':pick(['Lesson complete!','Well done!','You did it!'])}</h2>
    <div class="tag">${L.isReview?'Review session finished':'“'+ (L.title||'Lesson') +'” complete'}</div>
    <div class="done-stats">
      <div class="done-stat xp"><div class="v">+${L.xp}</div><div class="l">XP earned</div></div>
      <div class="done-stat acc"><div class="v">${L.graded?Math.round(acc*100):100}%</div><div class="l">Accuracy</div></div>
      <div class="done-stat streak"><div class="v">${S.streak}</div><div class="l">Day streak</div></div>
    </div>
    <button class="btn primary" style="min-width:220px" onclick="afterDone()">Continue</button>
    ${acc<0.75&&!L.isReview?`<button class="btn ghost" onclick="replayLesson()">Try this lesson again</button>`:''}`;
  document.getElementById('player').classList.remove('on');
  ds.classList.add('on');
  if(acc>=0.75) confetti();
}
function replayLesson(){ const id=L.unitId; document.getElementById('doneScreen').classList.remove('on'); if(id) startLesson(id); }
function afterDone(){
  document.getElementById('doneScreen').classList.remove('on');
  document.body.style.overflow=''; L=null;
  render('learn'); go('learn');
}

/* ============================================================
   HELPERS
   ============================================================ */
function jq(s){ return JSON.stringify(String(s)); }
function norm(s){ return String(s||'').toLowerCase().replace(/[.,!?"'’]/g,'').replace(/\s+/g,' ').trim(); }
function hl(text, word){ if(!word) return text; try{ const re=new RegExp('('+word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','i'); return text.replace(re,'<span class="hl">$1</span>'); }catch(e){ return text; } }
function pick(a){ return a[(Math.random()*a.length)|0]; }
function similarity(a,b){ a=norm(a).split(' '); b=norm(b).split(' '); const setB=new Set(b); let hit=0; a.forEach(w=>{ if(setB.has(w)){hit++; setB.delete(w);} }); return hit/Math.max(a.length,b.length,1); }
function sayLong(t){ if(!('speechSynthesis'in window))return; speechSynthesis.cancel(); const parts=t.match(/[^.!?]+[.!?]?/g)||[t]; parts.forEach((p,i)=>{ const u=new SpeechSynthesisUtterance(p.trim()); u.rate=0.92; if(VOICE)u.voice=VOICE; speechSynthesis.speak(u); }); }

function correctFx(){ try{ beep(660,0.08); setTimeout(()=>beep(880,0.09),80); }catch(e){} }
function wrongFx(){ try{ beep(200,0.14,'sawtooth'); }catch(e){} }
let AC=null;
function beep(freq,dur,type){ if(!window.AudioContext&&!window.webkitAudioContext)return; AC=AC||new (window.AudioContext||window.webkitAudioContext)(); const o=AC.createOscillator(),g=AC.createGain(); o.type=type||'sine'; o.frequency.value=freq; o.connect(g); g.connect(AC.destination); g.gain.setValueAtTime(0.06,AC.currentTime); g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur); o.start(); o.stop(AC.currentTime+dur); }

function toast(msg, icn){ const t=document.getElementById('toast'); t.innerHTML=(icn?ic(icn):'')+`<span>${msg}</span>`; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600); }

function confetti(){ const box=document.getElementById('confetti'); box.style.display='block'; box.innerHTML='';
  const cols=['#F0A62F','#4B47C7','#2E9E6B','#E1573F','#8257E5','#2E93C9'];
  for(let i=0;i<80;i++){ const p=document.createElement('div'); p.className='cpiece';
    p.style.left=Math.random()*100+'%'; p.style.background=cols[(Math.random()*cols.length)|0];
    p.style.animationDuration=(1.6+Math.random()*1.4)+'s'; p.style.animationDelay=(Math.random()*0.4)+'s';
    p.style.transform=`rotate(${Math.random()*360}deg)`; if(Math.random()>0.5)p.style.borderRadius='50%';
    box.appendChild(p);
  }
  setTimeout(()=>{ box.style.display='none'; },3200);
}

function medalSvg(crowns){
  const gold='#F0A62F', deep='#C87E12';
  return `<svg viewBox="0 0 120 120" fill="none">
    <circle cx="60" cy="54" r="38" fill="${gold}" stroke="${deep}" stroke-width="4"/>
    <circle cx="60" cy="54" r="28" fill="#fff" opacity=".2"/>
    <path d="M42 54l12 12 24-24" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M40 88l-8 24 28-12 28 12-8-24" fill="${gold}" stroke="${deep}" stroke-width="3" stroke-linejoin="round"/>
    ${Array.from({length:crowns}).map((_,i)=>`<circle cx="${48+i*12}" cy="16" r="5" fill="${gold}" stroke="${deep}" stroke-width="2"/>`).join('')}
  </svg>`;
}

/* ============================================================
   INIT
   ============================================================ */
function init(){
  touchDay(); renderTop(); buildNav(); render('learn');
  // warm up voices
  if('speechSynthesis'in window){ setTimeout(pickVoice,300); }
}
init();
